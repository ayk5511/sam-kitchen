<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f9d6e"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Sam's Kitchen">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f9d6e'/%3E%3Ctext x='50%25' y='54%25' font-size='110' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%A5%97%3C/text%3E%3C/svg%3E">
<title>Sam's Kitchen</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--card2:#eef1f5;--ink:#15181d;--mut:#69727f;--line:#e2e6ec;--acc:#0f9d6e;--accink:#fff;--blue:#2563eb;--amber:#d98324;--red:#d4554f;--chip:#eef1f5;--sh:0 1px 3px rgba(0,0,0,.07);--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);}
@media(prefers-color-scheme:dark){:root{--bg:#0e1014;--card:#171a21;--card2:#1e222b;--ink:#e8eaed;--mut:#9aa3b2;--line:#272c38;--acc:#34d399;--accink:#05281c;--blue:#7dd3fc;--amber:#fbbf24;--red:#fca5a5;--chip:#222735;--sh:0 1px 3px rgba(0,0,0,.4);}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
#app{max-width:560px;margin:0 auto;min-height:100vh;}
a{color:var(--blue);text-decoration:none;}button{font-family:inherit;cursor:pointer;}
.hdr{position:sticky;top:0;z-index:30;background:var(--bg);padding:calc(12px + var(--safe-t)) 16px 8px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.hdr h1{font-size:20px;margin:0;letter-spacing:-.4px;}.hdr .sp{flex:1;}
.view{padding:14px 16px calc(96px + var(--safe-b));}
.muted{color:var(--mut);}.small{font-size:13px;}.tiny{font-size:11.5px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--sh);}
.row{display:flex;gap:10px;align-items:center;}
.btn{background:var(--acc);color:var(--accink);border:none;border-radius:10px;padding:10px 14px;font-weight:700;font-size:14px;}
.btn.sec{background:var(--card2);color:var(--ink);border:1px solid var(--line);}.btn.sm{padding:6px 10px;font-size:13px;border-radius:8px;}
.btn:active{transform:translateY(1px);}
input,select{font-family:inherit;font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600;background:var(--chip);color:var(--mut);}
.tag{font-size:11px;color:var(--mut);background:var(--chip);padding:2px 7px;border-radius:6px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:var(--safe-b);}
.nav a{flex:1;text-align:center;padding:9px 0 8px;color:var(--mut);font-size:10.5px;font-weight:600;}
.nav a .ic{display:block;font-size:21px;line-height:1.1;}.nav a.on{color:var(--acc);}
.rgrid{display:grid;grid-template-columns:1fr;gap:10px;}
.rc{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--sh);position:relative;display:flex;}
.rc .thumb{width:74px;flex:none;display:grid;place-items:center;font-size:32px;}
.rc .body{padding:11px 12px;flex:1;min-width:0;}
.rc h3{margin:0 26px 4px 0;font-size:15px;}
.rc .meta{color:var(--mut);font-size:11.5px;margin-bottom:7px;}
.rc .macros{display:flex;gap:6px;flex-wrap:wrap;}
.rc .fav{position:absolute;top:9px;right:9px;font-size:18px;background:none;border:none;color:var(--mut);padding:0;}.rc .fav.on{color:#e0556a;}
.macro{padding:3px 7px;border-radius:8px;font-size:11px;font-weight:700;background:var(--card2);border:1px solid var(--line);}.macro.p{color:var(--acc);}.macro.fb{color:var(--blue);}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0;}
.chip{padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--chip);color:var(--mut);font-size:12.5px;font-weight:600;}.chip.on{background:var(--acc);color:var(--accink);border-color:transparent;}
.sheet{position:fixed;inset:0;z-index:60;background:var(--bg);overflow-y:auto;max-width:560px;margin:0 auto;}
.sheet .shdr{position:sticky;top:0;background:var(--bg);padding:calc(10px + var(--safe-t)) 16px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;z-index:2;}
.sheet .body{padding:16px 16px 120px;}
.ck{display:flex;align-items:flex-start;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);}
.ck input{width:20px;height:20px;flex:none;margin-top:1px;accent-color:var(--acc);}.ck.done span{opacity:.45;text-decoration:line-through;}
.step{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);}
.step .n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--acc);color:var(--accink);font-weight:800;font-size:12px;display:grid;place-items:center;}
.aisle-h{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin:16px 0 4px;font-weight:700;}
.ring-wrap{display:flex;gap:16px;align-items:center;}.ring{flex:none;}
.bar{height:9px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:4px;}.bar>i{display:block;height:100%;background:var(--acc);border-radius:6px;}
.bar.amber>i{background:var(--amber);}.bar.red>i{background:var(--red);}
.mini{display:flex;gap:10px;margin-top:8px;}.mini>div{flex:1;}
.daycard{margin-bottom:10px;}
.slot{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);}
.slot .lab{width:58px;flex:none;color:var(--mut);font-size:11px;font-weight:700;text-transform:uppercase;}
.slot .nm{flex:1;font-size:13px;}.slot .nm.empty{color:var(--mut);font-style:italic;}
.eat{font-size:18px;background:none;border:none;color:var(--mut);padding:2px;}.eat.on{color:var(--acc);}
.spark{display:flex;align-items:flex-end;gap:3px;height:38px;}.spark i{flex:1;background:var(--acc);border-radius:2px 2px 0 0;min-height:2px;opacity:.85;}
.seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.seg button{flex:1;background:none;border:none;padding:8px;font-size:13px;font-weight:700;color:var(--mut);}.seg button.on{background:var(--acc);color:var(--accink);}
.stars{font-size:22px;letter-spacing:3px;color:var(--mut);}.stars b{color:#f5b301;cursor:pointer;}
.nudge{background:var(--card);border:1px solid var(--acc);border-radius:12px;padding:11px 13px;margin-bottom:10px;display:flex;gap:10px;align-items:center;}
.nudge .x{margin-left:auto;background:none;border:none;color:var(--mut);font-size:18px;}
.md h1{font-size:21px;}.md h2{font-size:17px;border-top:1px solid var(--line);padding-top:.5em;margin-top:1.3em;}
.md h3{font-size:15px;color:var(--blue);}.md table{width:100%;border-collapse:collapse;font-size:12.5px;display:block;overflow-x:auto;}
.md th,.md td{border:1px solid var(--line);padding:6px 8px;}.md th{background:var(--card2);}
.md code{background:var(--chip);padding:1px 5px;border-radius:4px;font-size:12.5px;}.md pre{background:var(--card);border:1px solid var(--line);padding:10px;border-radius:8px;overflow-x:auto;}
.md blockquote{border-left:3px solid var(--acc);margin:1em 0;padding:.3em .9em;background:var(--card);border-radius:0 8px 8px 0;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:999px;font-size:13px;font-weight:600;z-index:90;opacity:0;transition:opacity .2s;pointer-events:none;}.toast.show{opacity:.96;}
.cook{position:fixed;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column;max-width:560px;margin:0 auto;}
.cook .top{padding:calc(12px + var(--safe-t)) 16px 8px;display:flex;gap:10px;align-items:center;}
.cook .mid{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 24px;}
.cook .stepbig{font-size:26px;line-height:1.35;font-weight:600;}
.cook .dots{display:flex;gap:6px;justify-content:center;padding:10px;}
.cook .dot{width:9px;height:9px;border-radius:50%;background:var(--line);}.cook .dot.on{background:var(--acc);}
.cook .ctrl{display:flex;gap:10px;padding:14px 16px calc(20px + var(--safe-b));}
.timerbar{display:flex;gap:8px;justify-content:center;padding:8px 16px;flex-wrap:wrap;}
.hide{display:none!important;}
.ob{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;max-width:560px;margin:0 auto;padding:calc(30px + var(--safe-t)) 22px 40px;}
.toggle{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);}
.toggle input{width:auto;}
</style></head><body>
<div id="app">
  <div class="hdr"><h1 id="title">☀️ Today</h1><span class="sp"></span><span id="hdr-extra"></span></div>
  <div class="view" id="view"></div>
</div>
<div class="nav" id="nav">
  <a data-go="today" class="on"><span class="ic">☀️</span>Today</a>
  <a data-go="recipes"><span class="ic">🍴</span>Recipes</a>
  <a data-go="plan"><span class="ic">🗓️</span>Plan</a>
  <a data-go="shop"><span class="ic">🛒</span>Shop</a>
  <a data-go="me"><span class="ic">⚙️</span>Me</a>
</div>
<div class="toast" id="toast"></div>

cken stocked; it's a 9-min microwave dinner anytime.", "storage": "Best eaten fresh from the microwave; leftovers keep 2 days sealed in fridge.", "variations": ["Swap chicken for pre-cooked shrimp or canned beans.", "Add frozen peas or extra veg for more fiber.", "Top with a spoon of Greek yogurt or hot sauce of choice."], "laziness_hacks": "Why it tastes good: a frozen bowl always tastes under-seasoned, so salsa + lime + chili-lime seasoning wakes it up instantly. The chicken and edamame quietly double the protein to 40 g.", "tags": ["no-cook", "freezer-friendly", "microwave", "high-protein", "5-min"], "category": "nocook", "ingredients": [{"qty": "1", "unit": "piece", "item": "frozen grain and veggie bowl", "aisle": "frozen", "staple": false}, {"qty": "3", "unit": "oz", "item": "rotisserie chicken", "aisle": "protein", "staple": false}, {"qty": "1/3", "unit": "cup", "item": "frozen edamame", "aisle": "frozen", "staple": false}, {"qty": "2", "unit": "tbsp", "item": "jarred salsa", "aisle": "sauces-spices", "staple": false}, {"qty": "1/2", "unit": "", "item": "lime", "aisle": "produce", "staple": false}, {"qty": "1/2", "unit": "tsp", "item": "chili-lime seasoning", "aisle": "sauces-spices", "staple": false}], "iron_mg": 5.9, "calcium_mg": 144, "omega3": true, "contains": ["meat", "gluten", "soy"], "diet": {"vegetarian": false, "vegan": false, "pescatarian": false, "dairy_free": true, "gluten_free": false}}, {"name": "Airport / Travel High-Protein Combo (assembled from a Hudson News + Starbucks)", "cuisine": "American", "meal_type": "snack", "prep_min": 2, "total_min": 2, "servings": 1, "kcal": 251, "protein_g": 26.2, "fiber_g": 4.4, "carb_g": 30.6, "fat_g": 3.4, "key_ingredients": ["grab-and-go grilled chicken or turkey wrap/strips (5 oz)", "Greek yogurt cup (high-protein, 1)", "pre-cooked hard-boiled eggs (2)", "roasted chickpea or edamame snack pack (1)", "apple or banana (1)", "mixed nuts (small handful)"], "steps": ["Grab the chicken strips/wrap, yogurt cup, eggs, and snack packs from the cooler shelf.", "Peel the eggs and eat alongside the chicken.", "Open the yogurt and stir in a few nuts for crunch.", "Finish with the apple or banana."], "batch_prep": "Stash a snack-pack kit (eggs, chickpeas, nuts) in your bag so it's grab-and-eat at the gate.", "storage": "Assemble fresh — takes 2 min; shelf-stable items travel all day, eggs/yogurt keep ~4 hrs unrefrigerated.", "variations": ["Swap the wrap for a tuna or chicken salad pack.", "Use a protein shake instead of the yogurt cup.", "Trade nuts for a string cheese if you want lower fat."], "laziness_hacks": "Why it tastes good: mixing crunchy nuts into thick Greek yogurt plus a crisp apple gives texture contrast that gas-station food never has. Zero cooking, all bought as-is, and it stacks to 42 g protein on the go.", "tags": ["no-cook", "travel", "grab-and-go", "high-protein", "2-min"], "category": "nocook", "ingredients": [{"qty": "2", "unit": "oz", "item": "grilled chicken strips", "aisle": "protein", "staple": false}, {"qty": "1/2", "unit": "cup", "item": "Greek yogurt", "aisle": "dairy-eggs", "staple": false}, {"qty": "1", "unit": "", "item": "apple", "aisle": "produce", "staple": false}], "iron_mg": 0.7, "calcium_mg": 152, "omega3": false, "contains": ["dairy", "meat"], "diet": {"vegetarian": false, "vegan": false, "pescatarian": false, "dairy_free": false, "gluten_free": true}}],DOCS={"foundation": {"title": "Nutrition Foundation", "md": "# Nutrition Foundation — Sam's 6-Month Program\n\n> **Who this is for:** Sam — 23, female, 5'7\" (170 cm), 130 lb (59 kg), California. Walks regularly + Pilates 2×/week. **Lightly active**, not a competitive athlete. Goal: drop ~5 lb to 125, look **more toned**, and then **keep it there for life**.\n>\n> This is a lifestyle blueprint, not a crash diet. The whole plan is built around two things that are true at the same time: (1) she gets **bored** fast, so everything rotates — cuisines, formats, flavors; and (2) she's a little **lazy** in the kitchen, so everything is *assemble, not cook* — batch + remix, sheet-pan, Instant Pot, blender, rotisserie chicken, canned beans/fish, frozen veg, bagged kits.\n\n---\n\n## 1. The Goal, Honestly\n\nSam wants to lose about **5 lb** (130 → 125), look **more toned**, and then **maintain effortlessly**. That is a small, sane target — and the right tool for a small target is a **gentle deficit**, not a dramatic one.\n\nHere's the honest mechanism behind \"toned\":\n\n- **\"Toned\" = lower body fat + keeping (or slightly building) the muscle you already have.** There is no separate \"toning\" tissue. You reveal shape by removing a thin layer of fat while *holding onto* lean mass.\n- The lever that protects muscle in a deficit is **protein + a resistance stimulus** (her Pilates). Eat enough protein and keep loading the muscle, and the weight you lose comes off as fat, not as the very tissue that creates the look she wants.\n- **High fiber** is the appetite lever. At ~1,550 kcal she needs to feel full, not deprived. Fiber + protein + water volume is what makes a deficit feel like \"normal eating that happens to be lighter.\"\n\n**Why crash-dieting backfires at her size — specifically:**\n\n| Crash approach (e.g. 1,100 kcal) | What actually happens | Better: gentle −350 kcal |\n|---|---|---|\n| Big deficit on a small person | She only has ~5 lb to lose; aggressive cuts strip muscle, not just fat → \"skinny-soft,\" not toned | Slow loss preserves lean mass → toned |\n| Very low calories | Energy availability drops; for a 23 yo woman this risks hormones, cycle, mood, sleep | Stays ≥1,400 kcal floor — health-safe |\n| Restrictive + boring | Boredom → quit by week 2 | Variety-first = adherence for months |\n| Fast loss | Rebound weight gain when she stops | Reverse-diet built in (Phase 2) |\n\nThe math is unforgiving in her favor: she does **not** need to suffer. A 5 lb cut at ~0.6 lb/week is done in roughly **8 weeks**, gently, and then the rest of the program is about making maintenance automatic.\n\n---\n\n## 2. Energy Math — Shown Step by Step\n\n**Step 1 — BMR (Mifflin–St Jeor, female):**\n\n```\nBMR = 10 × weight(kg) + 6.25 × height(cm) − 5 × age − 161\n    = 10 × 59 + 6.25 × 170 − 5 × 23 − 161\n    = 590 + 1062.5 − 115 − 161\n    = 1376.5  ≈  1377 kcal/day\n```\n\n**Step 2 — Maintenance TDEE (lightly active):**\n\nActivity factor for *daily walking + Pilates 2×/week* ≈ **1.4**. (This is the standard \"lightly active\" multiplier. She is **not** at the 1.55–1.7 range — that's for people lifting hard or training daily.)\n\n```\nTDEE = 1377 × 1.4 ≈ 1925 kcal/day\n```\n\nReal days vary: **~1,850 kcal** on a low-step, no-Pilates day → **~2,050 kcal** on a big-walk + Pilates day. Treat 1,925 as the weekly *average*.\n\n**Step 3 — The cut to reach 125:**\n\nA modest deficit of **−350 kcal/day** (range −325 to −375):\n\n```\nIntake = 1925 − 350 ≈ 1550 kcal/day\n```\n\n**Step 4 — Expected rate & timeline:**\n\n```\n350 kcal/day × 7 days = 2,450 kcal/week\n2,450 ÷ 3,500 kcal/lb ≈ 0.6–0.7 lb/week  (≈ 0.3 kg/week)\n\n5 lb ÷ 0.6 lb/week ≈ 8 weeks to reach 125\n```\n\nThat's the entire cut: **~8 weeks**, gentle, never hungry to the point of misery.\n\n### Scale-to-your-bodyweight formula (so this travels with her)\n\nIf her weight changes, recompute from scratch:\n\n```\nBMR      = 10 × kg + 6.25 × 170 − 5 × age − 161\nTDEE     = BMR × 1.4            (lightly active)\nCut      = TDEE − 350           (never go below ~1,400)\nMaintain = TDEE                 (after reaching goal weight)\nProtein  = 1.9 × kg  (g/day)\n```\n\n> **The formula is a *prior*, not the truth.** Mifflin–St Jeor has a real-person error band of roughly ±10%. **Eat at the predicted intake for 3 weeks, then recalibrate from the scale**, not the equation. If average weight (use weekly averages, not single mornings) isn't moving ~0.5 lb/week, adjust intake by ±100–150 kcal and hold another 2 weeks. The body is the instrument; the formula just gets you in the room.\n\n---\n\n## 3. Macro Targets — All 4 Phases\n\nProtein is held essentially constant the whole 6 months (**~115 g**, ~1.9–2.0 g/kg) because protein is the **toning lever** — it's what protects muscle in the cut and supports recomposition at maintenance. Calories and carbs are what move.\n\n| Phase | Weeks | Mode | kcal | Protein | Carb | Fat | Fiber |\n|---|---|---|---|---|---|---|---|\n| **1 — Reset & Gentle Cut** | 1–8 | Lose 5 lb → 125 | **1,550** | 115 g | ~150 g | ~50 g | 30 g |\n| **2 — Reach & Reverse** | 9–13 | Hold 125, ramp up | 1,550 → **1,850** | 115 g | 150 → 195 g | ~52 g | 30 g |\n| **3 — Tone & Maintain** | 14–20 | Maintenance | **1,900** | 115 g | ~200 g | ~55 g | 30 g |\n| **4 — Lifestyle Lock-In** | 21–26 | Maintenance, 80/20 | **1,900** | 105–115 g | ~200 g | ~55 g | 30 g |\n\n**Macro derivations (Phase 1, 1,550 kcal):**\n\n```\nProtein 115 g × 4 = 460 kcal  (30%)   → 1.95 g/kg  (muscle protection)\nFat      50 g × 9 = 450 kcal  (29%)   → 0.85 g/kg  (above 45 g hormone floor)\nCarb    150 g × 4 = 600 kcal  (39%)   → fills the remainder + fuels Pilates\nFiber    30 g                          → 19 g per 1,000 kcal (well above 14 g target)\n```\n\n**Why protein stays high *even though calories drop*:** in a deficit the body is willing to burn muscle for fuel. Eating ~2 g/kg protein + giving the muscle a reason to stay (Pilates) tells the body to spare lean tissue and pull from fat instead. Drop protein to \"fill calories\" and you lose the exact tissue that makes \"toned\" visible. **Protein is non-negotiable; carbs flex.**\n\n### Per-meal protein distribution\n\nMuscle protein synthesis responds best to **~25–40 g protein per sitting**, spread across the day — not one big dinner. Target landing zones:\n\n| Eating occasion | Protein target | Easy ways to hit it |\n|---|---|---|\n| Breakfast | 25–35 g | 1 cup nonfat Greek yogurt (23 g) + 1 scoop whey OR 3 eggs + cottage cheese |\n| Lunch | 30–35 g | 4–5 oz rotisserie chicken OR 1 can tuna + ½ can beans |\n| Dinner | 30–35 g | 5 oz salmon / shrimp / tofu / lean beef + edamame side |\n| Snack | 15–20 g | Protein shake, cottage cheese, edamame, or a protein bar |\n| **Total** | **~110–120 g** | |\n\n> **Optional Pilates-day tweak (keep it simple):** on the 2 Pilates days she can add ~15–20 g carbs + ~10 g protein around the session (e.g., yogurt + berries before, shake after). That's *plenty* — light activity does **not** need carb-loading or periodization. Don't overthink this.\n\n---\n\n## 4. High-Protein & High-Fiber Lazy Playbook\n\nRanked by **effort-to-protein** ratio — top of each list is the laziest win.\n\n### Protein sources (g per common portion)\n\n| Source | Portion | Protein | Lazy factor |\n|---|---|---|---|\n| Rotisserie chicken | 4 oz | 35 g | Pre-cooked, shred & toss |\n| Nonfat Greek yogurt | 1 cup (227 g) | 23 g | Open & eat |\n| Canned tuna / salmon | 1 can (5 oz) | 30 g | Pop-top, no cook |\n| Whey/plant protein powder | 1 scoop | 24 g | Blender/shaker, 30 sec |\n| Cottage cheese (low-fat) | 1 cup | 24 g | Open & eat |\n| Egg whites (carton) | ½ cup | 13 g | Microwave or pan |\n| Frozen edamame (shelled) | 1 cup | 18 g | Microwave 3 min |\n| Frozen cooked shrimp | 4 oz | 24 g | Thaw under tap, no cook |\n| Pre-baked tofu / TJ's tofu | ½ block | 18 g | Cube & toss |\n| Deli turkey (low-sodium) | 3 oz | 18 g | No cook |\n| Protein bar (RXBAR etc.) | 1 bar | 12–20 g | Grab & go |\n\n### Fiber sources (g per common portion) — ramp gradually\n\n| Source | Portion | Fiber | Lazy factor |\n|---|---|---|---|\n| Canned black/pinto beans | ½ cup | 7 g | Rinse & toss |\n| Raspberries / blackberries | 1 cup | 8 g | Open & eat |\n| Chia seeds | 2 tbsp | 10 g | Stir into yogurt |\n| Avocado | ½ | 5 g | Scoop |\n| Frozen broccoli / mixed veg | 1 cup | 5 g | Microwave |\n| Lentils (microwave pouch, TJ's) | ½ cup | 8 g | Heat & eat |\n| Oats (rolled) | ½ cup dry | 4 g | Overnight oats |\n| Edamame | 1 cup | 8 g | Microwave |\n| Chickpeas (canned) | ½ cup | 6 g | Rinse & toss / roast |\n| Whole-grain wrap / TJ's high-fiber | 1 | 5–10 g | Assemble |\n| Apple / pear (with skin) | 1 medium | 4–5 g | Grab & go |\n\n> **Fiber ramp (weeks 1–2):** jumping straight to 30 g from a lower baseline causes bloating and GI distress. Start where she is, add **~5 g every 3–4 days**, and **drink more water as fiber goes up** (fiber needs water to do its job). By end of week 2, 30 g should feel normal. Per meal: aim 8–10 g per main, 3–6 g per snack.\n\n---\n\n## 5. \"Toning\" — The Truth\n\nLet's be precise, because the fitness industry lies about this constantly:\n\n1. **You cannot spot-reduce.** Doing 100 crunches does not burn belly fat. Fat loss is systemic — diet sets the deficit; where fat leaves first is genetic, not chosen.\n2. **\"Toned\" is two things stacked:** (a) **lower body-fat %** so muscle shape shows through, and (b) **muscle retained or slightly built** so there *is* shape to show. Sam's plan delivers both: the gentle deficit + high protein handles (a); Pilates progression + adequate protein handles (b).\n3. **Pilates is a legitimate resistance stimulus** for a beginner-to-intermediate trainee — especially for core, glutes, and postural muscles. It's not heavy barbell training, but at her goal (look toned, not compete) it's exactly enough — *as long as she progresses it* (harder variations, springs, more reps over time) rather than doing the identical class forever.\n4. **Walking is the NEAT engine** — it quietly burns a meaningful chunk of the daily deficit without creating hunger or fatigue the way hard cardio does. It's the most underrated tool she has.\n\n### Realistic 6-month expectations\n\n| Outcome | Realistic? | Notes |\n|---|---|---|\n| Lose ~5 lb fat (→125) | ✅ Yes, by ~wk 8 | Gentle, sustainable |\n| Visibly leaner / more defined | ✅ Yes | Fat loss + muscle retention |\n| Noticeable muscle *shape* (glutes, core, arms) | ✅ Modest, realistic | Pilates progression + protein |\n| \"Six-pack abs\" / dramatic recomp | ⚠️ Unlikely in 6 mo | Would need heavier lifting + longer timeline |\n| Look toned **and keep it** | ✅ The whole point | Phases 2–4 lock it in |\n\nThe honest summary: **6 months gets her lean, defined, and confident at 125 lb — and, more importantly, with a system she can run forever.** Dramatic bodybuilder-style recomposition isn't the goal and isn't realistic on Pilates alone — and that's fine, because it's not what she asked for.\n\n---\n\n## 6. Female Micronutrients & Supplements (Honest Take)\n\nEven on a *mild* cut, a 23 yo woman should protect these. Whole foods first; supplement only the gaps.\n\n| Nutrient | Why it matters for her | Easy food sources | Supplement? |\n|---|---|---|---|\n| **Iron (+ vitamin C)** | Menstruating women lose iron monthly; low iron = fatigue, poor recovery. Vit C boosts absorption. | Lean beef, lentils, spinach, tofu + bell pepper/citrus alongside | Only if labs show low — get tested first |\n| **Calcium** | Bone density (peak bone mass is built in the 20s) | Greek yogurt, cottage cheese, tofu, fortified soy milk, sardines | Food-first; supplement only if dairy-free |\n| **Vitamin D** | Most people (esp. indoors) are low; supports bone + mood + immunity | Salmon, egg yolk, fortified milk | ✅ **Worth it** — 1,000–2,000 IU/day common, confirm with labs |\n| **Omega-3 (EPA/DHA)** | Anti-inflammatory, recovery, mood, skin | Salmon, sardines, canned tuna 2–3×/wk | ✅ Worth it if she rarely eats fish — ~1–2 g EPA+DHA |\n| **Magnesium** | Sleep, muscle relaxation; ~50% of women under-consume | Pumpkin seeds, dark chocolate, beans, leafy greens | Optional — glycinate form for sleep |\n\n### Supplement verdict (what's actually worth the money)\n\n| Supplement | Verdict | Why |\n|---|---|---|\n| **Protein powder** | ✅ **Yes** | Easiest way to hit 115 g protein lazily; whey or plant both fine |\n| **Creatine monohydrate (3–5 g/day)** | ✅ **Optional but genuinely helps** | Most-studied supplement on earth; supports strength + lean mass + a fuller \"toned\" look **even with Pilates**, not just heavy lifting. Take daily, timing irrelevant. Cheap. |\n| **Vitamin D** | ✅ Yes if low/indoors | Cheap insurance; confirm with a blood test |\n| **Omega-3 fish oil** | ✅ Yes if she rarely eats fish | Otherwise get it from food |\n| **Electrolytes** | ✅ Situational | Useful on big-walk days, hot CA weather, or higher water intake (see §7) |\n| Fat-burners / \"toning\" pills / detox teas | ❌ **No** | Waste of money, some are unsafe. The only fat-burner is the deficit. |\n\n### ⚠️ Energy-availability caution (this matters)\n\nEven a *mild* cut can tip into under-eating if she skips meals or over-restricts. **Do not drop below ~1,400 kcal.** Watch for these warning signs — if 2+ show up, **eat more, immediately**, and consider seeing a doctor:\n\n- Missed or irregular periods (the #1 red flag — *not* normal, *not* a sign it's \"working\")\n- Persistent fatigue, feeling cold, brittle hair/nails\n- Sleep disruption or low mood/irritability\n- Loss of strength or stalled-then-reversing progress\n- Obsessive food thoughts / hunger that doesn't respond to meals\n\nA 5 lb cut is **not worth** compromising hormonal health. The plan is deliberately gentle for exactly this reason.\n\n---\n\n## 7. Hydration\n\n| Target | Amount | Notes |\n|---|---|---|\n| Baseline water | **~2.2 L/day** (~9 cups) | More on big-walk days or hot CA weather |\n| With fiber ramp | +1–2 cups | Fiber needs water to prevent constipation |\n| Electrolytes | As needed | Sodium/potassium/magnesium on high-sweat or high-water days; prevents the \"drank a lot but still foggy\" feeling |\n| Practical cue | Urine pale-straw | Dark = drink more; clear-all-day = you can ease off |\n\nFront-load fluids earlier in the day so hydration isn't disrupting sleep. A glass of water before each meal also blunts appetite slightly — a free assist in the deficit phase.\n\n---\n\n## 8. The Anti-Boredom + Anti-Lazy Operating System\n\nThis is the part that makes the plan *survive contact with real life*. Two enemies: **boredom** and **friction**. Beat both with systems.\n\n### A. Batch-Cook-Once / Remix-All-Week\n\nCook components **once**, then *assemble* different meals from the same parts — same effort, different cuisines, zero boredom.\n\n| Batch component (cook once) | → Cal-Mex | → Mediterranean | → Japanese | → Thai |\n|---|---|---|---|---|\n| Shredded chicken | Taco bowl + black beans | Greek bowl + chickpeas + feta | Rice bowl + edamame + soy | Peanut-lime slaw bowl |\n| Roasted veg tray | Fajita bowl | Greek salad topping | Miso-glazed side | Curry-veg stir-fry |\n| Cooked grain (rice/quinoa) | Burrito bowl base | Tabbouleh-style | Sushi bowl base | Coconut-rice base |\n| Beans / lentils | Refried-style | Hummus / lentil salad | — | Red-curry lentils |\n\n**One ~45-min Sunday session** → 5–6 days of meals that *feel* like different restaurants. Assembly each day is **<10 min**.\n\n### B. The Protein + Fiber + Color Plate Formula\n\nWhen she doesn't want to think, build any plate from three slots — no recipe, no measuring:\n\n```\n1 PALM of PROTEIN   (chicken / fish / tofu / beans / yogurt)   → 25–35 g\n1 FIST of FIBER     (beans / berries / veg / whole grain)      → 8–10 g\n2 HANDS of COLOR    (any vegetables / fruit, the more the better)\n+ a THUMB of FAT    (avocado / olive oil / nuts)\n```\n\nHit those slots and the macros land themselves. This is the \"I'm tired and don't want to think\" default.\n\n### C. 80/20 Flexibility (especially Phase 4)\n\n- **80%** of meals follow the formula. **20%** is whatever she wants — tacos out, a pastry, wine.\n- No food is \"banned.\" Restriction breeds bingeing; flexibility breeds adherence.\n- The 5-lb cut phases run a *bit* tighter (~90/10); maintenance and Lock-In open up to a genuine **80/20** that she can run for life.\n\n### D. Variety mandates (because she gets bored)\n\n- **Rotate cuisines** across the 4 she loves — Cal-Mex, Mediterranean, Japanese, Thai — never the same cuisine two days running.\n- **Rotate formats** — bowl, wrap, salad, sheet-pan, soup, snack-plate — so even the same ingredients feel new.\n- **One new recipe or flavor per week**, max — enough novelty to stay engaged, not so much it becomes work.\n\n---\n\n## 9. How to Use the Rest of the System\n\nThis foundation document is the **\"why\" and the \"numbers.\"** The rest of the program turns it into food on a plate:\n\n| When you want to… | Go to… |\n|---|---|\n| Know *what to eat this week* | The **phase meal plans** (Phases 1–4) — built to these exact macros |\n| Cook efficiently | The **batch-cook & prep guides** — Sunday sessions, remix tables |\n| Shop fast | The **store-specific grocery lists** (Trader Joe's / Costco / Whole Foods / Sprouts) |\n| Grab something with zero planning | The **lazy / no-cook & assembly cheat-sheets** |\n| Check if you're on track | This doc's §2 recalibration rule + the **progress-tracking guide** |\n\n**The one-paragraph operating manual:** Run **Phase 1** at ~1,550 kcal / 115 g protein / 30 g fiber until the scale reads ~125 (≈8 weeks). Recalibrate from the scale at week 3. Then **reverse-diet** (Phase 2) up to ~1,850–1,900 to find true maintenance without rebound. **Phases 3–4** hold ~1,900 kcal at 80/20 — high protein, high fiber, lots of color, rotating cuisines, batch-and-remix prep — forever. That's the whole thing: *gentle, protein-forward, fiber-rich, endlessly varied, and easy enough that being a little lazy is built into the design.*\n"}, "phase-1": {"title": "Phase 1 · Reset & Gentle Cut", "md": "# Phase 1 — Reset & Gentle Cut (Weeks 1–8)\n\n> ⚠️ **The per-day macro totals in this menu are an earlier estimate.** Your live, USDA-accurate numbers are in the app's **Plan** tab and on each recipe — trust those over any figure written here.\n\n\n*Sam · 5'7\" · ~130 lb → 125 lb · lightly active (Pilates 2×/week + daily walks)*\n\n---\n\n## The goal of this phase\n\nLose ~5 lb of fat to land at 125 and look more toned — then **keep it there**. This is the on-ramp to a lifestyle, not a crash. We do it with a *gentle* deficit (~300–400 kcal under maintenance), a protein floor that protects your muscle so the weight you lose is fat (not tone), and enough fiber + volume that you're not hungry. No starving, no weird rules, no \"earn your food.\"\n\n**Daily target (cut day): ~1550 kcal · Protein ~115–125 g · Fiber ~30 g · Carb ~150 g · Fat ~50 g.**\n\nA note on the numbers below: this recipe library is deliberately protein- and fiber-dense (almost every dish is lean protein + beans/lentils/edamame), so most days land **protein ~120–140** even at these smaller portions. That's a feature, not a bug — high protein in a deficit is exactly what keeps you toned and full. Fiber **ramps from ~30 in week 1 up toward ~38–40** by the second week so your gut adjusts comfortably; drink water as it climbs.\n\n### The one rule: Pilates day vs. walk-only day\n\nYou are **lightly active**, not an athlete — so there is **no carb-loading, ever**. The adjustment is tiny:\n\n| | Walk-only day | Pilates day (2×/week) |\n|---|---|---|\n| Calories | Steady ~1550 | Steady ~1550 |\n| Carbs | ~150 g | Nudge up ~10–20 g (a little more rice/oats/grain at lunch) |\n| Extra | — | A **post-Pilates protein snack** within ~60 min (a smoothie, yogurt bark, or pudding from the list) |\n\nThat's it. Pilates is low-intensity core/resistance work — it doesn't need fueling like a workout, it just gets a slightly carb-forward day and a protein top-up to support recovery. Walk days stay flat and simple.\n\n**Maintenance days** (any day you want a little more, or a social meal): add a **2nd snack** and/or run the mains at full (1.0×) portions to reach **~1900 kcal**. Use these once you're at 125 to hold the line.\n\n### Prep cadence (you're a bit lazy — this is built for that)\n\n- **Sunday (~60–75 min, mostly hands-off):** Roast 1–2 sheet-pans of veg + a big batch of grain (quinoa/brown rice/farro), poach or buy a rotisserie chicken, cook one Instant-Pot main (chili / dal / lentils), and portion overnight oats / chia for the first few mornings. Make one master sauce.\n- **Wednesday (~15–20 min, light reset):** Re-up perishables — a fresh grain batch or salad kit, hard-boil or soy-marinate eggs, blend nothing in advance (smoothies are 4 min day-of). Quick top-off so the back half of the week stays as easy as the front.\n\nEverything below is **assemble, don't cook**: rotisserie chicken, canned beans/fish, frozen veg, bagged kits, microwave, blender, sheet-pan. Active prep is ≤20 min, most ≤10.\n\n---\n\n## The 14-Day Rotation\n\nRotate this block across Weeks 1–8 (≈4 passes), applying the **seasonal swaps** at the end so it never feels repeated. No dinner repeats inside the 14 days; cuisines rotate daily. ~2 Pilates days + ~5 walk days per week.\n\n> Portions show the **scale multiplier** vs. the library's standard serving (e.g. `0.75×` = three-quarters of the listed recipe). Daily totals sum the *scaled* macros.\n\n---\n\n### Day 1 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | PB-Banana Protein Waffles (Freezer Batch) | 1.0× |\n| Lunch | Californian Green Goddess Salmon Grain Bowl | 0.85× |\n| Snack | Wild Salmon Everything-Bagel Cucumber Boats | 1.0× |\n| Dinner | Korean Gochujang Beef & Edamame Bowl | 1.0× |\n\n**Daily totals:** ~1510 kcal · P 139 · Fiber 35 · C 103 · F 60\n*Week-1 ramp: lower-fiber, salmon-and-beef forward so your gut eases in. Pull the waffles from the freezer the night before.*\n\n---\n\n### Day 2 — Pilates 🧘\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Mediterranean Muffin-Tin Frittata Cups | 1.0× |\n| Lunch | Japanese Salmon Poke-Style Bowl | 0.85× |\n| Snack *(post-Pilates protein)* | Piña-Colada Tropical Recovery Smoothie | 0.6× |\n| Dinner | Cashew Chicken Stir-Fry | 1.0× |\n\n**Daily totals:** ~1561 kcal · P 150 · Fiber 32 · C 121 · F 52\n*Pilates day: the poke rice + smoothie give the small carb nudge and the post-session protein. Frittata cups are batch-baked Sunday.*\n\n---\n\n### Day 3 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Triple-Berry Protein Smoothie Bowl | 0.7× |\n| Lunch | Thai Larb-Style Chicken Lettuce & Rice Bowl | 1.0× |\n| Snack | Turkey Jerky, Apple + String-Cheese Snack Board | 1.0× |\n| Dinner | Baked Cod Puttanesca with White Beans | 1.0× |\n\n**Daily totals:** ~1526 kcal · P 147 · Fiber 34 · C 138 · F 44\n*Zero-cook snack, sheet-pan-easy dinner. The larb uses Sunday's poached chicken or a rotisserie bird.*\n\n---\n\n### Day 4 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Freezer Breakfast Burritos (Turkey & Black Bean) | 1.05× |\n| Lunch | Mediterranean Chicken Shawarma Quinoa Bowl | 0.95× |\n| Snack | Mango-Raspberry Greek Yogurt Bark | 1.0× |\n| Dinner | Instant-Pot Red Lentil & Rotisserie Chicken Dal | 1.0× |\n\n**Daily totals:** ~1511 kcal · P 137 · Fiber 37 · C 134 · F 47\n*Microwave the burrito, scoop the dal — a true lazy day. Bark is made-ahead and lives in the freezer.*\n\n---\n\n### Day 5 — Pilates 🧘\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Savory Miso-Parmesan Protein Oats | 1.0× |\n| Lunch | Cal-Mex Rotisserie Chicken Burrito Bowl | 0.75× |\n| Snack *(post-Pilates protein)* | Piña-Colada Tropical Recovery Smoothie | 0.6× |\n| Dinner | Sheet-Pan Shrimp Fajitas with Avocado | 1.0× |\n\n**Daily totals:** ~1479 kcal · P 136 · Fiber 36 · C 136 · F 44\n*Pilates day: burrito-bowl rice is the carb nudge; recovery smoothie right after class. Shrimp fajitas are a 10-min sheet-pan.*\n\n---\n\n### Day 6 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Greek Yogurt Power Bowl with Granola | 0.85× |\n| Lunch | Italian Tuscan Kale Caesar with Chicken & White Beans | 0.9× |\n| Snack | Wild Salmon Everything-Bagel Cucumber Boats | 1.0× |\n| Dinner | Chickpea Pasta Turkey Bolognese | 0.85× |\n\n**Daily totals:** ~1529 kcal · P 131 · Fiber 40 · C 127 · F 56\n*4-min yogurt bowl, bagged-kale Caesar upgrade. Bolognese is a Sunday batch you reheat.*\n\n---\n\n### Day 7 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Banana Protein Pancakes | 0.75× |\n| Lunch | Vietnamese-Style Shrimp & Edamame Soba Cold Bowl | 0.95× |\n| Snack | Savory Cottage Cheese Toast with Tomato + Hemp | 0.55× |\n| Dinner | Moroccan Chicken & Chickpea Tagine | 1.0× |\n\n**Daily totals:** ~1501 kcal · P 138 · Fiber 30 · C 158 · F 37\n*Lowest-fiber, highest-carb day of the block — a nice palate change. Cold soba bowl is fully no-cook from prep.*\n\n---\n\n### Day 8 — Pilates 🧘\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Mango-Coconut Protein Chia Pudding | 0.7× |\n| Lunch | Korean-Inspired Beef & Broccoli Brown Rice Power Bowl | 0.95× |\n| Snack *(post-Pilates protein)* | Edamame-Popcorn Movie Mix | 1.0× |\n| Dinner | Salsa Verde Chicken Tacos | 0.9× |\n\n**Daily totals:** ~1500 kcal · P 129 · Fiber 42 · C 151 · F 42\n*Pilates day: brown-rice bowl is the carb nudge; savory popcorn-edamame is the post-class protein crunch. Chia pudding made Sunday.*\n\n---\n\n### Day 9 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Cal-Mex Migas | 0.6× |\n| Lunch | Mediterranean Farro & White Bean Tuna Salad | 1.0× |\n| Snack | Turkey Jerky, Apple + String-Cheese Snack Board | 0.9× |\n| Dinner | Pesto Chicken Chickpea-Pasta Skillet | 1.0× |\n\n**Daily totals:** ~1537 kcal · P 121 · Fiber 42 · C 153 · F 50\n*Migas scaled down so the eggs/cheese stay rich without blowing the budget. Tuna salad uses canned fish + Sunday's farro.*\n\n---\n\n### Day 10 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Savory Cottage Cheese Avocado Bowl | 0.75× |\n| Lunch | Cal-Mex Black Bean & Corn Quinoa Mason Jar | 0.75× |\n| Snack | Mango-Raspberry Greek Yogurt Bark | 1.0× |\n| Dinner | Sheet-Pan Shrimp Fajitas with Avocado | 1.0× |\n\n**Daily totals:** ~1447 kcal · P 137 · Fiber 35 · C 113 · F 52\n*Two 5-min assemblies before noon. (Fajitas reappear here only because it's a different week's rotation slot — swap to Salsa Verde Tacos if you want zero repeats within one pass.)*\n\n---\n\n### Day 11 — Pilates 🧘\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Blueberry-Almond Protein Overnight Oats | 0.8× |\n| Lunch | Korean-Inspired Beef & Broccoli Brown Rice Power Bowl | 0.85× |\n| Snack *(post-Pilates protein)* | Banana-Walnut Protein Overnight Oats Jar | 0.65× |\n| Dinner | Sheet-Pan Miso-Glazed Salmon with Edamame & Broccoli | 0.55× |\n\n**Daily totals:** ~1474 kcal · P 116 · Fiber 33 · C 146 · F 48\n*Pilates day: oats + rice bowl supply the carb nudge; the oats-jar is your grab-and-go post-class protein. Miso salmon scaled to 0.55× keeps the day in budget — it's a rich dish.*\n\n---\n\n### Day 12 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Cal-Mex Tofu Scramble Taco Bowl | 0.85× |\n| Lunch | Californian Cobb-Style Power Salad | 0.8× |\n| Snack | Chocolate-Espresso Casein Protein Pudding | 0.6× |\n| Dinner | Mediterranean Chicken & Chickpea Sheet-Pan | 0.8× |\n\n**Daily totals:** ~1473 kcal · P 140 · Fiber 37 · C 110 · F 53\n*Plant-forward breakfast, big-volume Cobb salad, dessert-y pudding snack. Sheet-pan dinner is hands-off.*\n\n---\n\n### Day 13 — Walk 🚶\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Japanese Tamago & Salmon Rice Bowl | 0.85× |\n| Lunch | Thai Peanut Chicken Edamame-Pasta Cold Bowl | 0.75× |\n| Snack | No-Bake Peanut Butter Protein Bites | 1.0× |\n| Dinner | Chicken Sausage & White Bean Tuscan Skillet | 0.8× |\n\n**Daily totals:** ~1492 kcal · P 129 · Fiber 41 · C 123 · F 56\n*Two peanut hits today (lunch + bites) for variety. Cold Thai bowl is no-cook; one-pan Tuscan skillet for dinner.*\n\n---\n\n### Day 14 — Pilates 🧘\n| Meal | Dish (from library) | Portion |\n|---|---|---|\n| Breakfast | Mediterranean Microwave Egg & Chickpea Bowl | 0.7× |\n| Lunch | Japanese Teriyaki Tofu & Edamame Freekeh Bowl | 0.95× |\n| Snack *(post-Pilates protein)* | Chocolate-Espresso Casein Protein Pudding | 0.8× |\n| Dinner | Chicken & Black Bean Enchilada Bake | 0.95× |\n\n**Daily totals:** ~1596 kcal · P 135 · Fiber 39 · C 132 · F 62\n*Pilates day: freekeh bowl is the carb nudge; casein pudding is the post-class protein. Microwave breakfast + make-ahead enchilada bake = minimal effort to close the rotation.*\n\n---\n\n## 14-day scorecard (at a glance)\n\n| Day | Tag | kcal | P | Fiber | C | F |\n|---|---|---|---|---|---|---|\n| 1 | Walk | 1510 | 139 | 35 | 103 | 60 |\n| 2 | Pilates | 1561 | 150 | 32 | 121 | 52 |\n| 3 | Walk | 1526 | 147 | 34 | 138 | 44 |\n| 4 | Walk | 1511 | 137 | 37 | 134 | 47 |\n| 5 | Pilates | 1479 | 136 | 36 | 136 | 44 |\n| 6 | Walk | 1529 | 131 | 40 | 127 | 56 |\n| 7 | Walk | 1501 | 138 | 30 | 158 | 37 |\n| 8 | Pilates | 1500 | 129 | 42 | 151 | 42 |\n| 9 | Walk | 1537 | 121 | 42 | 153 | 50 |\n| 10 | Walk | 1447 | 137 | 35 | 113 | 52 |\n| 11 | Pilates | 1474 | 116 | 33 | 146 | 48 |\n| 12 | Walk | 1473 | 140 | 37 | 110 | 53 |\n| 13 | Walk | 1492 | 129 | 41 | 123 | 56 |\n| 14 | Pilates | 1596 | 135 | 39 | 132 | 62 |\n| **Avg** | | **~1510** | **~134** | **~37** | **~132** | **~50** |\n\nAverage lands right at the gentle-deficit target (~1550), protein well above the floor (toned-protective), fiber ramping into the 30s–40s, fat ~50. If a day feels heavy, shave the snack to 0.5×; if you're genuinely hungry, that's your cue to take it to a maintenance day, not to white-knuckle it.\n\n---\n\n## Seasonal swaps (to stretch the block across all 8 weeks)\n\nSame skeleton, fresh produce — keeps Weeks 1–8 from ever feeling like the same fortnight. CA-seasonal, all from Trader Joe's / Costco / Whole Foods / Sprouts:\n\n- **Berries → stone fruit (late spring/summer):** in the Triple-Berry Smoothie Bowl, Blueberry-Almond Oats, and yogurt barks, swap blueberries for fresh peaches, nectarines, or cherries.\n- **Broccoli → asparagus or green beans (spring):** in the Miso Salmon and Korean Beef & Broccoli bowls, sub seasonal spring greens.\n- **Winter squash → summer squash/zucchini:** in the Moroccan Tagine and any sheet-pan veg medley.\n- **Citrus season (winter):** brighten the Larb, Poke, and Green Goddess bowls with blood orange or Cara Cara segments.\n- **Tomatoes (peak summer):** upgrade Cod Puttanesca, Cottage Cheese Toast, and Migas with fresh heirloom/Campari tomatoes instead of canned.\n- **Corn (summer):** add fresh grilled corn to the Cal-Mex Quinoa Jar and Burrito Bowl.\n- **Greens rotation:** alternate the salad bases — kale → little gem → arugula → cabbage slaw — across the Caesar, Cobb, and shawarma bowls so the same dish reads new.\n- **Protein rotation within a slot:** any \"rotisserie chicken\" lunch can flip to canned tuna, baked tofu, or jammy eggs (from Anchors) to keep cost and boredom down.\n\n---\n\n## 3 emergency lazy / no-cook fallbacks\n\nFor the nights you've got nothing prepped and zero willpower to cook — all assemble-only, all on-target for a cut day. Pull one in place of that day's dinner (or lunch):\n\n1. **3-Minute Rotisserie Chicken Power Bowl** — 510 kcal · P 43 · Fib 12. Rotisserie chicken + a bagged grain/green base + a spoon of sauce. Done in 4 minutes.\n2. **Trader Joe's Smoked Salmon & Egg Protein Plate** — 460 kcal · P 39 · Fib 9. Pre-cooked eggs + smoked salmon + cucumber/crackers straight from the fridge.\n3. **CAVA \"Greens + Grains, Double Protein\"** *(or the Chipotle \"Double-Chicken Salad Bowl,\" 615 kcal · P 54)* — 585 kcal · P 45 · Fib 14. Order out, double the protein, skip the pita/extra rice. Fully on-plan when you're out of the house.\n\n> Honest note: a no-cook fallback dinner runs ~460–615 kcal on its own, so on a fallback night keep the rest of the day lighter (drop the snack, run breakfast/lunch at ~0.7×) to stay near 1550 — or just call it a maintenance day. No guilt either way; the habit you're building is *consistency*, not perfection.\n"}, "phase-2": {"title": "Phase 2 · Reach & Reverse", "md": "# Phase 2: Reach & Reverse — Meal Plan (Weeks 9–13)\n\n> ⚠️ **The per-day macro totals in this menu are an earlier estimate.** Your live, USDA-accurate numbers are in the app's **Plan** tab and on each recipe — trust those over any figure written here.\n\n\n> *You hit 125. Now we make it stick — California kitchen, assembly-first, zero crash-diet energy.*\n\n## The Phase in One Breath\n\nThe cut did its job — you're at 125 lb and looking tighter. **Phase 2 is the part most people skip and then rebound from.** Instead of staying pinned at 1,550 forever (which stalls and backfires), we *gently walk calories back up* — about **+75 kcal each week** — so your body relearns maintenance without storing the difference as fat. This is a reverse diet: same high-protein, high-fiber foods that kept you full and toned, just slightly bigger portions each week as your appetite and metabolism rise to meet them. You stay lean, you stop white-knuckling, and the result becomes your normal.\n\nEverything below is still lazy-genius: bagged kits, rotisserie chicken, canned fish, frozen veg, sheet pans, the blender, the microwave. Active hands-on time is **≤20 min, most ≤10**.\n\n### Daily Macro Target — stepping UP across the 5 weeks\n\n| Week | Daily Energy | Protein | Fiber | What's happening |\n|---|---|---|---|---|\n| **Week 9** | ~1,550 kcal | 110–120 g | 28–32 g | Same as end-of-cut — settle in |\n| **Week 10** | ~1,625 kcal | 110–120 g | 28–32 g | First step up (+75) |\n| **Week 11** | ~1,700 kcal | 110–120 g | 28–32 g | +75 |\n| **Week 12** | ~1,775 kcal | 110–120 g | 28–32 g | +75 |\n| **Week 13** | ~1,850 kcal | 110–120 g | 28–32 g | Near maintenance — the new normal |\n\n**How to add the weekly +75 without rewriting anything:** the 14-day menu below is written at the **Week-9 (~1,550) baseline**. Each week after, add calories with the levers in this exact order — they're already portioned in the library:\n\n1. **Week 10:** add one **Chili-Lime Crunchy Roasted Chickpeas** (156 kcal) as a 2nd snack ~2–3 days/wk → averages ~+60–75/day.\n2. **Week 11:** bump your **grain anchor** to 1.0× (most lunches already carry it) **or** add a **Triple-Grain Base** ½-portion (~105 kcal) to 3 dinners/wk.\n3. **Week 12:** take the **lighter dinners back to full 1.0×** (drop the 0.8× scaling) and/or add a daily piece of fruit alongside snacks.\n4. **Week 13:** add a 2nd snack **daily** (pick a 230–280 kcal one) and run all mains at 1.0×. You're now eating like maintenance.\n\n> Protein stays **high every single week** — the menu lands ~120–155 g/day because these are protein-dense recipes, and that's intentional: in a reverse diet, holding protein up is what keeps you toned while the carbs rise. You're not earning protein with workouts; you're protecting muscle while calories climb. The **floor is 110 g** and no day drops below it.\n\n### The \"Pilates Day vs Walk-Only Day\" Rule — *not* athletic carb-loading\n\nYou are **lightly active**: regular walks (that's NEAT, it's already baked into your maintenance) plus **Pilates 2×/week** (low-intensity core + resistance). This is not training that needs glycogen loading. So the rule is gentle:\n\n- **Pilates days (~2/week):** nudge carbs **slightly** up and place a **protein-forward snack within ~1–2 hrs after** (a smoothie, yogurt bark, or cottage-cheese item) so your core work has amino acids to rebuild with. That's it — a small lean, not a feast.\n- **Walk-only days (~5/week):** keep it **steady** at the week's target. No carb cut, no carb load. Consistency is the whole game in a reverse diet.\n\nThe day tags below (🟢 **Pilates** / 🚶 **Walk**) already place the small carb nudge and the post-Pilates protein for you. **No day is a \"cheat\" day and no day is a \"starve\" day** — that's the anti-rebound design.\n\n### Prep Cadence — Sunday (big) + Wednesday (light)\n\nYou cook **twice a week** and *assemble* the other five days.\n\n- **SUNDAY (~40 min — the big batch):**\n  - Poach **Big-Batch Poached Chicken, Seasoned 3 Ways** (covers burrito bowls, Caesar, Cobb, shawarma).\n  - Cook the **Triple-Grain Base** (quinoa / brown rice / farro) — your carb dial for the weekly step-ups.\n  - Make one **Instant-Pot dinner ahead** (chili, dal, or tagine) — it covers 2 dinners.\n  - Build 3–4 **Overnight Oats Master Base** / **Blueberry-Almond Protein Overnight Oats** jars.\n  - Roast the **Sheet-Pan Roasted Veg Medley**.\n- **WEDNESDAY (~20 min — light refresh):**\n  - Re-season the chicken with a new flavor so the rotation doesn't get boring.\n  - Bake **Marinated Baked Tofu + Edamame** and **Batch Soy-Marinated Jammy Eggs**.\n  - Whisk one sauce (**Peanut-Lime**, **Lemon-Tahini**, or **Greek-Yogurt Ranch**).\n  - Restock cut crudité + freeze a **Mango-Raspberry Greek Yogurt Bark** tray.\n\nEverything else is \"open container, combine, eat.\"\n\n---\n\n## The 14-Day Rotating Menu\n\n*Written at the **Week-9 ~1,550 kcal baseline**. Macros are summed directly from the recipe library at the stated portions. \"0.8×\" means scale that dish to 80% — noted inline. Use the weekly +75 levers above to walk each subsequent week up. No dinner repeats across the 14 days; cuisines rotate daily.*\n\n### WEEK A\n\n---\n\n**DAY 1 — Monday · 🟢 Pilates**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Mediterranean Muffin-Tin Frittata Cups | 1× |\n| Lunch | Mediterranean Farro & White Bean Tuna Salad | 1× |\n| Snack (post-Pilates) | Green Goddess Avocado-Mango Protein Smoothie | 1× |\n| Dinner | Korean Gochujang Beef & Edamame Bowl | 1× |\n\n**Daily totals:** **1,675 kcal · P154 · Fiber35 · C115 · F58**\n*Pilates-day nudge: the smoothie lands within the hour post-session as your protein + a little carb to recover the core work.*\n\n---\n\n**DAY 2 — Tuesday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | PB-Banana Protein Waffles (Freezer Batch) | 1× |\n| Lunch | Thai Larb-Style Chicken Lettuce & Rice Bowl | 1× |\n| Snack | Wild Salmon Everything-Bagel Cucumber Boats | 1× |\n| Dinner | Baked Cod Puttanesca with White Beans | 1× |\n\n**Daily totals:** **1,521 kcal · P150 · Fiber30 · C117 · F42**\n*Three lean proteins (chicken, salmon, cod) keep protein high while calories sit at the cut baseline. Steady walk day — no carb load.*\n\n---\n\n**DAY 3 — Wednesday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Triple-Berry Protein Smoothie Bowl | 1× |\n| Lunch | Cal-Mex Black Bean & Corn Quinoa Mason Jar | 0.8× |\n| Snack | Tuna-Avocado Seaweed Crunch Wraps | 1× |\n| Dinner | Instant-Pot Red Lentil & Rotisserie Chicken Dal | 1× |\n\n**Daily totals:** **1,554 kcal · P132 · Fiber41 · C140 · F39**\n*Light-prep Wednesday — the dal was made Sunday, the smoothie bowl and jar are pure assembly. Fiber peaks at 41 g; lentils + beans do the work.*\n\n---\n\n**DAY 4 — Thursday · 🟢 Pilates**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Banana Protein Pancakes | 1× |\n| Lunch | Italian Tuscan Kale Caesar with Chicken & White Beans | 1× |\n| Snack (post-Pilates) | Mango-Raspberry Greek Yogurt Bark | 1× |\n| Dinner | Sheet-Pan Shrimp Fajitas with Avocado | 1× |\n\n**Daily totals:** **1,648 kcal · P191 · Fiber35 · C156 · F51**\n*Pilates-day carbs sit a touch higher (pancakes). The yogurt bark is your easy post-session protein straight from the freezer.*\n\n---\n\n**DAY 5 — Friday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Mango-Coconut Protein Chia Pudding | 1× |\n| Lunch | Vietnamese-Style Shrimp & Edamame Soba Cold Bowl | 1× |\n| Snack | Chili-Lime Crunchy Roasted Chickpeas | 1× |\n| Dinner | Moroccan Chicken & Chickpea Tagine | 1× |\n\n**Daily totals:** **1,572 kcal · P127 · Fiber43 · C159 · F51**\n*A globe-trot day — California, Vietnam, Cal-Mex, Morocco. Both lunch and dinner are make-ahead. Highest-fiber day of the week.*\n\n---\n\n**DAY 6 — Saturday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Savory Cottage Cheese Avocado Bowl | 0.8× |\n| Lunch | Cal-Mex Rotisserie Chicken Burrito Bowl | 0.8× |\n| Snack | Edamame-Popcorn Movie Mix | 1× |\n| Dinner | Cashew Chicken Stir-Fry | 1× |\n\n**Daily totals:** **1,563 kcal · P145 · Fiber33 · C141 · F44**\n*Saturday-night-in vibe — popcorn mix is the movie snack. Two mains scaled to 0.8× keep the baseline while letting you eat the foods you love.*\n\n---\n\n**DAY 7 — Sunday · 🟢 Pilates**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Cal-Mex Tofu Scramble Taco Bowl | 1× |\n| Lunch | Californian Cobb-Style Power Salad | 0.8× |\n| Snack (post-Pilates) | Pina-Colada Tropical Recovery Smoothie | 1× |\n| Dinner | Chickpea Pasta Turkey Bolognese | 1× |\n\n**Daily totals:** **1,675 kcal · P159 · Fiber47 · C151 · F49**\n*Sunday is big-prep day — keep it easy with assembly meals. Tropical smoothie is the post-Pilates protein. Fiber tops 45 g from tofu, beans, and chickpea pasta.*\n\n---\n\n### WEEK B\n\n---\n\n**DAY 8 — Monday · 🟢 Pilates**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Japanese Tamago & Salmon Rice Bowl | 0.8× |\n| Lunch | Mediterranean Chicken Shawarma Quinoa Bowl | 1× |\n| Snack (post-Pilates) | Cottage Cheese Cookie-Dough Fluff | 1× |\n| Dinner | Instant-Pot Turkey & Three-Bean Chili | 1× |\n\n**Daily totals:** **1,719 kcal · P162 · Fiber35 · C145 · F50**\n*Pilates day — rice bowl gives the small carb nudge, cookie-dough fluff is the casein-style post-session protein (and feels like dessert).*\n\n---\n\n**DAY 9 — Tuesday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Greek Yogurt Power Bowl with Granola | 0.8× |\n| Lunch | Korean-Inspired Beef & Broccoli Brown Rice Power Bowl | 1× |\n| Snack | Hummus + Crudité with Everything-Spiced Cottage Cheese Dip Duo | 1× |\n| Dinner | Pesto Chicken Chickpea-Pasta Skillet | 1× |\n\n**Daily totals:** **1,592 kcal · P116 · Fiber41 · C158 · F49**\n*Steady walk day. The crudité-and-dip snack is a fiber + protein two-fer; dinner is a one-pan skillet you can have ready in 8 minutes.*\n\n---\n\n**DAY 10 — Wednesday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Savory Miso-Parmesan Protein Oats | 1× |\n| Lunch | Californian Green Goddess Salmon Grain Bowl | 0.8× |\n| Snack | Spicy Tuna Crunch Cracker Stacks | 1× |\n| Dinner | Salsa Verde Chicken Tacos | 1× |\n\n**Daily totals:** **1,566 kcal · P157 · Fiber28 · C137 · F43**\n*Light-prep Wednesday — oats and stacks are assembly, tacos use the re-seasoned batch chicken. Salmon grain bowl scaled to 0.8× to hold the line.*\n\n---\n\n**DAY 11 — Thursday · 🟢 Pilates**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Mediterranean Microwave Egg & Chickpea Bowl | 0.8× |\n| Lunch | Cal-Mex Black Bean & Corn Quinoa Mason Jar | 1× |\n| Snack (post-Pilates) | Chocolate-Espresso Casein Protein Pudding | 1× |\n| Dinner | Thai Green Curry Tofu & Chickpeas | 1× |\n\n**Daily totals:** **1,672 kcal · P143 · Fiber44 · C141 · F59**\n*Pilates day — quinoa jar at full 1× is the carb nudge, casein pudding is the slow post-session protein. Plant-forward dinner pushes fiber to 44 g.*\n\n---\n\n**DAY 12 — Friday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Freezer Breakfast Burritos (Turkey & Black Bean) | 1× |\n| Lunch | Japanese Salmon Poke-Style Bowl | 0.8× |\n| Snack | Turkey Jerky, Apple + String-Cheese Snack Board | 1× |\n| Dinner | Mediterranean Chicken & Chickpea Sheet-Pan | 1× |\n\n**Daily totals:** **1,607 kcal · P140 · Fiber30 · C134 · F58**\n*Grab-and-go Friday — burrito and snack board need zero cooking, sheet-pan dinner is one tray. Poke bowl at 0.8× keeps the day on target.*\n\n---\n\n**DAY 13 — Saturday · 🚶 Walk**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Blueberry-Almond Protein Overnight Oats | 0.8× |\n| Lunch | Middle-Eastern Falafel & Edamame Pita Wrap | 0.8× |\n| Snack | No-Bake Peanut Butter Protein Bites | 1× |\n| Dinner | Furikake Baked Salmon Rice Bowl | 0.8× |\n\n**Daily totals:** **1,604 kcal · P122 · Fiber37 · C159 · F47**\n*A treat-leaning Saturday — falafel wrap and a furikake salmon bowl, both dialed to 0.8× so the bigger flavors still fit the baseline. Oats jar was made Sunday.*\n\n---\n\n**DAY 14 — Sunday · 🟢 Pilates**\n\n| Meal | Dish | Portion |\n|---|---|---|\n| Breakfast | Cal-Mex Migas | 0.8× |\n| Lunch | Thai Peanut Chicken Edamame-Pasta Cold Bowl | 1× |\n| Snack (post-Pilates) | Banana-Walnut Protein Overnight Oats Jar | 1× |\n| Dinner | Chicken Sausage & White Bean Tuscan Skillet | 1× |\n\n**Daily totals:** **1,678 kcal · P150 · Fiber45 · C152 · F53**\n*Closes the rotation on a Pilates day — migas at 0.8× still satisfies, the overnight-oats jar doubles as post-session protein, Tuscan skillet brings fiber to 45 g.*\n\n---\n\n## Extend the Block: Seasonal Swaps (so 14 days never feels like 14 days)\n\nRotate these in across Weeks 9–13 — same dish slot, fresh produce and flavor. CA seasonal availability noted.\n\n| Swap out | Swap in | When / why |\n|---|---|---|\n| Blueberry-Almond Protein Overnight Oats | **Triple-Berry Protein Smoothie Bowl** | Peak CA berries (late spring–summer) — Sprouts/Whole Foods flats are cheap and sweet |\n| Mango-Coconut Protein Chia Pudding | **Pina-Colada Tropical Recovery Smoothie** (as breakfast) | Champagne mango season at Trader Joe's — leans tropical |\n| Mediterranean Farro & White Bean Tuna Salad | **Mediterranean Lentil Tabbouleh Bowl with Feta** | Summer tomato + herb season — tabbouleh tastes best with peak produce |\n| Cal-Mex Black Bean & Corn Quinoa Mason Jar | **Cal-Mex Rotisserie Chicken Burrito Bowl** (0.8×) | Sweet CA corn in late summer makes the jar; rotate to burrito bowl off-season |\n| Moroccan Chicken & Chickpea Tagine | **Instant-Pot Turkey & Three-Bean Chili** | Cooler months — both are make-ahead Instant-Pot dinners, swap freely |\n| Sheet-Pan Shrimp Fajitas with Avocado | **Sheet-Pan Miso-Glazed Salmon with Edamame & Broccoli** (0.8×) | When CA avocados peak (spring) lean fajitas; otherwise the salmon sheet-pan |\n| Californian Green Goddess Salmon Grain Bowl | **Californian Cobb-Style Power Salad** (0.8×) | Heat-of-summer cold-salad rotation — keep the kitchen off |\n| Thai Larb-Style Chicken Lettuce & Rice Bowl | **Japanese Teriyaki Tofu & Edamame Freekeh Bowl** | Plant-forward week — swaps a meat lunch for a tofu one without losing protein |\n\n**Higher-week tip (Weeks 12–13):** when you swap a 0.8× main back to a full 1.0× version, that *is* your weekly +75–120 step-up — let the seasonal swap and the reverse-diet bump be the same move.\n\n---\n\n## 3 Emergency Lazy / No-Cook Fallbacks\n\nFor the nights you've got nothing prepped and zero energy. All from the library, all sized to the baseline — no cooking, ~2–8 min.\n\n1. **3-Minute Rotisserie Chicken Power Bowl** (510 kcal · P43 · Fib12) — Costco rotisserie chicken + a bagged kit + microwave grain pouch. Pair with **Greek-Yogurt Ranch** if you want it saucier. *Your default \"I didn't prep\" dinner.*\n2. **Trader Joe's Smoked Salmon & Egg Protein Plate** (460 kcal · P39 · Fib9) — smoked salmon, pre-boiled eggs, cucumber, everything seasoning. Zero stove. *Lowest-effort, highest-protein-per-minute on the list.*\n3. **High-Protein Mediterranean Girl-Dinner Board** (545 kcal · P41 · Fib11) — hummus, feta, olives, cherry tomatoes, turkey or tuna, whole-grain crackers. *The \"I want to graze, not cook\" answer — still lands 41 g protein.*\n\n> On a fallback night, just **skip that day's planned dinner and snack** and slot the fallback in — each one already lands a balanced ~460–545 kcal with 39–43 g protein, so your day still hits the week's target without any math.\n"}, "phase-3": {"title": "Phase 3 · Tone & Maintain", "md": "# Phase 3: Tone & Maintain — Weeks 14-20\n\n> ⚠️ **The per-day macro totals in this menu are an earlier estimate.** Your live, USDA-accurate numbers are in the app's **Plan** tab and on each recipe — trust those over any figure written here.\n\n\n**Sam | Female, 23 | 5'7\", ~130 → 125 lb | Lightly active (walks + Pilates 2x/week)**\n\n---\n\n## The goal for this phase\n\nYou've done the hard part. Phase 3 isn't about restricting harder — it's about **holding your weight steady while your body keeps tightening up**. We feed enough to support recovery and energy, keep protein high so the toning you're building in Pilates actually shows, and keep fiber high so you stay full and regular without thinking about it. The scale should mostly *hold*; the mirror and your clothes keep improving. This is the eating style you keep for good.\n\n**Daily target:** ~1,900 kcal · **Protein ~115 g** · **Fiber 28-32 g** · balanced carbs & fat.\n\n### The one rule: Pilates day vs. walk-only day\n\n| | What changes | Why |\n|---|---|---|\n| **Pilates day** (2x/week) | Add a **2nd snack**, lean on full (1.0×) portions, and put a **protein snack within ~2 hrs after class**. Lands ~1,900-1,950. | Light resistance work + the protein hit helps muscle repair and toning. That's it — **no carb-loading**, you're not fueling a marathon. |\n| **Walk-only day** (~5x/week) | Keep it steady — usually one snack, slightly tighter portions. Lands ~1,850-1,900. | Walking is NEAT (incidental movement). It doesn't need extra fuel; we just keep protein and fiber high and calories at maintenance. |\n\nThe difference is small and deliberate — roughly 80-120 kcal and one extra protein snack. Maintenance means *steady*, not a roller coaster.\n\n### Prep cadence (lazy-friendly)\n\n- **Sunday (~45 min):** Batch the anchors — **Big-Batch Poached Chicken**, a **Triple-Grain Base**, **Sheet-Pan Roasted Veg Medley**, **Batch Soy-Marinated Jammy Eggs**, and one Instant-Pot dish (chili or dal). That's 80% of your week pre-built to *assemble*, not cook.\n- **Wednesday (~15 min):** Light reset — re-poach or grab a fresh rotisserie chicken, refill cut veg/edamame, restock yogurt & cottage cheese. Keeps the back half of the week as easy as the front.\n\nMost days below are **assembly, not cooking** — active prep ≤20 min, most ≤10.\n\n---\n\n## The 14-Day Rotating Menu\n\n> Rotate this across Weeks 14-20. Dinners never repeat within the 14 days; cuisines rotate daily. Macros below sum the **scaled** library values shown.\n\n### WEEK A\n\n**Day 1 — Pilates 🧘 (Mediterranean → Thai → Mexican)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Mediterranean Muffin-Tin Frittata Cups (1.0×) |\n| Lunch | Thai Peanut Chicken Edamame-Pasta Cold Bowl (1.0×) |\n| Snack | Chili-Lime Crunchy Roasted Chickpeas (1.0×) |\n| Dinner | Sheet-Pan Shrimp Fajitas with Avocado (1.0×) |\n| 2nd snack (post-Pilates) | Mango-Raspberry Greek Yogurt Bark (1.0×) |\n\n**Daily totals:** ~1,669 kcal · **P 177** · Fiber 50 · C 127 · F 52\n*Note: Protein and fiber run high here — a clean, filling Pilates day; the post-class yogurt bark is your recovery protein.*\n\n---\n\n**Day 2 — Walk 🚶 (American → Cal-Mex → Japanese)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | PB-Banana Protein Waffles (1.0×) |\n| Lunch | Cal-Mex Rotisserie Chicken Burrito Bowl (0.85×) |\n| Snack | Tuna-Avocado Seaweed Crunch Wraps (1.0×) |\n| Dinner | Sheet-Pan Miso-Glazed Salmon with Edamame & Broccoli (0.85×) |\n\n**Daily totals:** ~1,414 kcal · **P 113** · Fiber 30 · C 110 · F 47\n*Note: Lighter walk day — salmon scaled to 0.85× keeps the fat in check while protein holds.*\n\n---\n\n**Day 3 — Walk 🚶 (California → Italian → Mexican)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Triple-Berry Protein Smoothie Bowl (1.0×) |\n| Lunch | Italian Tuscan Kale Caesar with Chicken & White Beans (1.0×) |\n| Snack | Hummus + Crudité with Everything-Spiced Cottage Cheese Dip Duo (1.0×) |\n| Dinner | Instant-Pot Turkey & Three-Bean Chili (1.0×) |\n\n**Daily totals:** ~1,686 kcal · **P 116** · Fiber 43 · C 150 · F 49\n*Note: Big-fiber day (43 g) — the chili + chickpea dip carry it; very satiating for a walk day.*\n\n---\n\n**Day 4 — Pilates 🧘 (Japanese → Korean → Indian)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Japanese Tamago & Salmon Rice Bowl (1.0×) |\n| Lunch | Korean-Inspired Beef & Broccoli Brown Rice Power Bowl (1.0×) |\n| Snack | Chocolate-Espresso Casein Protein Pudding (1.0×) |\n| Dinner | Instant-Pot Red Lentil & Rotisserie Chicken Dal (1.0×) |\n| 2nd snack (post-Pilates) | Edamame-Popcorn Movie Mix (1.0×) |\n\n**Daily totals:** ~1,791 kcal · **P 152** · Fiber 39 · C 173 · F 67\n*Note: Pilates day with the casein pudding as your post-class protein; full portions, a touch more carb. No loading — just steady fuel.*\n\n---\n\n**Day 5 — Walk 🚶 (Mediterranean → Vietnamese → Italian)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Greek Yogurt Power Bowl with Granola (1.0×) |\n| Lunch | Vietnamese-Style Shrimp & Edamame Soba Cold Bowl (1.0×) |\n| Snack | Wild Salmon Everything-Bagel Cucumber Boats (1.0×) |\n| Dinner | Baked Cod Puttanesca with White Beans (1.0×) |\n\n**Daily totals:** ~1,685 kcal · **P 155** · Fiber 38 · C 158 · F 39\n*Note: Lean-seafood day — three protein sources, very low fat, easy on the stomach.*\n\n---\n\n**Day 6 — Walk 🚶 (Mexican → Californian → Moroccan)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Freezer Breakfast Burritos (Turkey & Black Bean) (1.0×) |\n| Lunch | Californian Cobb-Style Power Salad (1.0×) |\n| Snack | No-Bake Peanut Butter Protein Bites (1.0×) |\n| Dinner | Moroccan Chicken & Chickpea Tagine (1.0×) |\n\n**Daily totals:** ~1,617 kcal · **P 145** · Fiber 32 · C 145 · F 60\n*Note: Freezer burrito + bagged-greens Cobb = near-zero cooking. Tagine is a 12-min Instant-Pot win.*\n\n---\n\n**Day 7 — Pilates 🧘 (California → Cal-Mex → Chinese)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Mango-Coconut Protein Chia Pudding (1.0×) |\n| Lunch | Cal-Mex Black Bean & Corn Quinoa Mason Jar (1.0×) |\n| Snack | Spicy Tuna Crunch Cracker Stacks (1.0×) |\n| Dinner | Cashew Chicken Stir-Fry (1.0×) |\n| 2nd snack (post-Pilates) | Green Goddess Avocado-Mango Protein Smoothie (1.0×) |\n\n**Daily totals:** ~1,937 kcal · **P 176** · Fiber 49 · C 197 · F 56\n*Note: Highest-carb day of the block (still balanced) — lands right on maintenance for a Pilates day. The green smoothie is your post-class protein.*\n\n---\n\n### WEEK B\n\n**Day 8 — Walk 🚶 (Mediterranean → Mediterranean → Italian)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Mediterranean Microwave Egg & Chickpea Bowl (0.9×) |\n| Lunch | Mediterranean Chicken Shawarma Quinoa Bowl (1.0×) |\n| Snack | Turkey Jerky, Apple + String-Cheese Snack Board (1.0×) |\n| Dinner | Chickpea Pasta Turkey Bolognese (1.0×) |\n\n**Daily totals:** ~1,797 kcal · **P 137** · Fiber 35 · C 159 · F 60\n*Note: Microwave-egg breakfast scaled to 0.9× to keep fat moderate; the rest is grab-and-go.*\n\n---\n\n**Day 9 — Walk 🚶 (American → Greek → Korean)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Banana Protein Pancakes (0.8×) |\n| Lunch | Greek Mason-Jar Chickpea & Feta Salad (0.85×) |\n| Snack | Edamame-Popcorn Movie Mix (1.0×) |\n| Dinner | Korean Gochujang Beef & Edamame Bowl (1.0×) |\n\n**Daily totals:** ~1,597 kcal · **P 141** · Fiber 33 · C 134 · F 50\n*Note: Two scaled items keep this leaner; pancakes at 0.8× still deliver 44 g protein.*\n\n---\n\n**Day 10 — Pilates 🧘 (Japanese → Japanese → Mediterranean)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Savory Miso-Parmesan Protein Oats (1.0×) |\n| Lunch | Japanese Teriyaki Tofu & Edamame Freekeh Bowl (1.0×) |\n| Snack | Cottage Cheese Cookie-Dough Fluff (1.0×) |\n| Dinner | Pesto Chicken Chickpea-Pasta Skillet (1.0×) |\n| 2nd snack (post-Pilates) | Pina-Colada Tropical Recovery Smoothie (1.0×) |\n\n**Daily totals:** ~1,953 kcal · **P 183** · Fiber 50 · C 168 · F 67\n*Note: Plant-forward Pilates day; the recovery smoothie post-class. Full portions hit maintenance cleanly.*\n\n---\n\n**Day 11 — Walk 🚶 (Mediterranean → Mediterranean → Indian/Mexican)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Savory Cottage Cheese Avocado Bowl (0.8×) |\n| Lunch | Mediterranean Farro & White Bean Tuna Salad (1.0×) |\n| Snack | Banana-Walnut Protein Overnight Oats Jar (1.0×) |\n| Dinner | Salsa Verde Chicken Tacos (1.0×) |\n\n**Daily totals:** ~1,751 kcal · **P 145** · Fiber 39 · C 167 · F 51\n*Note: Avocado bowl at 0.8× to manage the fat; tuna salad + tacos keep protein and fiber up with no real cooking.*\n\n---\n\n**Day 12 — Walk 🚶 (Mexican → Cal-Mex → Mediterranean)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Cal-Mex Migas (0.75×) |\n| Lunch | Cal-Mex Rotisserie Chicken Burrito Bowl (0.85×) |\n| Snack | Tuna-Avocado Seaweed Crunch Wraps (1.0×) |\n| Dinner | Mediterranean Chicken & Chickpea Sheet-Pan (1.0×) |\n\n**Daily totals:** ~1,766 kcal · **P 158** · Fiber 36 · C 145 · F 67\n*Note: Migas scaled to 0.75× (it's a rich one); sheet-pan dinner is a single tray, zero fuss.*\n\n---\n\n**Day 13 — Pilates 🧘 (California → Thai → Japanese)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Savory Cottage Cheese Avocado Bowl (0.85×) |\n| Lunch | Thai Larb-Style Chicken Lettuce & Rice Bowl (1.0×) |\n| Snack | Thai Peanut Edamame-Chicken Crunch Bowl (1.0×) |\n| Dinner | Furikake Baked Salmon Rice Bowl (0.85×) |\n| 2nd snack (post-Pilates) | Mango-Raspberry Greek Yogurt Bark (1.0×) |\n\n**Daily totals:** ~1,932 kcal · **P 174** · Fiber 38 · C 152 · F 80\n*Note: Salmon bowl at 0.85× keeps fat reasonable on a higher-fat day; yogurt bark is the post-class protein. A treat-feeling Pilates day.*\n\n---\n\n**Day 14 — Walk 🚶 (Mexican → California → Mexican)**\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Cal-Mex Tofu Scramble Taco Bowl (1.0×) |\n| Lunch | 3-Minute Rotisserie Chicken Power Bowl (1.0×) |\n| Snack | Wild Salmon Everything-Bagel Cucumber Boats (1.0×) |\n| Dinner | Chicken & Black Bean Enchilada Bake (1.0×) |\n\n**Daily totals:** ~1,682 kcal · **P 140** · Fiber 49 · C 162 · F 58\n*Note: Highest-fiber finish (49 g) — fully plant-and-lean-protein driven. No-cook lunch closes out an easy day.*\n\n---\n\n### 14-day check\n\n- **Protein:** every day lands **113-183 g** — comfortably above your ~115 floor, which is exactly what holds tone in maintenance.\n- **Fiber:** **30-50 g** daily — at or above the 28-32 target every single day.\n- **Calories:** Pilates days cluster ~1,790-1,950; walk days ~1,410-1,800; weekly average sits at maintenance (~1,900). The natural day-to-day variance is fine and even helpful — your weekly total is what governs weight.\n- **No dinner repeats** across all 14 days; cuisines rotate daily so boredom never sets in.\n\n---\n\n## Seasonal swaps (to extend the block past Week 14)\n\nKeep the structure, swap the produce so it tracks California's growing season:\n\n| Swap this | For this | When |\n|---|---|---|\n| Mango (chia pudding, smoothies, bark) | **Stone fruit / strawberries** | Late spring–summer |\n| Blueberry / triple-berry | **Peaches, apricots, figs** | Summer |\n| Roasted veg medley = broccoli/peppers | **Zucchini, corn, cherry tomatoes** | Summer |\n| Kale Caesar base | **Little Gem / butter lettuce** | Spring |\n| Tagine / chili (warming) | Lean harder on **cold poke, soba, larb, mason-jar salads** | Hot months |\n| Cucumber boats / crudité | **Snap peas, radishes, heirloom tomato** | Spring–summer |\n| Furikake salmon, miso salmon | **Grilled-style swaps** (same recipe, grill instead of oven) | Summer |\n\nReverse them in fall/winter (back to roasted veg, tagine, chili, warm dal) and the same 14 days feel brand new.\n\n---\n\n## 3 emergency lazy / no-cook fallbacks\n\nWhen you're fried, traveling, or just *done* — grab one of these instead of skipping a meal. All are from the library, all assemble in ≤8 min, all keep protein high:\n\n1. **High-Protein Mediterranean Girl-Dinner Board** — 545 kcal · P41 · Fib11 · 7 min. Open packages, plate, done.\n2. **Chipotle 'Double-Chicken Salad Bowl'** — 615 kcal · P54 · Fib15 · 2 min. Order out, double protein, light on rice. Highest-protein bailout.\n3. **Trader Joe's Smoked Salmon & Egg Protein Plate** — 460 kcal · P39 · Fib9 · 5 min. Pure assembly from TJ's staples — your lowest-effort, lowest-cal rescue.\n\n*Pair any fallback with one snack (e.g. Edamame-Popcorn Movie Mix or a yogurt bark) on a Pilates day to top up to maintenance.*\n\n---\n\n**File:** `/Users/akmbp/Documents/Sam-Meal-Prep/03-meal-plans/phase-3-tone-and-maintain.md`"}, "phase-4": {"title": "Phase 4 · Lifestyle Lock-In", "md": "# Phase 4 — Lifestyle Lock-In (Weeks 21–26)\n\n> ⚠️ **The per-day macro totals in this menu are an earlier estimate.** Your live, USDA-accurate numbers are in the app's **Plan** tab and on each recipe — trust those over any figure written here.\n\n\n**This is just how you eat now.** Phases 1–3 did the work; this block is about making it automatic, flexible, and impossible to get bored of. No food is \"off-limits,\" no day requires willpower, and your weekend out with friends never breaks anything. You're holding ~125 lb, staying toned, and proving to yourself that you can run this on autopilot for life.\n\n### The daily target\n- **Energy:** ~1,900 kcal/day (true maintenance for a lightly-active 59 kg woman)\n- **Protein:** 110–120 g — this is the toned-look anchor; it never drops\n- **Fiber:** 28–32 g — keeps you full and your digestion happy\n- **Format:** flexible 80/20. Most days hit the macros; some days are dinner-with-friends and that's *built in*, not a cheat.\n\n### Pilates day vs walk-only day — the only rule you need\nYou are lightly active, not training for anything, so the swing is small and gentle:\n\n| | **Pilates day** (2×/week) | **Walk-only day** (NEAT) |\n|---|---|---|\n| Carbs | Slightly higher — full-portion grain bowls, the carbier breakfasts | Steady — leaner mains, no need to push carbs |\n| Protein timing | Add a **post-Pilates protein snack** (smoothie/yogurt within ~an hour) | Snacks placed wherever hunger lands |\n| Total kcal | Same ~1,900 — you're just shifting *where* the carbs sit | Same ~1,900 |\n\nNo carb-loading, no \"fueling,\" no recovery-shake science. Pilates is low-intensity core/resistance — a smoothie is plenty. The calories are the *same* every day; Pilates days just lean a touch more into grains and a post-class protein hit so you feel good.\n\n### Prep cadence (lazy-proof)\n- **Sunday (~45 min):** Run 2–3 **Anchors** — Big-Batch Poached Chicken, a Triple-Grain Base, Sheet-Pan Roasted Veg Medley, and a sauce (Peanut-Lime or Lemon-Tahini). Hard-boil/jammy a batch of eggs. This alone makes 8 of the next meals pure *assembly*.\n- **Wednesday (~15 min, light):** Top up — one fresh grain or protein, restock cut veg, mix overnight oats for the back half of the week. That's it.\n\nEverything below is **assemble, blend, sheet-pan, Instant-Pot, or no-cook.** Active prep is ≤20 min, most ≤10.\n\n---\n\n## The 14-Day Rotating Menu\n\n> Rotate this across Weeks 21–26. Macros shown are the **summed library values at the listed portion/scale**, landing near 1,900 kcal / P110–120 / Fiber 28–32.\n\n---\n\n### Day 1 — Monday · *Pilates*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Greek Yogurt Power Bowl with Granola — **1.0×** |\n| Lunch | Cal-Mex Rotisserie Chicken Burrito Bowl — **0.85×** |\n| Snack (post-Pilates) | Green Goddess Avocado-Mango Protein Smoothie — **1.0×** |\n| Dinner | Baked Cod Puttanesca with White Beans — **1.0×** |\n| 2nd snack | Chili-Lime Crunchy Roasted Chickpeas — **1.0×** |\n\n**Daily totals:** ~1,901 kcal · **P 116** · Fiber 30 · C 178 · F 56\n*Pilates day: carbier yogurt-granola start + a smoothie within an hour of class.*\n\n---\n\n### Day 2 — Tuesday · *Walk*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Mediterranean Muffin-Tin Frittata Cups — **1.0×** |\n| Lunch | Thai Peanut Chicken Edamame-Pasta Cold Bowl — **1.0×** |\n| Snack | Mango-Raspberry Greek Yogurt Bark — **1.0×** |\n| Dinner | Korean Gochujang Beef & Edamame Bowl — **1.0×** + Triple-Grain Base — **1.0×** |\n\n**Daily totals:** ~1,895 kcal · **P 119** · Fiber 32 · C 142 · F 63\n*Walk day: leaner protein-forward bowls; grain added to dinner for staying power.*\n\n---\n\n### Day 3 — Wednesday · *Walk*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Banana Protein Pancakes — **0.9×** |\n| Lunch | Mediterranean Farro & White Bean Tuna Salad — **1.0×** |\n| Snack | Wild Salmon Everything-Bagel Cucumber Boats — **1.0×** |\n| Dinner | Cashew Chicken Stir-Fry — **1.0×** + Sheet-Pan Roasted Veg Medley — **1.0×** |\n| 2nd snack | No-Bake Peanut Butter Protein Bites — **1.0×** |\n\n**Daily totals:** ~1,889 kcal · **P 117** · Fiber 31 · C 152 · F 57\n*Light Wednesday prep day — lean on Sunday's farro + poached chicken.*\n\n---\n\n### Day 4 — Thursday · *Pilates*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Cal-Mex Tofu Scramble Taco Bowl — **1.0×** |\n| Lunch | Korean-Inspired Beef & Broccoli Brown Rice Power Bowl — **1.0×** |\n| Snack (post-Pilates) | Pina-Colada Tropical Recovery Smoothie — **1.0×** |\n| Dinner | Sheet-Pan Shrimp Fajitas with Avocado — **1.0×** |\n\n**Daily totals:** ~1,880 kcal · **P 117** · Fiber 33 · C 184 · F 47\n*Pilates day: carb-friendly rice bowl + tropical protein smoothie after class.*\n\n---\n\n### Day 5 — Friday · *Walk*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Triple-Berry Protein Smoothie Bowl — **1.0×** |\n| Lunch | Californian Cobb-Style Power Salad — **1.0×** |\n| Snack | Turkey Jerky, Apple + String-Cheese Snack Board — **1.0×** |\n| Dinner | Furikake Baked Salmon Rice Bowl — **0.85×** |\n\n**Daily totals:** ~1,862 kcal · **P 116** · Fiber 30 · C 147 · F 64\n*Walk day; salmon scaled to 0.85× to keep fat in range alongside the smoothie bowl.*\n\n---\n\n### Day 6 — Saturday · *Walk* (social-life-proof)\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Savory Cottage Cheese Avocado Bowl — **1.0×** |\n| Lunch | Chipotle 'Double-Chicken Salad Bowl' — **1.0×** *(no-cook, out & about)* |\n| Snack | Edamame-
