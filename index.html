const EXCLUDES=[['vegetarian','Vegetarian',r=>!r.diet.vegetarian],['vegan','Vegan',r=>!r.diet.vegan],['dairy_free','No dairy',r=>r.contains.includes('dairy')],['gluten_free','No gluten',r=>r.contains.includes('gluten')],['no_fish','No fish',r=>r.contains.includes('fish')],['no_shellfish','No shellfish',r=>r.contains.includes('shellfish')],['no_pork','No pork',r=>r.contains.includes('pork')],['no_egg','No eggs',r=>r.contains.includes('egg')],['no_nuts','No nuts',r=>r.contains.includes('nuts')],['no_soy','No soy',r=>r.contains.includes('soy')]];

// ---------- emoji + color ----------
function emoji(r){const n=(r.name+' '+r.cuisine).toLowerCase();
  const map=[['shrimp','🦐'],['salmon','🐟'],['tuna','🐟'],['cod','🐟'],['fish','🐟'],['taco','🌮'],['fajita','🌮'],['enchilada','🌮'],['burrito','🌯'],['wrap','🌯'],['pita','🌯'],['shawarma','🌯'],['pancake','🥞'],['waffle','🥞'],['oats','🥣'],['smoothie','🥤'],['shake','🥤'],['chia','🍮'],['pudding','🍮'],['fluff','🍮'],['bark','🍦'],['yogurt','🍦'],['popcorn','🍿'],['jerky','🥓'],['chili','🍲'],['dal','🍲'],['lentil','🍲'],['curry','🍲'],['tagine','🍲'],['soup','🍲'],['bolognese','🍝'],['pasta','🍝'],['noodle','🍜'],['soba','🍜'],['chickpea','🧆'],['falafel','🧆'],['hummus','🧆'],['salad','🥗'],['caesar','🥗'],['cobb','🥗'],['greens','🥗'],['board','🧀'],['plate','🧀'],['cracker','🧀'],['migas','🍳'],['frittata','🍳'],['tamago','🍳'],['scramble','🍳'],['egg','🍳'],['poke','🍣'],['rice','🍚'],['quinoa','🍚'],['freekeh','🍚'],['farro','🍚'],['bowl','🥣'],['stir-fry','🥘'],['gochujang','🥘'],['sauce','🥫'],['ranch','🥫'],['tahini','🥫'],['pesto','🌿'],['veg','🥦'],['edamame','🫛'],['chicken','🍗'],['beef','🥩'],['turkey','🦃'],['tofu','🟫']];
  for(const[k,e]of map)if(n.includes(k))return e;
  return {breakfast:'🍳',lunch:'🥗',dinner:'🍽️',snacks:'🍎',anchors:'🧱',nocook:'🥡'}[r.category]||'🍴';}
function hue(c){let h=0;for(const ch of (c||''))h=(h*31+ch.charCodeAt(0))%360;return h;}
function thumbStyle(r){const h=hue(r.cuisine);return `background:linear-gradient(135deg,hsl(${h} 55% 88%),hsl(${(h+40)%360} 55% 80%))`;}

// ---------- state ----------
const KEY='samKitchen_v2';
function balanceDay(slots,target){let base=0;for(const s of Object.values(slots))if(s&&RX[s.r])base+=RX[s.r].kcal*s.p;
  if(base<=0)return;const f=target/base;for(const k in slots){if(slots[k]){let p=Math.round(slots[k].p*f*4)/4;slots[k].p=Math.min(2,Math.max(.5,p));}}}
function defaultState(){
  const wk={};DAYS.forEach(d=>{wk[d]={};(STARTER[d]||[]).forEach((nm,i)=>{wk[d][SLOTS[i]]={r:nm,p:1};});});
  const s={onboarded:false,settings:{weightLb:130,goalLb:125,heightIn:67,age:23,activity:1.4,phase:'cut',startDate:null,manualKcal:null},
    excludes:{},favorites:[],ratings:{},week:wk,shopChecked:{},shopCustom:[],shopExtra:[],hideStaples:true,log:{},weights:[],
    reminders:{notify:false,prep:true,weigh:true,protein:true},dismissed:{},lastBackup:null};
  DAYS.forEach(d=>balanceDay(s.week[d],1550));
  return s;}
let S;try{S=Object.assign(defaultState(),JSON.parse(localStorage.getItem(KEY)||'{}'));}catch(e){S=defaultState();}
// migrate week slot strings -> {r,p}
DAYS.forEach(d=>{if(!S.week[d])S.week[d]={};for(const k in S.week[d]){const v=S.week[d][k];if(typeof v==='string')S.week[d][k]={r:v,p:1};}});
if(!S.settings)S.settings=defaultState().settings;
if(!S.reminders)S.reminders={notify:false,prep:true,weigh:true,protein:true};
function save(){localStorage.setItem(KEY,JSON.stringify(S));}

// ---------- targets ----------
function phaseForWeek(w){return w<=8?'cut':w<=13?'reverse':'maintain';}
function currentWeek(){if(!S.settings.startDate)return 1;const ms=Date.now()-new Date(S.settings.startDate).getTime();return Math.max(1,Math.floor(ms/6048e5)+1);}
function targets(){const s=S.settings,kg=s.weightLb/2.2046,cm=s.heightIn*2.54;
  const bmr=10*kg+6.25*cm-5*s.age-161,tdee=(s.manualKcal?s.manualKcal:bmr*s.activity);
  const cut=Math.round((tdee-350)/10)*10,maint=Math.round(tdee/10)*10;
  const ph=s.phase, kcal=s.manualKcal?Math.round(s.manualKcal/10)*10:(ph==='cut'?cut:ph==='reverse'?Math.round((cut+maint)/2/10)*10:maint);
  const protein=Math.round(kg*1.9/5)*5;
  return {bmr:Math.round(bmr),tdee:Math.round(s.manualKcal||bmr*s.activity),cut,maint,kcal,protein,fiber:30,iron:18,calcium:1000};}

// ---------- helpers ----------
const UNI={'½':.5,'¼':.25,'¾':.75,'⅓':1/3,'⅔':2/3,'⅛':.125};
function parseQty(q){if(q==null)return null;q=String(q).trim();if(!q)return null;if(UNI[q]!=null)return UNI[q];
  let m=q.match(/^(\d+)\s+(\d+)\/(\d+)$/);if(m)return +m[1]+(+m[2]/+m[3]);m=q.match(/^(\d+)\/(\d+)$/);if(m)return +m[1]/+m[2];const n=parseFloat(q);return isNaN(n)?null:n;}
function fmtQty(n){if(n==null)return '';const w=Math.floor(n+1e-9),fr=n-w;for(const[v,s]of[[.5,'½'],[1/3,'⅓'],[2/3,'⅔'],[.25,'¼'],[.75,'¾']])if(Math.abs(fr-v)<.06)return(w?w+s:s);if(Math.abs(fr)<.06)return String(w);return String(Math.round(n*100)/100);}
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function n(x){return Math.round(Number(x)||0);}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekdayShort(){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1600);}
function isExcluded(r){for(const[k,,test]of EXCLUDES)if(S.excludes[k]&&test(r))return true;return false;}
function macroTotalsLog(entries){const t={kcal:0,protein_g:0,fiber_g:0,carb_g:0,fat_g:0,iron_mg:0,calcium_mg:0};(entries||[]).forEach(e=>{const r=RX[e.r||e];if(!r)return;const p=e.p||1;for(const k in t)t[k]+=(+r[k]||0)*p;});return t;}

// ---------- router ----------
let route='today';
function go(r){route=r;document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.go===r));render();window.scrollTo(0,0);}
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('[data-go]');if(a){e.preventDefault();go(a.dataset.go);}});
function render(){const v=document.getElementById('view');document.getElementById('hdr-extra').innerHTML='';
  const T={today:['☀️ Today',viewToday,bindToday],recipes:['🍴 Recipes',viewRecipes,bindRecipes],plan:['🗓️ This Week',viewPlan,bindPlan],shop:['🛒 Shopping',viewShop,bindShop],me:['⚙️ Me',viewMe,bindMe]}[route];
  document.getElementById('title').textContent=T[0];v.innerHTML=T[1]();T[2]();}

// ---------- TODAY ----------
function dueNudges(){const out=[];const wd=weekdayShort();const tk=todayKey();
  if(S.reminders.prep&&(wd==='Sun'||wd==='Wed')&&!S.dismissed['prep-'+tk])out.push(['prep','🍳','Prep day — batch a couple anchors so this week is just assembly.']);
  const hasW=S.weights.some(w=>w.date===tk);
  if(S.reminders.weigh&&!hasW&&!S.dismissed['weigh-'+tk])out.push(['weigh','⚖️','Quick weigh-in? Morning, after the bathroom, is most consistent.']);
  const t=targets(),tot=macroTotalsLog(S.log[tk]||[]);const hr=new Date().getHours();
  if(S.reminders.protein&&hr>=17&&tot.protein_g<t.protein*0.7&&!S.dismissed['prot-'+tk])out.push(['prot','💪',`You're at ${n(tot.protein_g)}g protein — about ${n(t.protein-tot.protein_g)}g to go. Make dinner protein-forward.`]);
  return out;}
function viewToday(){const t=targets(),tk=todayKey(),eaten=(S.log[tk]||[]),tot=macroTotalsLog(eaten);
  const pPct=Math.min(100,tot.protein_g/t.protein*100),kPct=Math.min(100,tot.kcal/t.kcal*100),fPct=Math.min(100,tot.fiber_g/t.fiber*100);
  const R=52,C=2*Math.PI*R,off=C*(1-pPct/100);const wd=weekdayShort();
  const plan=S.week[wd]||{};const planNames=Object.values(plan).map(s=>s&&s.r);
  const slotRows=SLOTS.map(sl=>{const s=plan[sl];if(!s)return '';const on=eaten.some(e=>e.r===s.r&&Math.abs((e.p||1)-s.p)<.01);
    return `<div class="slot"><span class="lab">${sl}</span><span class="nm">${emoji(RX[s.r]||{})} ${esc(s.r)}${s.p!==1?` <span class="tiny muted">${s.p}×</span>`:''}</span><button class="eat ${on?'on':''}" data-eat='${esc(JSON.stringify(s))}'>${on?'✓':'＋'}</button></div>`;}).join('')||'<div class="muted small" style="padding:8px 2px">No meals planned today — add some in Plan.</div>';
  const offRows=eaten.filter(e=>!planNames.includes(e.r)).map(e=>`<div class="slot"><span class="lab">extra</span><span class="nm">${emoji(RX[e.r]||{})} ${esc(e.r)}</span><button class="eat on" data-eat='${esc(JSON.stringify(e))}'>✓</button></div>`).join('');
  const w=S.weights.slice(-14),wmin=Math.min(...w.map(x=>x.lb),S.settings.goalLb),wmax=Math.max(...w.map(x=>x.lb),S.settings.weightLb);
  const spark=w.length?`<div class="spark">${w.map(x=>{const h=wmax>wmin?(x.lb-wmin)/(wmax-wmin)*100:50;return `<i style="height:${Math.max(8,h)}%" title="${x.date}: ${x.lb}"></i>`}).join('')}</div>`:'<div class="muted tiny">Log your weight to see the trend.</div>';
  const last=w.length?w[w.length-1].lb:S.settings.weightLb;
  const cw=currentWeek();
  const nudges=dueNudges().map(([k,e,m])=>`<div class="nudge"><span style="font-size:20px">${e}</span><span class="small">${esc(m)}</span><button class="x" data-nudge="${k}">×</button></div>`).join('');
  const cal=calibration();
  const o3=omega3ThisWeek();
  return `${nudges}
  <div class="card"><div class="ring-wrap">
    <svg class="ring" width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="${R}" fill="none" stroke="var(--card2)" stroke-width="11"/><circle cx="60" cy="60" r="${R}" fill="none" stroke="var(--acc)" stroke-width="11" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/><text x="60" y="55" text-anchor="middle" font-size="22" font-weight="800" fill="var(--ink)">${n(tot.protein_g)}</text><text x="60" y="74" text-anchor="middle" font-size="11" fill="var(--mut)">/ ${t.protein}g P</text></svg>
    <div style="flex:1"><div class="small muted">Calories</div><div class="row"><b>${n(tot.kcal)}</b><span class="muted small">/ ${t.kcal} kcal</span></div><div class="bar ${kPct>108?'red':''}"><i style="width:${kPct}%"></i></div>
      <div class="small muted" style="margin-top:8px">Fiber</div><div class="row"><b>${n(tot.fiber_g)}</b><span class="muted small">/ ${t.fiber}g</span></div><div class="bar ${fPct<60?'amber':''}"><i style="width:${fPct}%"></i></div></div></div>
    <div class="mini"><div><div class="tiny muted">Iron ${n(tot.iron_mg)}/${t.iron}mg</div><div class="bar ${tot.iron_mg<t.iron*.6?'amber':''}"><i style="width:${Math.min(100,tot.iron_mg/t.iron*100)}%"></i></div></div>
      <div><div class="tiny muted">Calcium ${n(tot.calcium_mg)}/${t.calcium}mg</div><div class="bar ${tot.calcium_mg<t.calcium*.6?'amber':''}"><i style="width:${Math.min(100,tot.calcium_mg/t.calcium*100)}%"></i></div></div></div>
    <div class="tiny muted" style="margin-top:10px">Week ${cw} · phase <b>${S.settings.phase}</b> · omega-3 meals this week: <b>${o3}</b>/3 · <a href="#" data-go2="me">adjust ›</a></div>
  </div>
  ${cal?`<div class="card" style="border-color:var(--acc)"><b class="small">📈 Reality check (measured)</b><div class="small" style="margin-top:5px">${cal.msg}</div><button class="btn sm" id="applycal" style="margin-top:8px">Use ${cal.suggest} kcal target</button></div>`:''}
  <div class="card"><div class="row" style="margin-bottom:6px"><b>Today's meals (${wd})</b><span class="sp"></span><span class="tiny muted">tap ＋ when eaten</span></div>${slotRows}${offRows}</div>
  <div class="card"><div class="row"><b>Weight</b><span class="sp"></span><span class="muted small">last ${last} lb · goal ${S.settings.goalLb}</span></div><div style="margin:8px 0">${spark}</div>
    <div class="row"><input id="wt" type="number" inputmode="decimal" placeholder="Today's weight (lb)" style="flex:1"><button class="btn sm" id="wtsave">Log</button></div></div>`;}
function bindToday(){
  document.querySelectorAll('[data-eat]').forEach(b=>b.onclick=()=>{const s=JSON.parse(b.dataset.eat);const k=todayKey();S.log[k]=S.log[k]||[];
    const i=S.log[k].findIndex(e=>e.r===s.r&&Math.abs((e.p||1)-(s.p||1))<.01);if(i>=0)S.log[k].splice(i,1);else S.log[k].push({r:s.r,p:s.p||1});save();render();});
  document.querySelectorAll('[data-nudge]').forEach(b=>b.onclick=()=>{S.dismissed[b.dataset.nudge+'-'+todayKey()]=1;save();render();});
  const ws=document.getElementById('wtsave');if(ws)ws.onclick=()=>{const v=parseFloat(document.getElementById('wt').value);if(isNaN(v))return;S.weights=S.weights.filter(x=>x.date!==todayKey());S.weights.push({date:todayKey(),lb:v});S.weights.sort((a,b)=>a.date<b.date?-1:1);save();toast('Weight logged');render();};
  const ac=document.getElementById('applycal');if(ac)ac.onclick=()=>{const c=calibration();S.settings.manualKcal=c.tdee;save();toast('Target updated from your data');render();};
  document.querySelectorAll('[data-go2]').forEach(a=>a.onclick=e=>{e.preventDefault();go(a.dataset.go2);});
  maybeNotify();}
function omega3ThisWeek(){const now=new Date();let c=0;for(let i=0;i<7;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');(S.log[k]||[]).forEach(e=>{if((RX[e.r]||{}).omega3)c++;});}return c;}
// instrument-then-calibrate
function calibration(){const w=S.weights;if(w.length<2)return null;const first=w[0],last=w[w.length-1];
  const days=(new Date(last.date)-new Date(first.date))/864e5;if(days<14)return null;
  // mean logged intake over days that have logs within window
  let sum=0,cnt=0;for(const k in S.log){if(k>=first.date&&k<=last.date){const t=macroTotalsLog(S.log[k]);if(t.kcal>500){sum+=t.kcal;cnt++;}}}
  if(cnt<7)return null;const meanIntake=sum/cnt;const dLb=last.lb-first.lb;
  const tdee=Math.round((meanIntake-(dLb*3500/days))/10)*10;const est=targets().tdee;
  const suggest=Math.round((tdee-350)/10)*10;
  return {tdee,suggest,msg:`Over ${Math.round(days)} days you ate ~${n(meanIntake)} kcal/day and changed ${dLb>0?'+':''}${dLb.toFixed(1)} lb. That puts your <b>real maintenance ≈ ${tdee} kcal</b> (the estimate was ${est}). For ~0.6 lb/wk, target ~${suggest}.`};}
function maybeNotify(){if(!S.reminders.notify||!('Notification'in window)||Notification.permission!=='granted')return;
  const due=dueNudges();const tk=todayKey();due.forEach(([k,e,m])=>{const key='notif-'+k+'-'+tk;if(!S.dismissed[key]){try{new Notification("Sam's Kitchen",{body:m,icon:''});}catch(x){}S.dismissed[key]=1;}});save();}

// ---------- RECIPES ----------
const rState={q:'',cat:'all',time:99,sort:'smart'};
function viewRecipes(){const cats=[['all','All'],['breakfast','Breakfast'],['lunch','Lunch'],['dinner','Dinner'],['snacks','Snacks'],['anchors','Anchors'],['nocook','No-cook']];
  const chips=cats.map(([k,l])=>`<span class="chip ${rState.cat===k?'on':''}" data-cat="${k}">${l}</span>`).join('');
  return `<input id="rq" type="search" placeholder="Search recipe, ingredient, cuisine…" value="${esc(rState.q)}"><div class="chips">${chips}</div>
   <div class="row" style="gap:8px;margin-bottom:6px"><select id="rtime" style="flex:1"><option value="99">Any time</option><option value="5">≤ 5 min</option><option value="10">≤ 10 min</option></select>
   <select id="rsort" style="flex:1"><option value="smart">For you</option><option value="protein">Most protein</option><option value="fiber">Most fiber</option><option value="time">Fastest</option><option value="kcal">Fewest cals</option></select></div>
   <div class="muted tiny" id="rcount" style="margin:4px 2px 8px"></div><div class="rgrid" id="rgrid"></div>`;}
function recipeMatches(r){if(isExcluded(r))return false;if(rState.cat!=='all'&&r.category!==rState.cat)return false;if((r.prep_min||0)>rState.time)return false;
  if(rState.q){const h=[r.name,r.cuisine,(r.tags||[]).join(' '),(r.ingredients||[]).map(i=>i.item).join(' ')].join(' ').toLowerCase();if(!h.includes(rState.q))return false;}return true;}
function rcard(r){const fav=S.favorites.includes(r.name);return `<div class="rc" data-open="${esc(r.name)}"><div class="thumb" style="${thumbStyle(r)}">${emoji(r)}</div><button class="fav ${fav?'on':''}" data-fav="${esc(r.name)}">${fav?'♥':'♡'}</button>
  <div class="body"><h3>${esc(r.name)}</h3><div class="meta">${esc(r.cuisine)} · ${n(r.prep_min)} min${S.ratings[r.name]?' · '+'★'.repeat(S.ratings[r.name]):''}</div>
  <div class="macros"><span class="macro">${n(r.kcal)} kcal</span><span class="macro p">${n(r.protein_g)}g P</span><span class="macro fb">${n(r.fiber_g)}g fib</span></div></div></div>`;}
function paintRecipes(){let rows=RECIPES.filter(recipeMatches);
  rows.sort((a,b)=>{if(rState.sort==='smart'){const sa=(S.favorites.includes(a.name)?1000:0)+(S.ratings[a.name]||0)*100+a.protein_g,sb=(S.favorites.includes(b.name)?1000:0)+(S.ratings[b.name]||0)*100+b.protein_g;return sb-sa;}return rState.sort==='protein'?b.protein_g-a.protein_g:rState.sort==='fiber'?b.fiber_g-a.fiber_g:rState.sort==='time'?a.prep_min-b.prep_min:a.kcal-b.kcal;});
  const hidden=RECIPES.filter(isExcluded).length;
  document.getElementById('rgrid').innerHTML=rows.map(rcard).join('')||'<div class="muted">No matches.</div>';
  document.getElementById('rcount').innerHTML=`${rows.length} recipes${hidden?` · ${hidden} hidden by your filters (<a href="#" data-go3="me">edit</a>)`:''}`;
  document.querySelectorAll('[data-open]').forEach(c=>c.onclick=e=>{if(e.target.closest('[data-fav]'))return;openRecipe(c.dataset.open);});
  document.querySelectorAll('[data-fav]').forEach(b=>b.onclick=e=>{e.stopPropagation();toggleFav(b.dataset.fav);paintRecipes();});
  document.querySelectorAll('[data-go3]').forEach(a=>a.onclick=e=>{e.preventDefault();go('me');});}
function bindRecipes(){const q=document.getElementById('rq');q.oninput=()=>{rState.q=q.value.toLowerCase();paintRecipes();};
  document.querySelectorAll('[data-cat]').forEach(c=>c.onclick=()=>{rState.cat=c.dataset.cat;render();});
  document.getElementById('rtime').onchange=e=>{rState.time=+e.target.value;paintRecipes();};
  const so=document.getElementById('rsort');so.value=rState.sort;so.onchange=e=>{rState.sort=e.target.value;paintRecipes();};paintRecipes();}
function toggleFav(nm){const i=S.favorites.indexOf(nm);if(i>=0)S.favorites.splice(i,1);else S.favorites.push(nm);save();}

// ---------- RECIPE DETAIL ----------
let detailMult=1;
function openRecipe(name){const r=RX[name];if(!r)return;detailMult=1;const el=document.createElement('div');el.className='sheet';el.id='sheet';el.innerHTML=renderDetail(r);document.body.appendChild(el);document.body.style.overflow='hidden';bindDetail(r);}
function closeSheet(){const s=document.getElementById('sheet');if(s)s.remove();document.body.style.overflow='';}
function renderDetail(r){const ings=(r.ingredients&&r.ingredients.length)?r.ingredients:(r.key_ingredients||[]).map(s=>({qty:'',unit:'',item:s,staple:false}));
  const ingHTML=ings.map((i,idx)=>{const q=parseQty(i.qty);const shown=q!=null?fmtQty(q*detailMult):(i.qty||'');const amt=[shown,i.unit].filter(Boolean).join(' ');
    return `<label class="ck"><input type="checkbox" data-ck="${idx}"><span><b>${amt?esc(amt)+' ':''}</b>${esc(i.item)}${i.staple?' <span class="tiny muted">(staple)</span>':''}</span></label>`;}).join('');
  const steps=(r.steps||[]).map((s,idx)=>`<div class="step"><span class="n">${idx+1}</span><span>${esc(s)}</span></div>`).join('');

function cookMode(r){const steps=r.steps||[];let i=0,timer=null;const el=document.createElement('div');el.className='cook';document.body.appendChild(el);
  function tick(secsEl,end){const left=Math.max(0,Math.round((end-Date.now())/1000));secsEl.textContent=Math.floor(left/60)+':'+String(left%60).padStart(2,'0');if(left<=0){clearInterval(timer);try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch(e){}toast('⏰ Timer done');}}
  function paint(){el.innerHTML=`<div class="top"><button class="btn sec sm" id="cclose">✕ Exit</button><b style="flex:1;text-align:center">${esc(r.name)}</b><span class="muted small">${i+1}/${steps.length}</span></div>
    <div class="mid"><div class="stepbig">${esc(steps[i]||'Done! Enjoy 🎉')}</div></div>
    <div class="timerbar"><span class="muted small" style="align-self:center">Timer:</span>${[1,3,5,10].map(m=>`<button class="btn sec sm" data-t="${m}">${m}m</button>`).join('')}<span id="tdisp" style="align-self:center;font-weight:800;min-width:48px"></span></div>
    <div class="dots">${steps.map((_,k)=>`<span class="dot ${k===i?'on':''}"></span>`).join('')}</div>
    <div class="ctrl"><button class="btn sec" id="prev" style="flex:1" ${i===0?'disabled':''}>‹ Back</button><button class="btn" id="next" style="flex:2">${i>=steps.length-1?'Finish':'Next ›'}</button></div>`;
    el.querySelector('#cclose').onclick=()=>{clearInterval(timer);el.remove();};
    el.querySelector('#prev').onclick=()=>{if(i>0){i--;paint();}};
    el.querySelector('#next').onclick=()=>{if(i>=steps.length-1){clearInterval(timer);el.remove();}else{i++;paint();}};
    el.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{clearInterval(timer);const end=Date.now()+ +b.dataset.t*60000;const d=el.querySelector('#tdisp');tick(d,end);timer=setInterval(()=>tick(d,end),1000);});}
  paint();}

// ---------- SHOP ----------
const AISLES=[['produce','🥬 Produce'],['protein','🍗 Proteins'],['dairy-eggs','🧀 Dairy & eggs'],['frozen','❄️ Frozen'],['canned-dry','🥫 Canned & dry'],['grains-bakery','🌾 Grains & bakery'],['sauces-spices','🫙 Sauces & spices'],['other','🛒 Other']];
const WEIGHT_G={oz:28.35,ounce:28.35,lb:453.6,pound:453.6,g:1,gram:1,grams:1};
function ingGrams(i){const e=FOODMAP[(i.item||'').toLowerCase()];if(!e)return null;const q=parseQty(i.qty);if(q==null)return null;const u=i.unit||'',ug=e.ug||{};
  if(ug[u]!=null)return q*ug[u];
  if(u===''&&ug['(whole)']!=null)return q*ug['(whole)'];
  if(WEIGHT_G[u.toLowerCase()]!=null)return q*WEIGHT_G[u.toLowerCase()];   // oz/lb/g universal
  if(u===''&&Object.keys(ug).length)return q*Object.values(ug)[0];          // bare count
  return null;}                                                            // unknown volume unit -> skip, don't guess
function shopSources(){const out=[];DAYS.forEach(d=>{const s=S.week[d]||{};SLOTS.forEach(sl=>{if(s[sl])out.push(s[sl]);});});(S.shopExtra||[]).forEach(nm=>out.push({r:nm,p:1}));return out;}
function buildShop(){const map={};shopSources().forEach(ent=>{const r=RX[ent.r];if(!r||!r.ingredients)return;const p=ent.p||1;
    r.ingredients.forEach(i=>{if(S.hideStaples&&i.staple)return;const k=(i.item||'').toLowerCase()+'|'+(i.aisle||'other');
      if(!map[k])map[k]={item:i.item,aisle:i.aisle||'other',grams:0,from:new Set(),anyGrams:false,fallback:[]};
      const g=ingGrams(i);if(g!=null){map[k].grams+=g*p;map[k].anyGrams=true;}else{const q=parseQty(i.qty);map[k].fallback.push((q?fmtQty(q*p):'')+' '+(i.unit||''));}
      map[k].from.add(r.name);});});
  (S.shopCustom||[]).forEach((c,idx)=>{map['cust'+idx]={item:c.item,aisle:'other',grams:0,from:new Set(['you']),anyGrams:false,fallback:[c.qty||''],custom:true};});return map;}
function purchaseLine(m){const e=FOODMAP[(m.item||'').toLowerCase()];if(m.anyGrams&&e&&e.pu&&e.pu.size_g){const num=Math.max(1,Math.ceil(m.grams/e.pu.size_g));return `${num>1?num+' × ':''}${e.pu.label||e.pu.unit||''} <span class="tiny muted">(~${Math.round(m.grams)}g)</span>`;}
  if(m.fallback&&m.fallback.length)return m.fallback.filter(x=>x.trim()).join(' + ');if(m.anyGrams)return `~${Math.round(m.grams)} g`;return '';}
function viewShop(){const map=buildShop(),keys=Object.keys(map),byA={};keys.forEach(k=>{(byA[map[k].aisle]=byA[map[k].aisle]||[]).push(k);});
  const remaining=keys.filter(k=>!S.shopChecked[k]).length;
  let html=`<div class="card" style="background:var(--card2);box-shadow:none"><div class="row"><div class="small" style="flex:1">From your week + added items · <b>${remaining}</b> left · shown in <b>buy-this</b> amounts</div><label class="small row" style="gap:5px"><input type="checkbox" id="hs" ${S.hideStaples?'checked':''} style="width:16px;height:16px"> hide staples</label></div></div>`;
  if(!keys.length)html+='<div class="muted">Empty — plan meals or add items below.</div>';
  AISLES.forEach(([a,lab])=>{if(!byA[a])return;html+=`<div class="aisle-h">${lab}</div><div class="card" style="padding:6px 12px">`;
    byA[a].sort((x,y)=>map[x].item.localeCompare(map[y].item)).forEach(k=>{const m=map[k],done=!!S.shopChecked[k];
      html+=`<label class="ck ${done?'done':''}"><input type="checkbox" data-shop="${k}" ${done?'checked':''}><span><b>${esc(m.item)}</b> <span class="muted">— ${purchaseLine(m)}</span><span class="tiny muted" style="display:block">${m.custom?'added by you':'for '+m.from.size+' meal'+(m.from.size>1?'s':'')}</span></span></label>`;});
    html+='</div>';});
  html+=`<div class="card"><b class="small">Add your own item</b><div class="row" style="gap:6px;margin-top:8px"><input id="ci" placeholder="e.g. oat milk" style="flex:2"><input id="cq" placeholder="qty" style="flex:1"></div><button class="btn sm" id="cadd" style="margin-top:8px">Add</button></div>
   <div class="row" style="gap:8px"><button class="btn sec" id="copy" style="flex:1">📋 Copy list</button><button class="btn sec" id="clr" style="flex:1">Clear checked</button></div>`;return html;}
function bindShop(){document.getElementById('hs').onchange=e=>{S.hideStaples=e.target.checked;save();render();};
  document.querySelectorAll('[data-shop]').forEach(c=>c.onchange=()=>{S.shopChecked[c.dataset.shop]=c.checked;save();c.closest('.ck').classList.toggle('done',c.checked);});
  document.getElementById('cadd').onclick=()=>{const it=document.getElementById('ci').value.trim();if(!it)return;S.shopCustom.push({item:it,qty:document.getElementById('cq').value.trim()});save();render();};
  document.getElementById('clr').onclick=()=>{S.shopChecked={};save();render();toast('Cleared');};
  document.getElementById('copy').onclick=()=>{const map=buildShop(),lines=[];AISLES.forEach(([a,lab])=>{const ks=Object.keys(map).filter(k=>map[k].aisle===a&&!S.shopChecked[k]);if(!ks.length)return;lines.push(lab.replace(/^[^ ]+ /,'').toUpperCase());ks.forEach(k=>lines.push('• '+map[k].item+' — '+purchaseLine(map[k]).replace(/<[^>]+>/g,'')));lines.push('');});navigator.clipboard?.writeText(lines.join('\n')).then(()=>toast('Copied'),()=>toast('Copy failed'));};}

function onboarding(){const el=document.createElement('div');el.className='ob';el.id='ob';let step=0;const s=JSON.parse(JSON.stringify(S.settings));const ex={};
  function paint(){const screens=[
    `<div style="text-align:center;padding-top:30px"><div style="font-size:64px">🥗</div><h1 style="font-size:26px">Welcome to your Kitchen</h1><p class="muted">High-protein, high-fiber, lazy-friendly eating built around you. 30 seconds to set up.</p><button class="btn" id="nx" style="width:100%;margin-top:20px">Let's go ›</button></div>`,
    `<h1 style="font-size:22px">Your numbers</h1><p class="muted small">Sets your calorie & protein targets — change anytime.</p>
      <div class="row" style="gap:8px;margin-top:12px"><div style="flex:1"><div class="tiny muted">Weight (lb)</div><input id="ow" type="number" value="${s.weightLb}"></div><div style="flex:1"><div class="tiny muted">Goal (lb)</div><input id="og" type="number" value="${s.goalLb}"></div></div>
      <div class="row" style="gap:8px;margin-top:8px"><div style="flex:1"><div class="tiny muted">Height (in)</div><input id="oh" type="number" value="${s.heightIn}"></div><div style="flex:1"><div class="tiny muted">Age</div><input id="oa" type="number" value="${s.age}"></div></div>
      <div class="tiny muted" style="margin-top:10px">How active?</div><select id="oact"><option value="1.3">Mostly sitting</option><option value="1.4" selected>Light — walks + Pilates 2×/wk</option><option value="1.55">Active — moving most days</option></select>
      <button class="btn" id="nx" style="width:100%;margin-top:18px">Next ›</button>`,
    `<h1 style="font-size:22px">Anything you avoid?</h1><p class="muted small">We'll hide recipes that don't fit. Skip if nothing applies.</p><div style="margin-top:10px">${EXCLUDES.map(([k,l])=>`<label class="toggle"><input type="checkbox" data-ox="${k}"> ${l}</label>`).join('')}</div><button class="btn" id="nx" style="width:100%;margin-top:18px">Finish ›</button>`,
  ][step];el.innerHTML=screens;
    if(step===2)el.querySelectorAll('[data-ox]').forEach(c=>c.onchange=()=>ex[c.dataset.ox]=c.checked);
    el.querySelector('#nx').onclick=()=>{
      if(step===1){s.weightLb=+el.querySelector('#ow').value||s.weightLb;s.goalLb=+el.querySelector('#og').value||s.goalLb;s.heightIn=+el.querySelector('#oh').value||s.heightIn;s.age=+el.querySelector('#oa').value||s.age;s.activity=+el.querySelector('#oact').value;}
      if(step<2){step++;paint();}else{S.settings=Object.assign(S.settings,s);S.settings.startDate=todayKey();S.excludes=ex;S.onboarded=true;DAYS.forEach(d=>balanceDay(S.week[d],targets().kcal));save();el.remove();render();toast('All set 🎉');}};}
  paint();document.body.appendChild(el);}

// ---------- PWA + boot ----------
if('serviceWorker'in navigator&&location.protocol.startsWith('http')){navigator.serviceWorker.register('sw.js').catch(()=>{});}
render();
if(!S.onboarded)onboarding();
</script></body></html>
