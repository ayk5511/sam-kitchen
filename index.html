Popcorn Movie Mix — **1.0×** |\n| Dinner | Salsa Verde Chicken Tacos — **1.0×** |\n\n**Daily totals:** ~1,902 kcal · **P 121** · Fiber 30 · C 124 · F 66\n*Saturday-out day: the Chipotle bowl is your real-world template — double protein, fajita veg, skip the queso. Eating out is part of the plan.*\n\n---\n\n### Day 7 — Sunday · *Walk* (prep day)\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Mediterranean Microwave Egg & Chickpea Bowl — **1.0×** |\n| Lunch | Vietnamese-Style Shrimp & Edamame Soba Cold Bowl — **1.0×** |\n| Snack | Cottage Cheese Cookie-Dough Fluff — **1.0×** |\n| Dinner | Instant-Pot Turkey & Three-Bean Chili — **1.0×** + Chili-Lime Crunchy Roasted Chickpeas — **1.0×** |\n\n**Daily totals:** ~1,909 kcal · **P 119** · Fiber 33 · C 188 · F 49\n*Sunday: chili goes in the Instant-Pot while you batch your Anchors. Leftovers seed the week.*\n\n---\n\n### Day 8 — Monday · *Pilates*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Mango-Coconut Protein Chia Pudding — **1.0×** |\n| Lunch | Cal-Mex Black Bean & Corn Quinoa Mason Jar — **0.9×** |\n| Snack (post-Pilates) | Chocolate-Espresso Casein Protein Pudding — **1.0×** |\n| Dinner | Pesto Chicken Chickpea-Pasta Skillet — **1.0×** |\n\n**Daily totals:** ~1,888 kcal · **P 115** · Fiber 33 · C 158 · F 64\n*Pilates day: quinoa jar + casein pudding post-class. Make the chia pudding Sunday night.*\n\n---\n\n### Day 9 — Tuesday · *Walk*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Savory Miso-Parmesan Protein Oats — **1.0×** |\n| Lunch | Mediterranean Chicken Shawarma Quinoa Bowl — **1.0×** |\n| Snack | Tuna-Avocado Seaweed Crunch Wraps — **1.0×** |\n| Dinner | Thai Green Curry Tofu & Chickpeas — **1.0×** |\n| 2nd snack | Hummus + Crudité with Everything-Spiced Cottage Cheese Dip Duo — **0.7×** |\n\n**Daily totals:** ~1,893 kcal · **P 113** · Fiber 32 · C 163 · F 65\n*Walk day; a plant-forward dinner for variety — fiber lands at 32.*\n\n---\n\n### Day 10 — Wednesday · *Walk*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | PB-Banana Protein Waffles (Freezer Batch) — **1.0×** |\n| Lunch | Italian Tuscan Kale Caesar with Chicken & White Beans — **1.0×** |\n| Snack | Spicy Tuna Crunch Cracker Stacks — **1.0×** |\n| Dinner | Mediterranean Chicken & Chickpea Sheet-Pan — **1.0×** |\n| 2nd snack | Chili-Lime Crunchy Roasted Chickpeas — **1.0×** |\n\n**Daily totals:** ~1,896 kcal · **P 113** · Fiber 32 · C 130 · F 64\n*Light-prep Wednesday: waffles come from the freezer, sheet-pan dinner is hands-off.*\n\n---\n\n### Day 11 — Thursday · *Pilates*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Japanese Tamago & Salmon Rice Bowl — **1.0×** |\n| Lunch | Japanese Teriyaki Tofu & Edamame Freekeh Bowl — **1.0×** |\n| Snack (post-Pilates) | Banana-Walnut Protein Overnight Oats Jar — **1.0×** |\n| Dinner | Instant-Pot Red Lentil & Rotisserie Chicken Dal — **1.0×** |\n\n**Daily totals:** ~1,778 kcal · **P 111** · Fiber 34 · C 168 · F 62\n*Pilates day: carbier rice + freekeh bowls, oats jar post-class. Lightest day — add a piece of fruit if hungry.*\n\n---\n\n### Day 12 — Friday · *Walk*\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Blueberry-Almond Protein Overnight Oats — **0.85×** |\n| Lunch | Californian Green Goddess Salmon Grain Bowl — **1.0×** |\n| Snack | Savory Cottage Cheese Toast with Tomato + Hemp — **1.0×** |\n| Dinner | Chickpea Pasta Turkey Bolognese — **1.0×** |\n\n**Daily totals:** ~1,866 kcal · **P 115** · Fiber 33 · C 156 · F 58\n*Walk day; oats scaled to 0.85× to make room for the savory toast snack.*\n\n---\n\n### Day 13 — Saturday · *Walk* (social-life-proof)\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Cal-Mex Migas — **0.85×** |\n| Lunch | CAVA 'Greens + Grains, Double Protein' — **1.0×** *(no-cook, out & about)* |\n| Snack | Mango-Raspberry Greek Yogurt Bark — **1.0×** |\n| Dinner | Moroccan Chicken & Chickpea Tagine — **1.0×** |\n\n**Daily totals:** ~1,846 kcal · **P 116** · Fiber 32 · C 150 · F 60\n*Saturday-out day: CAVA double-protein bowl is your template. Migas scaled to 0.85× since it's a rich one.*\n\n---\n\n### Day 14 — Sunday · *Walk* (prep day)\n| Meal | Dish (portion) |\n|---|---|\n| Breakfast | Freezer Breakfast Burritos (Turkey & Black Bean) — **1.0×** |\n| Lunch | Greek Mason-Jar Chickpea & Feta Salad — **0.9×** |\n| Snack | Thai Peanut Edamame-Chicken Crunch Bowl — **1.0×** |\n| Dinner | Chicken Sausage & White Bean Tuscan Skillet — **1.0×** |\n| 2nd snack | Tuna-Avocado Seaweed Crunch Wraps — **0.7×** |\n\n**Daily totals:** ~1,902 kcal · **P 115** · Fiber 33 · C 138 · F 71\n*Sunday reset: pull a burrito from the freezer, then batch your Anchors for the week ahead.*\n\n---\n\n### Coverage check\n- **14 distinct dinners** — no repeats (Cod Puttanesca, Gochujang Beef, Cashew Chicken, Shrimp Fajitas, Furikake Salmon, Salsa Verde Tacos, Three-Bean Chili, Pesto Chickpea-Pasta, Thai Green Curry, Mediterranean Sheet-Pan, Red Lentil Dal, Turkey Bolognese, Moroccan Tagine, Tuscan Skillet).\n- **Cuisines rotate daily** — American/Greek, Med/Thai/Korean, American/Med/Chinese, Cal-Mex/Korean, Cal/Japanese, Cal/Mexican, Med/Vietnamese/Mexican, and so on. No cuisine two days running in any meal slot.\n- **Protein 111–121 g every day; fiber 30–34 every day.** Maintenance ~1,900 holds across all 14.\n- **~2 Pilates + ~5 walk days each 7-day block** (Days 1,4,8,11 Pilates).\n\n---\n\n## Seasonal swaps (to extend the block past 6 weeks)\n\nKeep the structure, swap the produce so it tracks CA seasons and never feels repetitive:\n\n| Slot | Spring/Summer (Weeks 21–24) | Fall/Winter (Weeks 25–26+) |\n|---|---|---|\n| Smoothies & bowls | Triple-Berry Smoothie Bowl, Mango-Coconut Chia, Green Goddess Smoothie (stone fruit, berries) | Pina-Colada Recovery Smoothie, Chocolate-Espresso Casein, Banana-Walnut Oats (warmer, richer) |\n| Lighter lunch salads | Cobb-Style Power Salad, Green Goddess Salmon Bowl, Mason-Jar Chickpea & Feta (raw, crisp) | Tuscan Kale Caesar w/ Chicken, Chicken Shawarma Quinoa Bowl, Lentil Tabbouleh (heartier grains/greens) |\n| Dinners | Sheet-Pan Shrimp Fajitas, Cod Puttanesca, Salsa Verde Tacos (bright, fast) | Three-Bean Chili, Red Lentil Dal, Moroccan Tagine, Tuscan White-Bean Skillet (warm, cozy) |\n| Breakfast | Savory Cottage Cheese Avocado Bowl, Tamago & Salmon Rice Bowl | Miso-Parmesan Protein Oats, Microwave Egg & Chickpea Bowl |\n\n**How to swap:** any dish in a column is macro-interchangeable with its neighbors (all land in the same kcal/protein band at the portions shown), so drop one in for another in the same slot and your Daily totals barely move (±40 kcal).\n\n---\n\n## 3 emergency lazy / no-cook fallbacks (zero cooking, ≤4 min)\n\nWhen the day falls apart, these single items carry a whole meal and keep protein on target:\n\n1. **3-Minute Rotisserie Chicken Power Bowl** — 510 kcal · P43 · Fib12. Costco rotisserie + bagged greens + microwave grain pouch. Assemble, done.\n2. **Trader Joe's Smoked Salmon & Egg Protein Plate** — 460 kcal · P39 · Fib9. Pre-made eggs, smoked salmon, cucumber. Pure plate-build, no heat.\n3. **Airport / Travel High-Protein Combo** — 520 kcal · P42 · Fib9. The grab-and-go template for travel days or a fully empty fridge.\n\n> Pair any fallback with one snack from the list (e.g. Mango-Raspberry Greek Yogurt Bark, 251 kcal P30) and you've recovered a ~750 kcal / P70 half-day in under five minutes — protein protected, plan intact.\n\n---\n\n**File:** `/Users/akmbp/Documents/Sam-Meal-Prep/03-meal-plans/phase-4-lifestyle-lock-in.md`"}, "shopping": {"title": "Shopping Lists", "md": "# Master Shopping Lists — Sam's Meal-Prep System\n\n> **What this is.** A reusable weekly shopping engine for **one lightly-active 59 kg woman** running a gentle 5-lb cut and then maintaining for life. Stock the **Pantry/Freezer Master List** once (then top-up monthly), and each week run **one phase list** for fresh perishables. Everything maps to the recipe library at [`../02-recipes/index.md`](../02-recipes/index.md). Sort/filter the live cookbook at [`../02-recipes/cookbook.html`](../02-recipes/cookbook.html).\n>\n> **Design constraints baked in:** active prep ≤ 20 min (most ≤ 10), assembly > cooking, relentless cuisine rotation, one batch-cook session that feeds the week — and **quantities sized to a ~1550–1900 kcal intake, not an athlete's 2400+**. If a list looks small, that's correct: she eats ~115 g protein and ~1,650 kcal on average, so the cart is genuinely lighter than a typical training plan.\n\n---\n\n## 0. Sizing assumptions — the math behind the quantities\n\nAll quantities below are **derived**, not guessed. State the assumptions so they scale. This is a **lightly-active** plan (daily walking + Pilates 2×/wk) — no carb-loading, no athlete portions.\n\n| Anthropometric | Value | Source |\n|---|---|---|\n| Height | 5'7\" / 170 cm | client profile |\n| Weight (current → goal) | 130 lb / **59 kg** → 125 lb | *all g/kg targets scale off 59 kg* |\n| Age / sex | 23 / female | client profile |\n| BMR (Mifflin–St Jeor, F) | **1377 kcal** | `10·59 + 6.25·170 − 5·23 − 161 = 590 + 1062.5 − 115 − 161` |\n| Maintenance TDEE (activity ×1.4) | **~1925 kcal** | `1377 × 1.4`; range ~1850 (low-NEAT) → ~2050 (big-walk + Pilates day) |\n| Cut intake (lose 5 lb) | **~1550 kcal** | maintenance − ~325 to −375 ⇒ ~0.3 kg (0.6–0.7 lb)/wk ⇒ 125 lb in ~7–8 wk. **Floor ~1400** |\n| Maintenance intake (after 125 lb) | ~1850–1950 kcal | post-cut, lifelong |\n\n### 0a. Protein demand → the weekly protein basket\n\nProtein is the **toning lever** — held high even though calories are low. Target **1.9–2.0 g/kg ≈ 110–120 g/day**, planned at **~115 g/day**:\n\n```\n115 g/day × 7 days          =  805 g protein/week  (eaten)\n÷ ~0.78 effective yield*     ≈ 1030 g \"protein as purchased\"\n```\n*\\*Yield haircut: cooking loss (~10–25% on raw meat/fish), bones/skin on rotisserie, water weight in cottage cheese/yogurt, scoop-to-gram drift on powder. The ~0.78 factor is the blended as-purchased→as-eaten ratio across this basket.*\n\nThat 805 g/week eaten resolves into a **standing weekly protein basket** (used to size every list below). Note the totals are ~30% smaller than an athlete plan — fewer birds, less fish, smaller powder draw:\n\n| Protein source | Weekly qty | Protein eaten | Cost/wk | Anchors / meals it feeds |\n|---|---|--:|--:|---|\n| Rotisserie chicken | 1 bird (~620 g meat) | ~115 g | $5–7 | Big-Batch Poached swap, *Cal-Mex Rotisserie Chicken Burrito Bowl*, *Californian Cobb-Style Power Salad*, *Instant-Pot Red Lentil & Rotisserie Chicken Dal*, *Italian Tuscan Kale Caesar* |\n| Chicken breast (raw, batch-poach) | 450 g | ~100 g | $5–6 | *Big-Batch Poached Chicken, Seasoned 3 Ways* anchor |\n| Wild salmon (fresh fillet) | 280 g | ~65 g | $8–11 | *Sheet-Pan Miso-Glazed Salmon*, *Furikake Baked Salmon Rice Bowl* |\n| Canned wild salmon | 1 × 142 g | ~25 g | $2–4 | *Wild Salmon Everything-Bagel Cucumber Boats*, *Californian Green Goddess Salmon Grain Bowl* |\n| Canned tuna/albacore | 2–3 cans | ~60 g | $3–5 | *Mediterranean Farro & White Bean Tuna Salad*, *Spicy Tuna Crunch Cracker Stacks*, *Tuna-Avocado Seaweed Crunch Wraps* |\n| Lean ground turkey 93/7 | 300 g | ~65 g | $3–5 | *Chickpea Pasta Turkey Bolognese*, *Instant-Pot Turkey & Three-Bean Chili* |\n| Lean ground/flank beef 90/10 | 200 g | ~40 g | $3–5 | *Korean Gochujang Beef & Edamame Bowl* |\n| Shrimp (frozen, peeled) | 280 g | ~60 g | $6–8 | *Sheet-Pan Shrimp Fajitas*, *Vietnamese-Style Shrimp & Edamame Soba* |\n| Extra-firm tofu | 1–2 blocks (~500 g) | ~50 g | $2–3 | *Marinated Baked Tofu + Edamame* anchor, *Cal-Mex Tofu Scramble*, *Japanese Teriyaki Tofu* |\n| Eggs + egg whites | 1 dozen + ½ carton whites | ~90 g | $4–6 | *Mediterranean Muffin-Tin Frittata Cups*, *Cal-Mex Migas*, *Batch Soy-Marinated Jammy Eggs* anchor |\n| Cottage cheese (4% or low-fat) | 1 × 16–24 oz tub | ~60 g | $3–4 | *Cottage Cheese Cookie-Dough Fluff*, *Savory Cottage Cheese Avocado Bowl*, dips |\n| Greek yogurt (0–2%) | 1 × 32 oz tub | ~90 g | $4–6 | *Greek Yogurt Power Bowl*, *Mango-Raspberry Greek Yogurt Bark*, *Greek-Yogurt Ranch* anchor |\n| Whey/casein protein powder | ~6 scoops/wk amortized | ~130 g | ~$5 | oats, smoothies, *Chocolate-Espresso Casein Protein Pudding* |\n| Edamame (frozen, shelled) | 1 bag rotated | ~25 g | $1–2 | every \"edamame\" lunch/snack |\n| **Weekly total** | — | **≈ 1030 g purchased → ~805 g eaten** | **≈ $55–80** | covers ~115 g/day with a small buffer |\n\n> **Why the basket is ~`55–80, not `70–95:** intake dropped from ~2400 to ~1650 kcal and protein from ~145 to ~115 g/day. That's roughly **−30% protein volume**, which is exactly where the grocery savings show up. Cheap, complete protein (rotisserie + canned fish + eggs + dairy + tofu) covers the floor; fresh fish + a little beef buy *variety*, not grams.\n\n### 0b. Fiber back-check\n\n| Target | Daily | Weekly | Delivered by |\n|---|--:|--:|---|\n| Fiber | ~30 g (≥14 g/1000 kcal at 1550–1900 kcal) | **~210 g/week** | produce + canned beans/lentils + frozen veg + chia/flax basket below |\n\nThe standing produce + canned-bean + frozen-veg basket delivers **~30–32 g/day on paper** at these portions. **Ramp gradually in Weeks 1–2** (start ~24–26 g, add ~2 g/day each week) to avoid GI distress — the cut is the worst time to shock the gut.\n\n> **Sanity check vs. the old plan:** athlete brief needed ~245 g fiber/week at 2150–2470 kcal; this plan needs **~210 g** at 1550–1900 kcal. Same fiber *density* (≥14 g/1000 kcal), lower absolute volume — so one or two fewer cans/bags of beans and veg per week.\n\n### 0c. A typical day's macros (so the cart maps to real plates)\n\n| Day type | Build (library meals, scaled) | kcal | P | Fiber |\n|---|---|--:|--:|--:|\n| **Cut (~1550)** | *Mediterranean Muffin-Tin Frittata Cups* (410) + *Mediterranean Farro & White Bean Tuna Salad* (470) + *Chili-Lime Crunchy Roasted Chickpeas* (156) + *Instant-Pot Turkey & Three-Bean Chili* (351) ×1.4 portion → ~490 | ~1530 | ~118 | ~32 |\n| **Cut (~1550), alt** | *PB-Banana Protein Waffles* (398) + *Italian Tuscan Kale Caesar* (510 ×0.85 → ~435) + *Wild Salmon Cucumber Boats* (230) + *Sheet-Pan Shrimp Fajitas* (322 ×1.3 → ~420) | ~1483 | ~117 | ~30 |\n| **Maintenance (~1900)** | *Greek Yogurt Power Bowl* (530) + *Cal-Mex Rotisserie Chicken Burrito Bowl* (610 ×0.9 → ~550) + *Edamame-Popcorn Movie Mix* (229) + *Baked Cod Puttanesca* (410) + add a 2nd snack ~180 | ~1899 | ~120 | ~33 |\n\n**Rule of thumb to hit ~1550:** pick the naturally lighter mains (Chili 351, Shrimp Fajitas 322, Red Lentil Dal 322, Tagine 384, Gochujang Beef 398, Cod Puttanesca 410, Pesto Chicken Skillet 418) **or** scale a 500–650 kcal main to **0.7–0.9×** and say the multiplier. Protein holds ~115 either way — that's non-negotiable.\n\n---\n\n## 1. PANTRY & FREEZER MASTER LIST (stock once, top-up monthly)\n\nThe non-perishable / freezer backbone. If these are stocked, any recipe in the library is ≤ one fresh-produce run away. **Bold = never run out.** Quantities here are *kept-on-hand* depths sized for one person — smaller than a family/athlete pantry.\n\n### 1a. Proteins — shelf-stable & frozen\n\n| Item | Keep on hand | Feeds | Buy at |\n|---|---|---|---|\n| **Canned wild salmon** (skinless/boneless, 142 g) | 3–4 cans | *Cucumber Boats*, *Green Goddess Salmon Grain Bowl* | Costco (Kirkland 6-pk), TJ's |\n| **Canned albacore/tuna in water** | 4–6 cans | *Farro & White Bean Tuna Salad*, *Spicy Tuna* ×2, *Seaweed Wraps* | Costco, Sprouts |\n| **Shrimp, frozen peeled & deveined** | 1 lb bag | *Shrimp Fajitas*, *Shrimp Soba Cold Bowl* | Costco, TJ's |\n| **Chicken breast, frozen** (individually wrapped) | 1.5–2 lb | Poached-chicken anchor backstop | Costco, TJ's |\n| Ground turkey 93/7, frozen | 1 lb | *Bolognese*, *Three-Bean Chili*, *Breakfast Burritos* | Costco, WF |\n| **Extra-firm tofu** (shelf-stable or fridge) | 2 blocks | Tofu anchor, *Tofu Scramble*, *Teriyaki Tofu* | TJ's, Sprouts |\n| Frozen edamame — **shelled** + n### 1e. Sauces, condiments & flavor (the boredom-killers — rotate cuisine via the jar)\n\n| Item | Keep on hand | Cuisine it unlocks | Buy at |\n|---|---|---|---|\n| **Soy sauce / tamari + rice vinegar + toasted sesame oil** | 1 ea | Japanese, Korean, Chinese, Thai | TJ's, any |\n| **Gochujang + kimchi** | 1 ea | Korean (*Gochujang Beef*, *Korean Beef Bowl*) | WF, Sprouts, H-Mart |\n| Miso paste (white) | 1 tub | *Miso Salmon*, *Miso-Parmesan Oats* | TJ's, WF |\n| Teriyaki + ponzu | 1 ea | *Teriyaki Tofu*, *Tamago bowl* | TJ's |\n| Thai green curry paste + fish sauce | 1 ea | *Thai Green Curry*, *Larb* | TJ's |\n| **Peanut butter (natural) + PB powder** | 1 ea | *Peanut-Lime* anchor, *PB Protein Bites*, pancakes | Costco, TJ's |\n| Salsa macha / chili crisp | 1 ea | *Migas*, condiment anchor, eggs | TJ's, WF |\n| **Tahini** | 1 jar | *Lemon-Tahini* anchor, *Shawarma*, *Falafel* | TJ's, WF |\n| Hummus (or make from chickpeas) | 1 tub | *Hummus + Crudité duo*, *Girl-Dinner Board*, wraps | Costco, TJ's |\n| Pesto (jarred) | 1 jar | *Pesto Chicken Chickpea-Pasta Skillet* | TJ's, Costco |\n| Green goddess / Caesar (refrigerated) | 1 ea | *Green Goddess Salmon Bowl*, *Caesar* upgrades | TJ's, WF |\n| Furikake + everything-bagel seasoning | 1 ea | *Furikake Salmon*, *Cucumber Boats*, eggs | TJ's, Costco |\n| Enchilada sauce | 1 can | *Enchilada Bake* | TJ's |\n| Dijon + sriracha + harissa | 1 ea | dressings, shawarma, heat rotation | all |\n| Nutritional yeast | 1 bag | *Savory Miso-Parmesan Oats*, vegan \"cheese\" | TJ's, Sprouts |\n\n### 1f. Oils, baking & spice rack\n\n| Item | Keep on hand | Why | Buy at |\n|---|---|---|---|\n| **Extra-virgin olive oil + avocado oil spray** | 1 ea | fat anchor; **spray = portion control on a cut** | Costco, TJ's |\n| Roasted nuts: almonds, walnuts, cashews | 1 ea | walnut→omega-3, oats, *Cashew Chicken*, *PB Bites* | Costco, TJ's |\n| Sliced almonds + unsweetened coconut | 1 ea | oat/smoothie-bowl toppers | TJ's |\n| Granola (low-sugar, high-protein) | 1 bag | *Greek Yogurt Power Bowl* | TJ's, WF |\n| **Spice core:** cumin, smoked paprika, chili powder, garam masala, za'atar, ras el hanout, Italian blend, garlic & onion powder | as needed | every cuisine pivot | Costco (bulk), TJ's, Sprouts bulk |\n| Low-sodium broth (boxed) + bouillon | 1 ea | *Chili*, *Dal*, *Tagine*, lentils | TJ's, Costco |\n| Honey / maple / dates | 1 ea | pudding, bites, smoothies (use sparingly on cut) | all |\n| Dried fruit: apricots, raisins | 1 small bag ea | *Tagine*, *Moroccan*, trail bumps | TJ's, Costco |\n\n### 1g. Supplements & hydration (female micros — *featured per the plan*)\n\nFramed for a **lightly-active 23 yo woman**, not an athlete. Saturation/sufficiency, not performance dosing.\n\n| Item | Dose / note | Buy at |\n|---|---|---|\n| **Creatine monohydrate** | **3–5 g/day**, every day (optional but helps tone/strength even with Pilates; saturation, not timing) | Costco, WF, online |\n| **Vitamin D3** (+K2) | 1000–2000 IU/day — supports calcium + mood, esp. low-sun stretches | Costco, WF |\n| Omega-3 fish oil (EPA/DHA) | on non-salmon days (aim ~2 g EPA+DHA/wk total from fish + caps) | Costco |\n| **Iron + vitamin C** | pair iron-rich meals (lentils/beef/tofu/spinach) with citrus/bell pepper; **supplement only if labs low** (don't megadose blind) | — |\n| Magnesium glycinate | 200–300 mg PM — sleep + cramp prevention | WF, Sprouts |\n| Calcium | hit via dairy/tofu/greens first; supplement only to fill a gap to ~1000 mg/day | — |\n| **Electrolytes** (LMNT/Nuun) | optional 1 serving on big-walk or hot days; **base hydration ~2.2 L water/day** | Costco, WF |\n\n> **What's intentionally *not* here vs. an athlete plan:** no collagen pre-load, no carb/electrolyte fueling around sessions, no daily electrolyte habit. Pilates 2×/wk + walking doesn't demand it. Keep supplements simple: **creatine + D3 + omega-3 daily; magnesium PM; electrolytes only when she's genuinely sweaty.**\n\n---\n\n## 2. WEEKLY GROCERY LISTS BY PHASE\n\nEach list assumes the **pantry/freezer is already stocked** — so it covers **fresh perishables + weekly top-ups only**, sized for **1 lightly-active person / 7 days**. Grouped by store section. Macro target restated up top with the calorie math.\n\n> **These quantities are LOWER than a typical athlete plan** — intake is ~1550–1900 kcal, not 2400+. Expect ~1 rotisserie, ~250–300 g fresh fish, ~1 dozen eggs, and one tub each of cottage cheese + yogurt to carry the week. If the cart feels small, it's right.\n>\n> **How to use:** Run the **Sunday batch session** (Section 3) off these, then the week is assembly. Swap any same-section item freely — that's the anti-boredom rule. Each phase rotates the cuisine emphasis so no two weeks feel alike.\n\n---\n\n### PHASE 1 — RESET & GENTLE CUT (Weeks 1–8)\n**Targets:** **~1550 kcal · P115 / C~150 / F50 · fiber ~30** (ramp 24→30 over Weeks 1–2).\n**Math:** maintenance ~1925 − ~375 (≈ −19%) ⇒ ~1550 ⇒ **~0.3 kg (0.6–0.7 lb)/wk** ⇒ reach **125 lb in ~7–8 weeks.** Gentle, not a crash. Build the protein + fiber + prep habit.\n**Cuisine emphasis:** Cal-Mex + Mediterranean + American (familiar, forgiving). Lean on overnight-oats and rotisserie-chicken anchors and the **lighter mains** (*Chili* 351, *Shrimp Fajitas* 322, *Cod Puttanesca* 410) while habits set.\n\n| 🥬 PRODUCE | Qty | → feeds |\n|---|---|---|\n| Avocados | 3 | *Cottage Cheese Avocado Bowl*, *Migas*, *Shrimp Fajitas*, mash anchor (½ avo portions on cut) |\n| Bagged salad/slaw kits (Caesar, Southwest) | 2 | *Caesar Upgrade*, *Cobb*, *Burrito Bowl* base |\n| Romaine hearts + spring mix tub | 1 ea | *Larb* cups, *Power Bowls* |\n| Bell peppers (tri-color) | 3 | *Fajitas*, *Shawarma*, **iron + vit-C pairing** |\n| Cucumbers | 3 | *Cucumber Boats*, Greek salad, snacks (high-volume, low-cal) |\n| Cherry tomatoes | 1 pint | *Frittata*, *Cottage Cheese Toast* |\n| Lemons + limes | 3 + 3 | dressings, Cal-Mex, **vit C** |\n| Bananas | 4 | pancakes, oats, smoothies |\n| Berries (fresh, eat-first) | 1 pint | yogurt bowl, snack |\n| Red onion + garlic + ginger | 1 ea | everything |\n| Cilantro + parsley | 1 bunch ea | Cal-Mex + Med brightness |\n| Baby spinach (fresh) | 1 box | frittata, bowls, **iron** |\n\n| 🍗 PROTEINS | Qty | → feeds |\n|---|---|---|\n| **Rotisserie chicken** | 1 | *Burrito Bowl*, *Cobb*, *Caesar*, *Dal* |\n| Chicken breast (raw) | 450 g | *Big-Batch Poached Chicken* anchor |\n| Ground turkey 93/7 | 300 g | *Three-Bean Chili* anchor, *Breakfast Burritos* |\n| Fresh salmon fillet | 280 g | *Sheet-Pan Miso-Glazed Salmon* |\n| Eggs | 1 dozen | *Frittata Cups*, *Migas*, *Jammy Eggs* |\n\n| 🥛 DAIRY & ALT | Qty | → feeds |\n|---|---|---|\n| Cottage cheese (low-fat) | 1 × 16–24 oz | *Avocado Bowl*, *Fluff*, dips |\n| Greek yogurt 0–2% | 1 × 32 oz | *Power Bowl*, *Ranch* anchor, smoothies |\n| Feta | 1 small block | Greek salads, frittata |\n| Shredded Mexican / Parmesan | 1 (small) | *Enchilada*, *Migas*, oats |\n| Unsweetened almond/soy milk | 1 carton | oats, smoothies |\n| Egg whites (carton) | 1 (½ used) | *Frittata Cups*, scramble volume |\n\n| 🧊 FROZEN (top-up) | Qty |\n|---|---|\n| Mixed berries | 1 bag |\n| Broccoli **or** stir-fry blend | 1 |\n| Edamame (shelled) | 1 bag |\n| Riced cauliflower (cut-day volume) | 1 bag |\n\n| 🥫 CANNED & DRY (top-up) | Qty |\n|---|---|\n| Black beans + chickpeas | 1 ea |\n| Diced tomatoes | 1 |\n| Tuna | 2 cans |\n| Grain pouches (brown rice, quinoa) | 2 |\n\n| 🫙 SAUCES & EXTRAS | Qty |\n|---|---|\n| Salsa verde + salsa | 1 ea |\n| Hummus | 1 tub |\n| Granola (low-sugar) | 1 bag |\n\n**Phase-1 fresh-run estimate: ~$60–75/week** (pantry already stocked; lighter cart than maintenance).\n\n---\n\n### PHASE 2 — REACH & REVERSE (Weeks 9–13)\n**Targets:** **reverse-diet 1550 → ~1850 kcal · P115 · fiber ~30.**\n**Math:** weight has hit ~125 lb. Add **~50–75 kcal/week** (mostly carbs) from 1550 toward ~1850 to find true maintenance **without rebound**. Protein stays ~115. This is the most i
