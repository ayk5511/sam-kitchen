a |\n| Coconut milk (light) | 1 |\n\n| 🫙 SAUCES & EXTRAS | Qty |\n|---|---|\n| Gochujang + kimchi (top-up) | 1 ea |\n| Furikake + nori sheets | 1 ea |\n| Thai green curry paste | 1 |\n| Cashews (top-up) | 1 |\n\n**Phase-2 fresh-run estimate: ~$70–90/week** (calories climbing; a little more fresh fish + beef return).\n\n---\n\n### PHASE 3 — TONE & MAINTAIN (Weeks 14–20)\n**Targets:** **~1900 kcal maintenance · P115 · fiber ~30 · fat ≥50.**\n**Math:** weight stable at 125 lb; eat at maintenance (~1900). Protein-forward recomposition at a stable scale — **toning comes from Pilates progression + daily walks + holding protein high**, not from cutting further. No periodization; carbs are simply \"the rest of the calories.\"\n**Cuisine emphasis:** full rotation, omega-3 forward (salmon, cod, shrimp, tofu) for body-comp + satiety. Volume-eating habits stay (non-starchy veg + lean protein lead the plate).\n\n| 🥬 PRODUCE | Qty | → feeds |\n|---|---|---|\n| Leafy greens (spring mix, arugula, romaine) | 1 tub + 1 | *Sweetgreen/CAVA-style* builds, *Cobb*, *Power Bowls* |\n| Bagged kits (variety) | 2 | fast volume |\n| Broccoli + cauliflower (fresh) | 1 ea | roast medley, volume |\n| Zucchini + asparagus | 2 + 1 bunch | sheet-pan sides |\n| Bell peppers | 3 | **iron + vit-C**, fajitas |\n| Cucumbers + cherry tomatoes | 2 + 1 pint | boats, boards, volume |\n| Lemons + limes | 4 + 3 | dressings |\n| Berries (fresh) | 1–2 pints | low-sugar fruit anchor |\n| Bananas | 4 | smoothies, pancakes |\n| Avocados | 3 | hold fat ≥50 g |\n| Spinach + kale (fresh) | 1 ea | **iron**, dal, frittata |\n| Herbs: dill, parsley, cilantro, mint | 1–2 | flavor without calories |\n\n| 🍗 PROTEINS | Qty | → feeds |\n|---|---|---|\n| **Rotisserie chicken** | 1 | *Power Bowls*, *Caesar* |\n| Chicken breast (raw) | 450 g | Poached anchor |\n| Fresh salmon | 280 g | *Miso/Furikake Salmon* — **omega-3** |\n| Cod fillet | 280 g | *Cod Puttanesca* |\n| Shrimp (frozen) | 280 g | *Fajitas*, *Soba* |\n| Egg whites (carton) + eggs | 1 + 1 dozen | scrambles, frittata |\n| Extra-firm tofu | 1–2 blocks | tofu anchor, *Thai curry* |\n\n| 🥛 DAIRY & ALT | Qty |\n|---|---|\n| Cottage cheese | 1 tub |\n| Greek yogurt 0–2% | 1 tub |\n| Feta | 1 (small) |\n| Almond milk (unsweetened) | 1 |\n\n| 🧊 FROZEN | Qty |\n|---|---|\n| Broccoli + green beans | 1 ea |\n| Edamame (shelled) | 1 bag |\n| Berries | 1 bag |\n| Riced cauliflower (volume) | 1 bag |\n\n| 🥫 CANNED & DRY | Qty |\n|---|---|\n| Grain pouches | 3 |\n| White beans + chickpeas | 1 ea |\n| Canned salmon + tuna | 1 ea |\n| Red lentils (top-up) | 1 |\n| Diced tomatoes | 1 |\n\n| 🫙 SAUCES & EXTRAS | Qty |\n|---|---|\n| Lemon-tahini + green goddess | 1 ea |\n| Everything-bagel + furikake | 1 ea |\n| Hot sauce / chili crisp (calorie-free heat) | 1 |\n| Pesto (top-up) | 1 |\n\n**Phase-3 fresh-run estimate: ~$75–95/week** (maintenance calories; fresh cod/salmon nudge it up).\n\n---\n\n### PHASE 4 — LIFESTYLE LOCK-IN (Weeks 21–26)\n**Targets:** **~1900 kcal · P105–115 · flexible 80/20 · fiber ~30.**\n**Math:** this is just maintenance, made sustainable. ~80% structured library meals, ~20% flexible (eating out, treats) inside the ~1900 budget. Protein eases slightly to ~105–115 g — still the toning lever, just less rigid. \"This is how I eat now.\"\n**Cuisine emphasis:** **everything on the table.** Re-add the calorie-denser favorites in full portions where they fit (*Cashew Chicken*, *Furikake Salmon*, *Migas*, *Tagine*). Farmers'-market produce for morale.\n\n| 🥬 PRODUCE | Qty | → feeds |\n|---|---|---|\n| Wide produce mix (whatever's seasonal at the market) | — | rotation + morale |\n| Avocados | 3 | generous fat back |\n| Bagged kits (variety) | 2 | *Caesar*, *Southwest*, *Asian* |\n| Bell peppers + onions | 3 + 2 | fajitas, tagine, stir-fry |\n| Broccoli + green beans + zucchini | 1 ea | sides |\n| Lemons + limes | 3 + 3 | all cuisines |\n| Bananas + 1–2 fresh fruits | 4 + 1 | snacks, smoothies |\n| Berries | 1–2 pints | bowls |\n| Mango (fresh) | 1 | tropical smoothies |\n| Garlic, ginger, shallots | 1 ea | flavor depth |\n| Fresh herbs (2–3 kinds) | — | rotation |\n| Kale + spinach | 1 ea | **iron** maintained |\n\n| 🍗 PROTEINS | Qty | → feeds |\n|---|---|---|\n| **Rotisserie chicken** | 1 | *Cashew*, *Power Bowls* |\n| Chicken breast (raw) | 450 g | Poached anchor |\n| Fresh salmon | 300 g | *Furikake*, *Miso*, *Poke* — **omega-3** |\n| Ground turkey **or** beef | 300 g | *Bolognese*, *Gochujang*, *Chili* |\n| Shrimp | 280 g | *Fajitas*, *Soba* |\n| Eggs | 1 dozen | *Migas*, frittata, jammy |\n| Tofu | 1–2 blocks | anchor, curry |\n\n| 🥛 DAIRY & ALT | Qty |\n|---|---|\n| Cottage cheese + Greek yogurt | 1 ea |\n| Feta + Parmesan | 1 (small) ea |\n| String cheese | 1 pack |\n| Almond/soy milk | 1 |\n\n| 🧊 FROZEN | Qty |\n|---|---|\n| Stir-fry blend **or** broccoli | 1 |\n| Edamame (shelled + pod) | 1 ea |\n| Mango + pineapple + berries | 1 ea |\n| Açaí/pitaya packs | 1 |\n\n| 🥫 CANNED & DRY | Qty |\n|---|---|\n| Grain pouches (full re-add) | 3 |\n| Chickpea pasta | 1 box |\n| Black beans + chickpeas + white beans | 1 ea |\n| Canned salmon + tuna | 1 ea |\n| Coconut milk + diced tomatoes | 1 ea |\n| Cashews (*Cashew Chicken*) | 1 |\n\n| 🫙 SAUCES & EXTRAS | Qty |\n|---|---|\n| Pesto + teriyaki + gochujang (rotate) | 1 ea |\n| Ras el hanout / harissa (*Tagine*) | 1 ea |\n| Granola + nut butter (re-add) | 1 ea |\n| Furikake + everything-bagel | 1 ea |\n\n**Phase-4 fresh-run estimate: ~$70–95/week** (variety premium, but maintenance calories keep it moderate).\n\n---\n\n## 3. SUNDAY BATCH SESSION — turn the cart into a week (≤ 75 min hands-on)\n\nRun the core anchors in parallel; total active time ~60–75 min (less than the athlete plan because portions are smaller), then the week is **assembly only** (≤ 10 min/meal). Anchors are from [`../02-recipes/by-category/anchors.md`](../02-recipes/by-category/anchors.md).\n\n| Order | Anchor | Active | Appliance | Powers these meals |\n|---|---|--:|---|---|\n| 1 | *Triple-Grain Base: Quinoa / Brown Rice / Farro* | 8 min | Instant Pot / pouches | every lunch & dinner bowl (smaller scoops on cut) |\n| 2 | *Big-Batch Poached Chicken, Seasoned 3 Ways* | 10 min | one pot | *Burrito Bowl*, *Cobb*, *Caesar*, *Power Bowls*, *Dal* |\n| 3 | *Sheet-Pan Roasted Veg Medley* + *Marinated Baked Tofu + Edamame* | 12 min | 2 sheet pans, one oven | veg side everywhere (volume); tofu for *Teriyaki*/*Scramble*/*Thai* |\n| 4 | *Instant-Pot Turkey & Two-Bean Chili* **or** *Instant-Pot Spiced Lentils* (alternate weekly) | 10 min | Instant Pot | dinners + freezer backstop (3–4 portions) |\n| 5 | *Batch Soy-Marinated Jammy Eggs + Baked Egg Bites* | 12 min | stovetop + muffin tin | breakfasts, snacks, bowl topper |\n| 6 | Sauces: *Greek-Yogurt Ranch*, *Peanut-Lime Sauce*, *Lemon-Tahini Sauce + Salsa-Macha-Lite* | 12 min | blender/jar | dressing rotation = flavor variety |\n| 7 | *Overnight Oats Master Base* ×3 jars | 6 min | jars | 3 grab-and-go breakfasts |\n\n**Result:** ~5 protein anchors + grains + veg + 4 sauces + 3 breakfasts staged. Because portions are sized to ~1550–1900 kcal, a single Sunday session typically carries **further into the week** than an athlete batch — often Sun→Thu before a light Wednesday top-up. Mix-and-match across cuisines so the \"never the same day twice\" rule holds with near-zero weekday cooking.\n\n> **Lazy-Sunday core 4:** if 75 min is too much, do just *Big-Batch Poached Chicken* + *Triple-Grain Base* + *Sheet-Pan Roasted Veg* + the sauce set. That covers every lunch/dinner bowl. A partial prep beats none.\n\n---\n\n## 4. WHERE TO BUY — store-by-store lazy-buy cheat sheet\n\nSpecific, lazy-friendly SKUs and rough prices (CA, mid-2026). Match each store to its edge. **Quantities/frequency are sized for one person eating ~1550–1900 kcal** — buy the small pack, freeze the rest.\n\n### Trader Joe's — the variety + assembly engine (best $/variety)\n| Lazy buy | ~Price | Use |\n|---|--:|---|\n| Just Chicken / grilled strips | $5–6 | instant protein on any salad/bowl |\n| Frozen brown rice / quinoa / harvest grains | $2–3 | *Triple-Grain* shortcut |\n| Steamed lentils + steamed beets (refrigerated) | $2–3 | instant fiber/iron bump |\n| Frozen shelled edamame | $1.79 | every \"edamame\" recipe |\n| Egg whites (carton) | $3–4 | low-fat protein volume on a cut |\n| Bagged salad kits (Caesar, Southwest, Sweet Kale) | $3–4 | *Caesar*/*Cobb*/*Burrito Bowl* bases |\n| Smoked salmon + everything-bagel seasoning | `5–6 / `2 | *TJ's Smoked Salmon & Egg Plate*, *Cucumber Boats* |\n| Chickpea/lentil pasta | $2–3 | *Bolognese*, *Pesto Skillet* |\n| Unsweetened Greek yogurt / cottage cheese | `4 / `3 | dairy backbone |\n| Sauces: green goddess, peanut, salsa verde, gochujang | $2–4 | cuisine rotation in one jar |\n| Frozen mango / berries / riced cauliflower | $2–3 | smoothies, low-cal volume swaps |\n\n### Costco — the bulk protein + price-per-gram winner (split-pack, freeze)\n> One-person caveat: Costco wins on $/gram but the packs are big. **Split + freeze on the day you buy** (chicken into ~150 g portions, shrimp/salmon into single servings). A membership pays off mainly on rotisserie + canned fish + eggs + the supplement stack.\n\n| Lazy buy | ~Price | Use |\n|---|--:|---|\n| **Rotisserie chicken** | **`4.99** | the single best `/protein lazy buy — feeds 3–4 of her meals |\n| Kirkland canned wild salmon (6-pk) | $13–16 | *Cucumber Boats*, *Green Goddess Bowl* — lasts weeks for one person |\n| Canned albacore (flat) | $13 | *Tuna salad*, *Spicy Tuna* — pantry depth |\n| Frozen wild salmon fillets (bag) | $20–28 | portion into singles + freeze for sheet-pan nights |\n| Chicken breast (mega-pack) | $3.49/lb | poached-chicken anchor — freeze in ~150 g portions |\n| Frozen shrimp (1–2 lb) | $13–22 | *Fajitas*, *Soba* — keep frozen, thaw a handful |\n| Organic egg flats (24) | $6–8 | frittata, jammy eggs, scrambles (uses ~1 doz/wk) |\n| Protein powder (Premier/OWN) | `25–40 | amortizes to ~`0.80/serving |\n| Frozen broccoli / stir-fry / berries (mega-bags) | $8–10 | zero-prep veg + fruit, lasts a month+ |\n| Street-corn chicken / pre-cooked proteins (deli) | varies | *Costco Street-Corn Chicken & Cottage Cheese Plate* |\n| Creatine / electrolytes / D3 (bulk) | best $/dose | supplement stack |\n\n### Whole Foods — the fresh fish + specialty + quality dairy stop\n| Lazy buy | ~Price | Use |\n|---|--:|---|\n| Fresh wild salmon / cod fillet (counter — **buy just ~⅔ lb at a time**) | $11–16/lb | *Miso/Furikake Salmon*, *Cod Puttanesca* |\n| 365 chickpea pasta / pre-cooked grains | $2–3 | pasta + bowl bases |\n| High-protein granola, kefir, skyr | varies | *Yogurt Power Bowl* |\n| Prepared hummus + olive bar | varies | *Girl-Dinner Board*, crudité duo |\n| Miso, tahini, kimchi, gochujang | $4–7 | Japanese/Korean/Med sauces |\n| Quality tofu / tempeh | $2–3 | tofu anchor |\n| Casein protein, magnesium glycinate | varies | PM pudding + recovery |\n\n### Sprouts — the bulk-bin + produce-value + specialty stop\n| Lazy buy | ~Price | Use |\n|---|--:|---|\n| Bulk bins: lentils, quinoa, oats, nuts, spices (**buy small — solo portions**) | cheap by weight | red lentils, oats, spice rack |\n| Fresh produce (often best $/lb) | varies | weekly produce list |\n| Bagged kits + pre-cut veg | $3–4 | assembly speed |\n| Sprouted/high-fiber tortillas & bread | $3–4 | *Breakfast Burritos*, *Cottage Cheese Toast* |\n| Specialty protein bars / jerky | varies | snack board, on-the-go |\n| Wild canned fish + chickpea pasta | $2–4 | pantry top-up |\n\n### Realistic single-person weekly budget\n| Bucket | Weekly | Notes |\n|---|--:|---|\n| Fresh perishables (phase list) | $60–95 | Phase 1 lowest (cut), Phase 3 highest (fresh cod/salmon at maintenance) |\n| Pantry/freezer amortized | $8–15 | bulk buys spread over weeks (less depth needed than an athlete pantry) |\n| Supplements amortized | $5–8 | creatine + D3 + omega-3 (+ occasional electrolytes/magnesium) |\n| **Total run-rate** | **≈ `70–110/week** | ~`300–475/month for one lightly-active person |\n\n> **Budget lever:** rotisserie chicken (`4.99) + Costco canned salmon/tuna + bulk chicken-breast + eggs + tofu cover ~65% of her ~115 g/day protein for **~`25–30/week**. The rest of the budget buys **variety**, not protein — which is exactly the constraint that matters for Sam (boredom, not grams, is the adherence risk). On a tight week she can sit at the **`70 floor** and still hit every macro; the `110 ceiling is a \"lots of fresh fish + farmers'-market produce\" week, not a requirement.\n\n---\n\n## 5. Quick-reference — recipe → key shopping triggers\n\nIf Sam wants a specific recipe this week, grab these and the pantry covers the rest. (Names match [`../02-recipes/index.md`](../02-recipes/index.md).) Lighter mains are flagged ⬇ — lean on these on cut days.\n\n| Recipe | kcal | Buy-fresh trigger items |\n|---|--:|---|\n| **Sheet-Pan Shrimp Fajitas with Avocado** ⬇ | 322 | shrimp, bell peppers, avocado, lime |\n| **Instant-Pot Turkey & Three-Bean Chili** ⬇ | 351 | ground turkey (pantry beans + tomatoes) |\n| **Instant-Pot Red Lentil & Rotisserie Chicken Dal** ⬇ | 322 | rotisserie chicken (pantry lentils + coconut milk) |\n| **Moroccan Chicken & Chickpea Tagine** ⬇ | 384 | chicken, chickpeas, dried apricots, ras el hanout |\n| **Korean Gochujang Beef & Edamame Bowl** ⬇ | 398 | beef, edamame, gochujang, scallions |\n| **Baked Cod Puttanesca with White Beans** ⬇ | 410 | cod, white beans, olives, capers |\n| **Pesto Chicken Chickpea-Pasta Skillet** ⬇ | 418 | chicken, chickpea pasta, pesto |\n| **Cal-Mex Rotisserie Chicken Burrito Bowl** | 610 (scale ×0.85) | rotisserie chicken, avocado, salad kit, lime |\n| **Sheet-Pan Miso-Glazed Salmon** | 630 (scale ×0.8) | fresh salmon, broccoli, miso |\n| **Greek Mason-Jar Chickpea & Feta Salad** | 620 (scale ×0.85) | chickpeas, feta, cucumber, cherry tomato |\n| **Cashew Chicken Stir-Fry** | 418 | chicken, stir-fry veg, cashews |\n| **Triple-Berry Protein Smoothie Bowl** | 500 | frozen berries, açaí pack, banana |\n\n> **Scaling note:** for the 500–650 kcal mains on a ~1550 kcal cut day, take the listed multiplier (×0.8–0.9) or pair a small portion with a high-volume side (extra cucumber/greens/riced cauliflower). Protein barely moves; calories do.\n\n---\n\n*Regenerate the recipe library with `python3 tools/render_recipes.py`. This shopping system is keyed to that library — when recipes change, only the per-recipe trigger table (Section 5) needs a glance. Quantities in Section 0 scale linearly with bodyweight and intake: if assumptions change, re-derive from the **59 kg / ~115 g-protein-per-day / ~1550–1900 kcal** basis (lightly active: walking + Pilates 2×/wk).*\n"}, "prep": {"title": "Batch-Prep Playbook", "md": "# Sunday + Wednesday Batch-Prep Playbook\n### Cook-Once, Eat-All-Week — Built for Sam\n\nYou're lightly active, you get bored fast, and you'd rather not cook every night. Fair. This playbook front-loads ~2 hours of effort across two short sessions so the other 5 days are pure assembly. No athlete portions, no carb-loading, no willpower required — just open the fridge and build.\n\n**The numbers we're hitting:** ~1550 kcal/day on the cut (Phases 1–2), ~1900 kcal at maintenance (Phases 3–4). Protein ~115 g/day. Fiber 28–32 g/day. Every portion below is sized for *one lightly-active person*, not a linebacker.\n\n---\n\n## 1. The Anchor Philosophy\n\nAn **anchor** is a component you cook *once* in bulk and *remix* all week. You never cook a \"meal\" — you cook 8 building blocks, then snap them together like Lego. The magic: one protein anchor becomes four different dinners just by changing the sauce and grain.\n\n### The time-saved math\n\n| Approach | Cooking events/week | Active minutes/event | Total active min/week |\n|---|---|---|---|\n| Cook fresh nightly | ~14 (lunch + dinner) | ~35 | **~490 min (8.2 hr)** |\n| Anchor system | 2 (Sun + Wed) | ~60 / ~27 | **~87 min (1.45 hr)** |\n\nThat's an **~82% cut in kitchen time**, ~6.7 hours back per week. The trade: you do one focused 90-min block while the equipment does the passive work, and one 25-min mid-week top-up.\n\n### The variety engine: 1 chicken → 4 cuisines\n\nThe **Big-Batch Poached Chicken, Seasoned 3 Ways** is the workhorse. Same poached breast, three spice profiles, four finished meals — so Monday never tastes like Thursday:\n\n| Seasoning | + Grain | + Sauce/Veg | = Finished meal |\n|---|---|---|---|\n| Chipotle-Lime | Garlic Brown Rice | salsa-macha-lite, black beans | **Cal-Mex Rotisserie Chicken Burrito Bowl** |\n| Lemon-Herb | Herb Farro | Lemon-Tahini, roasted veg | **3-Minute Rotisserie Chicken Power Bowl** |\n| Lemon-Herb | chickpea pasta | pesto, cherry tomato | **Pesto Chicken Chickpea-Pasta Skillet** |\n| Soy-Ginger | Lemon Quinoa | Peanut-Lime, edamame | **Soy-Ginger Crunch Bowl** |\n\n### The 8 anchors (+ breakfast/snack helpers)\n\n1. **Big-Batch Poached Chicken, Seasoned 3 Ways** (Lemon-Herb / Chipotle-Lime / Soy-Ginger)\n2. **Marinated Baked Tofu + Edamame**\n3. **Batch Soy-Marinated Jammy Eggs + Baked Egg Bites**\n4. **Triple-Grain Base** (Lemon Quinoa / Garlic Brown Rice / Herb Farro)\n5. **Sheet-Pan Roasted Veg Medley**\n6. **Instant-Pot Spiced Lentils**\n7. **Instant-Pot Turkey & Two-Bean Chili**\n8. **The sauce trio** — Greek-Yogurt Ranch / Peanut-Lime Sauce / Lemon-Tahini + Salsa-Macha-Lite\n\nBreakfast/snack support: **Overnight Oats Master Base** and **Cottage-Cheese & Avocado Mash Anchor**.\n\n---\n\n## 2. The Timed ~90-Minute Sunday Prep Flow\n\n**Critical-path rule:** start the thing with the longest *hands-off* time first, then fill the waiting gaps. Instant Pot → oven → stove → blender, in that launch order. You're rarely doing two active things at once; you're babysitting passive cooks.\n\n> **Prep-ahead (night before, optional, 5 min):** start two jars of Overnight Oats so breakfast is already done.\n\n| Time | You do (active) | Running in background | Anchor produced |\n|---|---|---|---|\n| **0:00–0:08** | Rinse lentils, dump into Instant Pot with water, cumin, bay; seal, set 12 min. | — | → Spiced Lentils (cooking) |\n| **0:08–0:18** | Chop all veg for the medley; toss on 2 sheet pans w/ oil, salt. Oven to 425°F. | Lentils | Veg prep |\n| **0:18–0:20** | Sheet pans in oven (25 min timer). | Lentils + Veg roasting | → Roasted Veg Medley (cooking) |\n| **0:20–0:23** | Lentils done → quick-release, scoop into container to cool. Rinse pot. | Veg roasting | ✅ **Spiced Lentils** |\n| **0:23–0:30** | Chili: sauté turkey in IP (Sauté mode), add beans, tomato, spices; seal, 15 min. | Veg roasting | → Turkey Chili (cooking) |\n| **0:30–0:45** | Stove: poach chicken in wide pan (gentle simmer ~15 min). Meanwhile cube tofu, toss in marinade onto a small tray. | Chili + Veg roasting | Chicken (cooking) |\n| **0:45–0:47** | Veg done → pull pans, cool. Slide tofu tray into oven (20 min). | Chili | ✅ **Roasted Veg Medley** |\n| **0:47–0:55** | Chicken done → rest, then split into 3 piles; rub Lemon-Herb / Chipotle-Lime / Soy-Ginger. Shred or slice. | Chili + Tofu baking | ✅ **Chicken, Seasoned 3 Ways** |\n| **0:55–1:05** | Cook quinoa (microwave or stovetop) + reheat-ready brown rice pouch + farro; season into 3 grains. | Chili + Tofu | → **Triple-Grain Base** |\n| **1:05–1:08** | Chili done → release, cool. Tofu out → cool. | — | ✅ **Turkey Chili** ✅ **Tofu** |\n| **1:08–1:15** | **Blender sprint:** Greek-Yogurt Ranch, then Peanut-Lime, then Lemon-Tahini (rinse between). | — | ✅ **Sauce trio** |\n| **1:15–1:25** | Lower jammy eggs into boiling water 6.5 min → ice bath → peel → soy marinade. Pour egg-bite mix into muffin tin (bake later or now if oven free). | — | ✅ **Jammy Eggs + Egg Bites** |\n| **1:25–1:30** | Portion everything into containers. Label. Done. | — | All anchors stored |\n\n**Net:** ~90 min wall-clock, but only ~55–60 min hands-on — the rest is the IP and oven working while you chop or rest.\n\n### The 60-Minute \"Lazy Core-4\" Fallback\n\nNo energy for the full run? Do **only these four** and you've still covered every lunch and dinner:\n\n| Min | Anchor | Why it's core |\n|---|---|---|\n| 0–5 | Instant-Pot Turkey & Two-Bean Chili (start it, walk away) | 4+ heat-and-eat dinners, ~30 g protein each |\n| 5–20 | Poached Chicken (one seasoning is fine) | the protein backbone |\n| 20–22 | Sheet-Pan Veg (one pan, while chili cooks) | the veg + fiber |\n| 22–30 | One grain (microwave rice pouch) + buy a tub of pre-made sauce | the carb + flavor |\n\nChili runs in the background the whole time. You're hands-on ~30 min and walk away with a full week of mix-and-match. Everything else (tofu, eggs, extra grains, homemade sauces) is *nice-to-have* — skip guilt-free.\n\n---\n\n## 3. The Wednesday ~25–30 Minute Top-Up\n\nBy Wednesday your cold proteins are running low and Monday's flavors feel old. Two moves fix both: **re-arm protein** and **flip cold → hot** so Thu–Sun feels like a new menu.\n\n| Min | Move | Effect |\n|---|---|---|\n| 0–10 | **Re-arm protein:** marinate + bake a fresh tofu tray, OR poach 2 more chicken breasts, OR boil 4 fresh jammy eggs. | Restocks the anchor that depletes fastest. |\n| 10–18 | **Flip format:** take cold roasted veg + chicken and turn them *hot* — Pesto Chicken Chickpea-Pasta Skillet, or warm grain bowl with melted feta. | Same ingredients, brand-new meal experience. |\n| 18–25 | **Refresh one sauce + one crunch:** blitz a fresh half-batch of Peanut-Lime or Lemon-Tahini; chop cucumber/cabbage for texture. | Sauce is what makes leftovers taste un-leftover. |\n| 25–30 | Quick fridge audit: toss anything past its date, pull Fri–Sun proteins to front. | Zero waste, zero Thursday surprises. |\n\n**The cold→hot flip menu** (pick one): chili over rice → **Instant-Pot Turkey & Three-Bean Chili** bowl; cold chicken salad → hot **Pesto Chicken Chickpea-Pasta Skillet**; cold tofu → tofu stir-fried into the **Soy-Ginger Crunch Bowl**.\n\n---\n\n## 4. The Component Matrix\n\n### Anchor → finished-meal map\n\n| Anchor | Cold assembly | Hot assembly |\n|---|---|---|\n| Chicken (Chipotle-Lime) | **Cal-Mex Rotisserie Chicken Burrito Bowl** | chicken-rice skillet |\n| Chicken (Lemon-Herb) | **3-Minute Rotisserie Chicken Power Bowl** | **Pesto Chicken Chickpea-Pasta Skillet** |\n| Marinated Baked Tofu + Edamame | **Greek Mason-Jar Chickpea & Feta Salad** (sub tofu) | Soy-Ginger tofu stir-fry bowl |\n| Jammy Eggs / Egg Bites | egg + avocado toast topper | reheated egg bites (90 s) |\n| Triple-Grain Base | **Mediterranean Lentil Tabbouleh Bowl** | warm farro + roasted veg |\n| Roasted Veg Medley | grain-bowl base, salad add-in | folded into chili or pasta |\n| Spiced Lentils | **Mediterranean Lentil Tabbouleh Bowl** | lentil + grain warm bowl |\n| Turkey & Two-Bean Chili | — | **Instant-Pot Turkey & Three-Bean Chili** over rice |\n| Sauces | dressing for any cold bowl | drizzle/finish on hot bowls |\n\n### Build a bowl in 90 seconds\n\nThe universal formula — **protein + grain + veg + sauce**, scoop and go:\n\n```\n1 protein scoop  (palm-size: chicken / tofu / lentils / chili / 2 eggs)\n1 grain scoop    (quinoa / brown rice / farro)\n2 veg scoops     (roasted medley + something raw & crunchy)\n1 sauce spoon    (ranch / peanut-lime / tahini / salsa-macha-lite)\n```\n\nMicrowave 90 s if you want it hot. Done. No recipe, no decision fatigue.\n\n### Cut vs. Maintenance: the portion-control move\n\nSame bowl, two dials. **Keep protein and veg identical** — shrink the grain and sauce. That preserves fullness and protein target while pulling ~350 kcal:\n\n| Component | Cut (~1550 kcal) | Maintenance (~1900 kcal) |\n|---|---|---|\n| Protein | full scoop (~30–35 g protein) | full scoop — **unchanged** |\n| Veg | 2 full scoops | 2 full scoops — **unchanged** |\n| Grain | **½ scoop** (~½ cup cooked) | full scoop (~1 cup) |\n| Sauce | **1 level Tbsp** | 2 Tbsp |\n| Extra fat (avocado, feta, nuts) | small or skip | add freely |\n\nThe rule of thumb: **on the cut, you don't eat less protein or veg — you just go lighter on the carb scoop and the sauce drizzle.** That's where the calories hide, and that's what keeps you full enough to not raid the pantry at 9 p.m.\n\n---\n\n## 5. Food Safety & Storage\n\n### Per-component shelf life\n\n| Component | Fridge | Freezer | Notes |\n|---|---|---|---|\n| Poached chicken | 3–4 days | 2–3 months | Freeze half Sunday if you won't finish by Wed. |\n| Baked tofu | 4–5 days | 2–3 months | Holds well; firms up cold. |\n| Jammy eggs (in marinade) | 3–4 days | ✗ don't freeze | Whites turn rubbery frozen. |\n| Egg bites | 4 days | 1–2 months | Freeze individually, reheat from frozen. |\n| Cooked grains | 4–5 days | 2–3 months | Freeze in flat bags; thaw in microwave. |\n| Roasted veg | 4–5 days | not ideal | Texture suffers; eat fresh. |\n| Spiced lentils | 4–5 days | 2–3 months | Freezes beautifully. |\n| Turkey chili | 3–4 days | 3–4 months | **Best freezer asset** — your buffer meals. |\n| Yogurt ranch | 4–5 days | ✗ | Dairy splits frozen. |\n| Peanut-lime / tahini sauce | 5–7 days | 1 month | Thin with water after thaw. |\n| Overnight oats | 4–5 days | ✗ | Make 2 jars at a time. |\n| Cottage-cheese/avocado mash | 1–2 days | ✗ | Make fresh — avocado browns fast. |\n\n### The non-negotiable rules\n\n- **USDA 2-hour rule:** get cooked food from counter into the fridge within **2 hours** of cooking (1 hour if your kitchen is above ~90°F). Bacteria multiply fastest between 40–140°F. This is why the Sunday flow ends with \"cool, then portion.\"\n- **Cool before sealing:** spread hot food shallow (lentils, chili, grains) so it drops below 70°F fast. Don't stack a sealed hot container in the fridge — it traps heat and warms its neighbors.\n- **Reheat to steaming** (~165°F internal) — visible steam = safe. Add a splash of water to grains/chicken before microwaving so they don't dry out; 60–90 s for a single portion.\n- **Freezer buffer:** label everything with name + date. Freeze 2 chili portions and 1 chicken portion every Sunday — by week 3 you have a \"too tired to prep\" stash (see §7).\n\n### Container & portioning tips\n\n- **Glass containers with locking lids** for anything you'll microwave (no plastic-into-food, no warping). Leak-proof matters for sauced bowls.\n- **Portion at storage time, not eating time** — pre-scoop proteins and grains into single servings so a \"bowl\" is just combining, not measuring. This is the laziness multiplier.\n- **Sauces in small leak-proof jars or silicone cups**, stored *separate* from grains/veg — dress at eating time so nothing goes soggy.\n- **Mason jars for salads/oats:** dressing on the bottom, sturdy stuff next, greens on top; invert when you eat.\n\n---\n\n## 6. Minimal Gear List (~10 items)\n\n| Gear | Why it earns its spot |\n|---|---|\n| **Instant Pot (6 qt)** | Hands-off lentils + chili while you do everything else — the critical-path engine. |\n| **2 half-sheet pans** | Roast all your veg (and tofu) in one oven load, parallelized. |\n| **Blender** | Three sauces in under 10 minutes; sauce *is* the variety. |\n| **Glass meal-prep containers (set of ~6, locking lids)** | Microwave-safe, leak-proof, see what you have at a glance. |\n| **Small leak-proof sauce jars / silicone cups** | Keep dressings separate so bowls never go soggy. |\n| **Mason jars (wide-mouth, 4×)** | Overnight oats + layered salads that travel. |\n| **Sharp chef's knife + cutting board** | 80% of your active time is chopping; a sharp knife halves it. |\n| **Muffin tin** | Egg bites in one batch — grab-and-go protein. |\n| **Microplane / box grater** | Garlic, ginger, feta, lemon zest — flavor with zero effort. |\n| **Digital food scale** | Portioning protein for the cut without guessing; instrument, don't eyeball. |\n\n---\n\n## 7. \"Too Tired to Prep\" Contingency\n\nSkipped Sunday? You have three tiers, in order of laziness. Never an excuse to blow the macros.\n\n### Tier 1 — Freezer buffer (zero cooking)\nPull a frozen **Turkey Chili** or **chicken + grain** portion you stashed weeks ago. Microwave 3–4 min from frozen (stir halfway, add water splash). This is why §5 says freeze 2–3 portions *every* Sunday — your past self prepped for this exact night.\n\n### Tier 2 — No-cook pantry assembly (~3 min)\nBuild from shelf-stable + fridge staples, no heat required:\n\n| Quick build | Components | Rough macros |\n|---|---|---|\n| Tuna-chickpea bowl | canned tuna + canned chickpeas + olive oil + lemon | ~35 g protein, ~400 kcal |\n| Cottage-cheese plate | cottage cheese + **Cottage-Cheese & Avocado Mash** + crackers | ~28 g protein, ~380 kcal |\n| Greek yogurt + berries + nuts | high-protein Greek yogurt + frozen berries + spoon of PB | ~25 g protein, ~350 kcal |\n\n### Tier 3 — On-macro restaurant orders\nWhen you're not even home. Order these *exact* builds to stay on plan:\n\n| Spot | Order | Cut tweak | Rough macros |\n|---|---|---|---|\n| **Chipotle** | Bowl: chicken, brown rice (½ scoop), black beans, fajita veg, salsa, no cheese/sour cream | ask for **light rice** | ~40 g protein, ~500 kcal |\n| **Sweetgreen** | Protein Plate or salad: grilled chicken, ½ grain, lots of veg, dressing on side | **dressing on the side**, use half | ~35 g protein, ~480 kcal |\n| **CAVA** | Bowl: SuperGreens base, grilled chicken, hummus, cucumber, no pita | greens base instead of rice | ~38 g protein, ~520 kcal |\n\n**The golden rule across all tiers:** protein + veg stay non-negotiable; the carb and the fat are the dials you turn down. Same logic as the cut portioning in §4 — you're never *not* eating well, you're just choosing how lazy to be about it.\n\n---\n\n*Built for Sam — lightly active, easily bored, productively lazy. Cook twice, eat well seven days, never think about it in between.*\n"}, "tracking": {"title": "Tracking & Swaps", "md": "# 📊 Tracking, Swaps & Auto-Pilot — Sam's Lean-Out & Maintain System\n\nThis is a **lifestyle, not a crash diet**: lose ~5 lb (130 → 125), look more toned, then *keep it there for good*. Everything below is built to make that easy and boring-proof — assemble, don't cook; rotate cuisines so nothing repeats; track the two numbers that matter and ignore the rest.\n\nWorking assumptions (state once, then forget — re-derive only if bodyweight moves >±3 lb):\n\n| Metric | Value | How it's derived |\n|---|---|---|\n| Height | 5'7\" (170 cm) | fixed |\n| Bodyweight (BW) now | 130 lb (59 kg) | the anchor |\n| Goal weight | 125 lb (57 kg) | ~5 lb / 2.3 kg of fat |\n| Activity | Lightly active | daily walks (NEAT) + Pilates 2×/week — **not** an athlete |\n| BMR (Mifflin-St Jeor ♀) | **1377 kcal** | `10·59 + 6.25·170 − 5·23 − 161` = 590 + 1062.5 − 115 − 161 |\n| Maintenance (TDEE) | **~1925 kcal** | BMR × 1.4 (light activity); range ~1850 low-NEAT day → ~2050 big-walk + Pilates day |\n| Cut intake | **~1550 kcal** | −325 to −375/day deficit → see math below |\n| Floor (never below) | **~1400 kcal** | energy availability for a 23 yo ♀ — hormones lose before fat does |\n\n**Deficit math (so you trust the number):** the standard rule is **3500 kcal ≈ 1 lb of fat**. A 350 kcal/day deficit × 7 = 2450 kcal/week ÷ 3500 = **0.70 lb/week** (≈0.32 kg). At that rate, **5 lb takes ~7–8 weeks**. That's the whole cut. Slower is fine — faster is not the goal, because crash deficits cost muscle (the toned look) and rebound hard.\n\n**Daily macro frame (Phase 1 — the cut. See §7 for the other phases):**\n\n| Macro | Target | g/kg | Per-meal rule |\n|---|--:|--:|---|\n| Calories | ~1550 | — | the *outcome*, not the thing you chase — protein + fiber drive it |\n| Protein | **115 g** | 1.95 | 25–35 g at breakfast/lunch/dinner + 15–20 g snack. **The toning lever — hold it even on cut days.** |\n| Fiber | 30 g | — | ≥14 g/1000 kcal → 8–10 g/main, 3–6 g/snack. **Ramp gradually** weeks 1–2. |\n| Fat | 50 g | 0.85 | never below 45 g (hormonal health) |\n| Carbs | ~150 g | 2.5 | fills the remainder; light activity = **no carb periodization needed** |\n\n**What a cut day looks like (numbers from the actual library):**\n\n| Slot | Meal | kcal | P | Fiber |\n|---|---|--:|--:|--:|\n| Breakfast | *Mediterranean Muffin-Tin Frittata Cups* | 410 | 41 | 10 |\n| Lunch | *Mediterranean Farro & White Bean Tuna Salad* | 470 | 40 | 14 |\n| Snack | *Wild Salmon Everything-Bagel Cucumber Boats* | 230 | 28 | 5 |\n| Dinner | *Instant-Pot Turkey & Three-Bean Chili* | 351 | 32 | 14 |\n| **Daily total** | | **1461** | **141** | **43** |\n\nThat lands a touch *under* 1550 with protein and fiber to spare — add a piece of fruit or bump the chili portion to 1.1× and you're at target. **Maintenance days** add a second snack and/or use full (1.0×) portions to reach ~1900.\n\n---\n\n## 1. Weekly Tracker (two numbers that matter, five that help)\n\nCopy this block into a new note each Sunday night. **Log to the nearest 10 kcal / 5 g** — precision beyond that is noise, and noise is what feeds obsessing.\n\n### The template\n\n| Day | kcal | P (g) | Fiber (g) | AM weight (lb) | Pilates / Walk | Energy 1–5 | Notes |\n|---|--:|--:|--:|--:|---|:--:|---|\n| Mon | | | | | | | |\n| Tue | | | | | | | |\n| Wed | | | | | | | |\n| Thu | | | | | | | |\n| Fri | | | | | | | |\n| Sat | | | | | | | |\n| Sun | | | | | | | |\n| **Avg / 7-day** | | | | **trend ▸** | — | — | |\n\n**Worked example (a real Phase-1 cut week, so the columns are unambiguous):**\n\n| Day | kcal | P (g) | Fiber (g) | AM weight | Pilates / Walk | Energy | Notes |\n|---|--:|--:|--:|--:|---|:--:|---|\n| Mon | 1540 | 116 | 30 | 130.2 | Pilates + 6k steps | 4 | Frittata Cups + Tuna Farro Salad |\n| Tue | 1490 | 118 | 31 | 130.0 | 9k steps | 4 | slept 8h, easy day |\n| Wed | 1610 | 113 | 29 | 129.8 | Pilates + 5k steps | 4 | Migas (½×) + Burrito Bowl |\n| Thu | 1530 | 119 | 32 | 130.3 | 7k steps | 3 | salty dinner → water up |\n| Fri | 1500 | 114 | 33 | 129.7 | long walk 11k | 4 | Falafel wrap, hit fiber easily |\n| Sat | 1880 | 108 | 28 | 129.9 | rest | 5 | ate out (Chipotle), flexible day |\n| Sun | 1480 | 117 | 31 | 129.4 | meal-prep + walk | 4 | batch-cook Sunday |\n| **Avg** | **1576** | **115** | **30.6** | **129.9 ▸ down ~0.3 lb** | — | 4.0 | on target |\n\n### Anti-obsessing rules (the part that actually keeps you sane)\n\n- **Weekly average is the ONLY number that matters.** One 1880-kcal Saturday inside a 1550 average is *invisible* over 7 days. Daily numbers are inputs; the weekly average is the signal.\n- **Log protein and fiber first, calories second.** Hit P and fiber and the rest self-corrects — high-protein/high-fiber meals are satiating and hard to overeat. If you only have energy to track two columns, track **those two**.\n- **\"Close enough\" = green day.** Within ±100 kcal, ±10 g protein, ±4 g fiber of target. Don't re-weigh, don't re-log, don't spiral. Move on.\n- **Use the library, not a database.** Every meal is pre-macro'd. Logging = writing the meal *name* + portion multiplier, not entering ingredients. \"*Salmon Poke Bowl* ×0.8 + *Chocolate-Espresso Pudding* ×1\" already sums to a known P/Fiber.\n- **Energy 1–5 is non-negotiable to log.** It's your early-warning system (§2). A weight that won't move *with* energy at 4–5 is a different problem than one stuck *with* energy at 2.\n- **No \"catch-up\" or \"make-up\" math.** You don't bank or repay calories. Each week stands alone. A big meal isn't a debt.\n- **The scale is allowed to go UP some mornings.** Water, sodium, fiber, cycle phase — all move it 1–2 lb overnight. You manage the trend, never the point (§2).\n- **No food is \"bad\" and nothing is \"ruined.\"** This is the lifestyle you'll run for years. An off-plan meal is data, not a failure.\n\n---\n\n## 2. Check-In Cadence & Decision Tree (5-lb cut → maintain)\n\nBodyweight is noisy (±1–2 lb daily from water, glycogen, sodium, cycle phase). You manage the **trend**, never the **point**. Different cadences answer different questions:\n\n### Cadence\n\n| Cadence | What | Protocol |\n|---|---|---|\n| **Daily** | AM weigh-in | Same conditions: wake → pee → naked → before water/food. Log it. **Don't react to it.** |\n| **Weekly** | Trend weight | Average the 7 daily weights. Compare *this week's average* to *last week's average*. This is your real scale weight — the only one you act on. |\n| **Monthly** | Tape + photos | Waist (navel), hips (widest), thigh (mid). Same time of day, same tape tension. 3 photos: front / side / back, same lighting, spot, clothing. |\n| **Monthly** | \"How clothes fit\" | The honest mirror for *toned*. Jeans looser at the waist, arms/shoulders more defined = recomp working even if the scale is quiet. This catches what the scale hides. |\n| **Cycle-aware** | Note menstrual phase | Expect +1–3 lb water in the late-luteal / pre-menstrual window. Do **not** cut calories in response — it's water, it leaves on its own. |\n\n### The weekly decision tree — act only on the *trend*, one change at a time\n\nYou're cutting ~0.6–0.7 lb/week toward 125. Each week, compare this week's trend-weight average to last week's, and read the row:\n\n| This week's trend vs last | Energy (avg) | Diagnosis | Action | Falsification check |\n|---|:--:|---|---|---|\n| **Down 0.5–0.8 lb** | 4–5 | **Working as designed** | Hold. Touch nothing. | n/a — this is the win |\n| **Down >1.2 lb/wk** (losing too fast) | any | Deficit too aggressive — muscle/tone at risk | **Add +150 kcal/day** (carbs + protein), recheck P ≥ 115 g | rate slows to ~0.6–0.7 lb/wk within 2 wk |\n| **Down >1.2 lb/wk** | 2–3 | Too aggressive *and* under-fueled | **Add +200 kcal/day**, audit sleep | energy → 4 within 1 wk; rate slows |\n| **Flat ≥2 wk** (stalled before 125) | 4–5 | True stall; TDEE drifted or portions crept up | **Cut −100 to −150 kcal/day** (pull from carbs/fat, **keep P 115**) | weight resumes −0.5 lb/wk within 2 wk |\n| **Flat ≥2 wk** | 2–3 | Under-recovered, NEAT suppressed — *not* a food problem | **Hold calories**, fix sleep + add an easy walk day | energy → 4 within 1 wk before touching food |\n| **Up ≥2 wk** | any | Likely cycle water *or* portion creep | Re-check logging accuracy; if real, trim −100 | tape/clothes confirm; reassess in 2 wk |\n| **Hit 125 lb (trend)** | any | **Goal reached → STOP cutting** | Switch to **Phase 2 reverse** (§7): raise +75–100 kcal/wk toward ~1850–1900 maintenance | weight holds ±1 lb while calories climb — that's a successful reverse |\n\n**Hard rules:**\n\n- Never adjust on a single weigh-in or a single week. **Two weeks of trend, minimum.**\n- Never cut calories when energy is 2–3 — that's a recovery problem wearing a diet-problem costume. Fix sleep first; food is the *last* lever, not the first.\n- **Floor is ~1400 kcal and 45 g fat** in any phase. Below that you lose energy, mood, cycle regularity, and tone — not fat.\n- Adjustments come from **carbs and fat, never protein.** Protein (115 g) is load-bearing for the toned look — it's the last thing to touch.\n- **When you hit 125, the job changes from *lose* to *hold*.** Don't keep cutting \"just a little more.\" The win is reaching 125 *and staying there for years* — that's Phases 2–4.\n\n---\n\n## 3. Protein Swap Table (boredom insurance)\n\n**One \"protein block\" ≈ 25–30 g protein.** Sub any source for any other at roughly equal grams — portions below are tuned to land in that band. Iron-rich (🩸), calcium (🦴), and omega-3 (🐟) flagged because those are your priority female micros.\n\n| Protein source | Portion for ~25–30 g | kcal | Fiber bonus | Notes / flags |\n|---|---|--:|--:|---|\n| Rotisserie / poached chicken breast | 4 oz (115 g) | 165 | 0 | The anchor — *Big-Batch Poached Chicken*, zero-effort base |\n| Canned tuna (in water) | 1 can (5 oz drained) | 120 | 0 | 🐟🩸 pantry hero, zero prep |\n| Canned / pouch salmon | 4 oz | 175 | 0 | 🐟🩸 omega-3 king, no-cook |\n| Cooked salmon fillet | 4 oz | 230 | 0 | 🐟 *Sheet-Pan Miso Salmon* |\n| Shrimp (cooked) | 5 oz | 140 | 0 | 🩸 fast-thaw — *Sheet-Pan Shrimp Fajitas* |\n| 93% lean ground turkey | 4 oz cooked | 200 | 0 | 🩸 *Turkey Bolognese*, freezer-friendly |\n| 93% lean ground beef | 4 oz cooked | 215 | 0 | 🩸 highest iron — *Korean Gochujang Beef* |\n| Chicken sausage (lean) | 2 links | 200 | 0 | *Tuscan Skillet* — pre-cooked, just heat |\n| Nonfat Greek yogurt | 1 cup (225 g) | 130 | 0 | 🦴 base for bowls / bark |\n| Low-fat cottage cheese | ¾ cup (170 g) | 130 | 0 | 🦴 *Cottage Cheese Fluff*, sweet or savory |\n| Egg + egg whites | 2 whole + 4 whites | 200 | 0 | 🩸 *Frittata Cups*, *Jammy Eggs* |\n| Tofu (extra-firm) | 7 oz (200 g) | 180 | 2 | 🩸🦴 plant anchor — *Baked Tofu* |\n| Tempeh | 4 oz | 220 | 7 | 🩸 +fiber, nuttier than tofu |\n| Edamame (shelled) | 1.5 cups | 280 | 12 | 🩸 protein **+** big fiber double-dip |\n| Lentils (cooked) | 1.5 cups | 345 | 23 | 🩸 protein **+** huge fiber — *Spiced Lentils* |\n| Chickpeas (canned) | 1.5 cups | 405 | 18 | 🩸 protein **+** fiber, but watch kcal on a cut |\n| Whey / casein protein powder | 1 scoop | 120 | 0–1 | fastest 25 g on earth — *Casein Pudding* |\n| Smoked salmon (lox) | 3.5 oz | 180 | 0 | 🐟🩸 no-cook — *TJ's Salmon & Egg Plate* |\n| Seaweed-wrapped tuna | 1 can + nori | 150 | 4 | 🐟 *Tuna-Avocado Seaweed Wraps* |\n| Turkey jerky | 2.5 oz | 200 | 0 | 🩸 travel / desk — *Jerky Snack Board* |\n| Deli turkey (low-sodium) | 5 oz | 150 | 0 | no-cook board filler |\n\n**Swap rules:** match the **grams**, accept ±30 kcal drift. If you swap a *lean* source (chicken, tuna, whey) for a *legume* source (lentils, chickpeas, edamame) you gain ~10–20 g fiber and ~150 kcal — on a cut day, drop a carb side to rebalance. Going the other way (legume → lean meat), add a fiber block from §4.\n\n---\n\n## 4. Fiber Swap Table (hit 30 g without thinking)\n\n**One \"fiber block\" ≈ 5–6 g fiber.** Stack 5–6 blocks across the day = 30 g. Most also carry iron 🩸 or omega-3 🐟. **Ramp gradually in weeks 1–2** — jumping straight to 30 g from a low baseline = GI misery. Add one block/week and drink water.\n\n| Fiber source | Portion for ~5–6 g fiber | kcal | Protein bonus | Notes / flags |\n|---|---|--:|--:|---|\n| Chia seeds | 1.5 tbsp | 100 | 3 | 🐟 gels overnight — *Chia Pudding*, *Oats Base* |\n| Ground flaxseed | 2 tbsp | 75 | 3 | 🐟 stir into oats / yogurt invisibly |\n| Raspberries | 1 cup | 65 | 1.5 | highest-fiber berry — smoothie / bark |\n| Blackberries | 1 cup | 60 | 2 | swap for raspberries, same role |\n| Avocado | ½ medium | 160 | 2 | 🥑 healthy fat — *Cottage-Avocado Mash* |\n| Black beans | ½ cup | 110 | 7.5 | 🩸 protein+fiber — *Black Bean Quinoa Jar* |\n| Chickpeas | ½ cup | 135 | 6 | 🩸 *roasted* as a crunchy snack |\n| Lentils | ½ cup | 115 | 8 | 🩸 cheapest protein+fiber combo |\n| Edamame (shelled) | ¾ cup | 140 | 11 | 🩸 protein+fiber double-dip |\n| Green peas | ¾ cup | 90 | 6 | freezer bag → microwave |\n| Broccoli (cooked) | 1.5 cups | 75 | 5 | 🩸 *Sheet-Pan Veg Medley* |\n| Brussels sprouts | 1 cup | 55 | 4 | roast in the medley pan |\n| Artichoke hearts | 1 cup | 90 | 2 | canned, tosses into any bowl |\n| Sweet potato | 1 medium | 110 | 4 | great around a Pilates day |\n| Quinoa (cooked) | 1 cup | 220 | 8 | *Triple-Grain Base* |\n| Farro (cooked) | ¾ cup | 175 | 6 | chewy texture change-up |\n| Oats (dry rolled) | ½ cup | 150 | 5.5 | *Overnight Oats* backbone |\n| Whole-grain / chickpea pasta | 2 oz dry | 190 | 16 | 🩸 chickpea pasta = protein+fiber bomb |\n| Bagged kale / cabbage slaw | 3 cups raw | 75 | 4 | 🩸 no-chop salad base |\n| Berries + leafy greens (smoothie) | 1 cup + 2 cups | 70 | 2 | 🩸 hides greens — *Smoothie Bowl* |\n| Chili-lime roasted chickpeas | 1 serving | 156 | 8 | 🩸 *crunchy snack*, protein bonus |\n| Hummus | ⅓ cup | 140 | 3 | 🩸 *Hummus + Crudité Duo* |\n| Whole-wheat pita | 1 large | 170 | 5 | *Falafel Pita Wrap* |\n| Pear or apple (with skin) | 1 medium | 95 | 1 | grab-and-go, leave the skin on |\n\n**Fiber rules:** Beans / lentils / edamame / chickpea-pasta do **double duty** (protein **and** fiber) — lean on them when both columns are short. Berries + chia/flax fix any breakfast in seconds. Hit ≥14 g per 1000 kcal as the floor; on a 1550-cut-day that's ~22 g minimum, 30 g target. **Hydration is part of fiber** — fiber without water constipates. Pair every fiber jump with extra fluid and a pinch of electrolytes (~2.2 L/day baseline).\n\n---\n\n## 5. Cuisine-Rotation Wheel (no week feels the same)\n\nBoredom is your #1 adherence killer, so variety is *engineered*, not hoped for. **Rule: no cuisine repeats within a 3-day window, and no meal name repeats within 5 days.** Spin the wheel — assign each day a cuisine \"lane,\" then pull that lane's meals from the library. (Mains below are the **lighter, cut-friendly picks**; scale to 0.8–0.9× if a dinner runs heavy.)\n\n### The 7-lane weekly wheel (rotate the *start day* each week so the pattern never locks)\n\n| Day | Cuisine lane | Breakfast | Lunch | Dinner (cut-friendly) |\n|---|---|---|---|---|\n| 1 | **Japanese / Pan-Asian** | *Savory Miso-Parmesan Protein Oats* | *Japanese Salmon Poke-Style Bowl* (0.8×) | *Sheet-Pan Miso-Glazed Salmon* (0.8×) |\n| 2 | **Cal-Mex** | *Freezer Breakfast Burritos* | *Cal-Mex Rotisserie Chicken Burrito Bowl* (0.8×) | *Sheet-Pan Shrimp Fajitas with Avocado* |\n| 3 | **Mediterranean / Greek** | *Mediterranean Muffin-Tin Frittata Cups* | *Greek Mason-Jar Chickpea & Feta Salad* (0.8×) | *Pesto Chicken Chickpea-Pasta Skillet* |\n| 4 | **Thai / SE-Asian** | *Triple-Berry Protein Smoothie Bowl* | *Thai Larb-Style Chicken Lettuce & Rice Bowl* | *Thai Green Curry Tofu & Chickpeas* |\n| 5 | **California fresh** | *Savory Cottage Cheese Avocado Bowl* | *Californian Green Goddess Salmon Grain Bowl* (0.8×) | *Baked Cod Puttanesca with White Beans* |\n| 6 | **Italian / Korean** | *PB-Banana Protein Waffles* | *Korean Beef & Broccoli Brown Rice Power Bowl* | *Chickpea Pasta Turkey Bolognese* |\n| 7 | **Moroccan / Indian** | *Mediterranean Microwave Egg & Chickpea Bowl* | *Mediterranean Chicken Shawarma Quinoa Bowl* (0.8×) | *Instant-Pot Red Lentil & Rotisserie Chicken Dal* |\n\n### How to spin it so it self-shuffles\n\n- **Rotate the anchor.** Week 1 starts on Lane 1 (Japanese). Week 2 starts on Lane 4 (Thai). Week 3 starts on Lane 6. You walk the same wheel from a different clock position, so the *sequence* you experience never repeats even though the lanes are fixed.\n- **Swap within a lane, not across.** Bored of the Mediterranean dinner? Stay in-lane: sub *Mediterranean Chicken & Chickpea Sheet-Pan*, *Pesto Chicken Chickpea-Pasta Skillet*, or *Chicken Sausage & White Bean Tuscan Skillet*. Each lane has 3–4 options per meal, so a lane runs ~3 weeks before repeating.\n- **Texture rotation inside the wheel:** alternate format too — bowl → wrap → salad → skillet → board. Same cuisine, different mouthfeel beats menu fatigue.\n- **Snacks ride a parallel wheel:** smoothie (*Green Goddess Avocado-Mango*) → savory (*Cottage Cheese Toast*) → crunchy (*Chili-Lime Roasted Chickpeas*) → seafood (*Tuna-Avocado Seaweed Wraps*) → sweet-protein (*Mango-Raspberry Yogurt Bark*). Don't repeat a snack *category* two days running.\n- **Cheat code for a lazy week:** pick ONE lane for the whole week's *dinner* (batch one anchor dinner ×5 — *Turkey Chili* or *Red Lentil & Chicken Dal* both reheat perfectly) but keep breakfast + lunch on the full wheel. Variety where you taste it most, autopilot where you don't.\n\n---\n\n## 6. Eating-Out / Travel Cheats (already in the no-cook library)\n\nThese are pre-solved order-builds from the no-cook section — order verbatim and the macros land. All hit 40–55 g protein and 8–15 g fiber. On a cut day, the calorie-trim moves are baked into each build (skip rice, dressing on the side, etc.).\n\n### Restaurant order-builds\n\n| Spot | Order build (say it exactly) | kcal | P | Fiber | Macro logic |\n|---|---|--:|--:|--:|---|\n| **Chipotle** | *Double-Chicken Salad Bowl*: salad greens → **double chicken** → black beans → fajita veg → fresh + green tomatillo salsa → **skip rice, skip sour cream/cheese** (or light cheese). Guac only if cals allow. | 615 | 54 | 15 | Double protein replaces rice calories; beans + veg + salsa carry fiber. On a 1550 day, skip guac to keep it ~500. |\n| **Sweetgreen** | *Lean Protein Plate*: greens base → blackened/roasted chicken (or salmon) → chickpeas → roasted veg → spicy broccoli → **dressing on the side, ½ portion** | 560 | 42 | 13 | Side-dressing controls the hidden 200+ fat-kcal; chickpeas + broccoli = fiber |\n| **CAVA** | *Greens + Grains, Double Protein*: half greens / half grain → **double grilled chicken or harissa salmon** → lentils → hummus → tomato + cuke → **drizzle (not pour)** tahini / tzatziki | 585 | 45 | 14 | Lentils + hummus stack fiber; double protein hits the 30–35 g/meal rule |\n| **Costco (assembly)** | *Street-Corn Chicken & Cottage Cheese Plate*: rotisserie chicken + cottage cheese + street-corn / slaw | 500 | 48 | 8 | Pure protein play; add an apple or chickpeas for the fiber gap |\n| **Trader Joe's (assembly)** | *Smoked Salmon & Egg Protein Plate* | 460 | 39 | 9 | 🐟 omega-3 + no-cook; hard-boiled eggs are pre-made in the cooler |\n| **Mendocino Farms** | *'Not-So-Fried Chicken Salad'* | 575 | 41 | 11 | Dressing on the side trims it to ~470 for a cut day |\n\n### Airport / travel\n\n| Situation | Build | kcal | P | Fiber | Source |\n|---|---|--:|--:|--:|---|\n| **Airport / Hudson News + Starbucks** | *Travel High-Protein Combo*: Starbucks egg bites or protein box + jerky / nut pack + a piece of fruit + bottled water | 520 | 42 | 9 | *Airport / Travel High-Protein Combo* |\n| **Frozen-meal night (TJ's / Costco bowl)** | *Protein Bump*: any frozen bowl + 4 oz rotisserie chicken or ½ cup edamame + a side of frozen veg | 540 | 40 | 12 | *Frozen-Meal Protein Bump* — fixes the protein gap every frozen meal has |\n| **Bagged-salad shortcut** | *Double-Protein Chicken & Chickpea Caesar* (Caesar kit + chicken + chickpeas) | 525 | 44 | 10 | *Bagged Caesar Kit Upgrade* |\n| **No-fridge girl-dinner** | *High-Protein Mediterranean Girl-Dinner Board* | 545 | 41 | 11 | Hummus, olives, feta, deli turkey, crudité — pure assembly |\n\n### Universal eating-out rules (when nothing above fits)\n\n1. **Anchor protein first:** order the leanest 4–6 oz protein on the menu (grilled chicken / fish / shrimp), then build around it. Double it if portions look small.\n2. **Carbs on the side, sauces on the side.** Restaurant calories hide in the dressing, the oil, the rice. Side-dressing alone saves 150–250 kcal — the difference between a cut meal and a maintenance meal.\n3. **Find the fiber:** beans, lentils, side salad, extra veg, or a fruit. If the plate has none, add a §4 block when you get home.\n4. **Travel pantry kit** (zero-prep, throw in a bag): protein powder single-serves, jerky, roasted chickpeas, tuna / salmon pouches, nut packs. Turns any gas station or hotel room into a 30 g protein occasion.\n5. **One restaurant meal disappears in the weekly average** (§1) — don't \"fix\" it, don't skip the next meal to compensate. Log it and move on.\n\n---\n\n## 7. Auto-Pilot: the 6-month arc by phase\n\nThe targets above are **Phase 1 (the cut)**. As you progress, the *averages shift but the systems don't* — same tracker, same swap tables, same wheel. Only the numbers move. The whole point: lose 5 lb, *find* maintenance without rebounding, then make it your default forever.\n\n| Phase | Weeks | Avg kcal | Protein | Fiber | What changes in *practice* |\n|---|---|--:|--:|--:|---|\n| **1 — Reset & Gentle Cut** | 1–8 | **~1550** | 115 g | 30 (ramp up) | Lose ~5 lb to reach 125. Build the protein + fiber + prep habit. Gut adapts to fiber in wk 1–2. |\n| **2 — Reach & Reverse** | 9–13 | **1550 → ~1850** | 115 g | 30 | **Hit 125 → stop cutting.** Add +75–100 kcal/week (carbs + a 2nd snack) to find maintenance *without rebound*. Weight should hold ±1 lb as calories climb. |\n| **3 — Tone & Maintain** | 14–20 | **~1900** | 115 g | 30 | Full (1.0×) portions return. Protein-forward recomp at stable weight — toning via Pilates progression + daily walks. Scale flat, clothes keep improving. |\n| **4 — Lifestyle Lock-In** | 21–26 | **~1900** | 105–115 g | 28–30 | Flexible **80/20**: structured meals weekdays, freedom on weekends. *\"This is just how I eat now.\"* Sustainable for life. |\n\n**The reverse-diet move (Phase 2 — the part most people skip and then rebound):** after weeks of eating 1550, your maintenance is now *lower* than the original 1925 (metabolism adapts down a bit). Don't jump straight to 1900 — **add calories gradually**, ~75–100 kcal/week, watching the trend weight. If the scale holds, add more next week. If it climbs >1 lb/wk for 2 weeks, hold. You're walking the calories *up* until weight is stable at 125 — that stable number *is* your real maintenance. This is how a cut becomes permanent instead of a yo-yo.\n\n### Standing supplement / micro reminders (every phase)\n\n- **Creatine 3–5 g/day (optional)** — flat dose, any time, every day. Supports strength and the toned look even with low-intensity Pilates. No loading phase needed.\n- **Iron + vitamin C pairing 🩸** — eat iron sources (beef, lentils, tofu, dark-meat chicken, spinach) *with* citrus / bell pepper / tomato / strawberries. Menstruating women are a top iron-deficiency group. Get ferritin checked if energy stays at 2–3 despite good food + sleep.\n- **Calcium + vitamin D 🦴** — Greek yogurt, cottage cheese, tofu, sardines; a D3 supplement if you're not getting midday sun.\n- **Omega-3 🐟** — 2–3 fatty-fish meals/week (salmon, tuna, sardines) or a fish-oil / algae supplement.\n- **Magnesium** — leafy greens, pumpkin seeds, dark chocolate; supports sleep + recovery (the thing that fixes energy-2–3 days).\n- **Hydration + electrolytes** — ~2.2 L/day baseline; high fiber demands it. A pinch of sodium/potassium/magnesium on long-walk days. Thirst lags need — drink on schedule, not on thirst.\n\n---\n\n*Re-derive the macro frame only if bodyweight moves >±3 lb from the 59 kg anchor. Once you reach 125 and lock in maintenance (Phase 3–4), the goal is never \"lose more\" — it's \"stay here, keep eating like this, keep looking toned.\" That's the whole game.*\n"}, "fueling": {"title": "Fueling & Troubleshooting", "md": "# Everyday Fueling & Troubleshooting\n\n> **Where this fits:** This is the *\"what do I eat around Pilates and walks, and what do I do when something feels off\"* file. Your daily macros and the 6-month arc live in `01-foundation`; your rotations live in `02-recipes` / `03-meal-plans`. This file tells you how to *time* food around light activity and how to read your own warning lights — without ever turning a 5-lb cut into a crash diet.\n>\n> **Tone check:** You are **lightly active** — daily walks (NEAT) + Pilates 2×/week. That's low-intensity core/resistance work, not training camp. So there is **no carb-loading, no two-a-days, no \"fuel the session\" drama** here. Pilates barely moves the needle on calories; the eating around it is *small and optional*. Most of staying toned is simply: hit protein, hit fiber, stay in a gentle deficit, repeat.\n\n---\n\n## 0. Operating assumptions (everything scales to these)\n\n| Variable | Value | Note |\n|---|---|---|\n| Height / weight | 5'7\" (170 cm) / **130 lb (59 kg)** → goal **125 lb** | Restate if you re-weigh; all g/kg numbers rescale. |\n| BMR (Mifflin–St Jeor, female) | **1377 kcal** | `10·59 + 6.25·170 − 5·23 − 161 = 1376.5` |\n| Maintenance TDEE (lightly active, AF 1.4) | **~1925 kcal** (range ~1850 low-NEAT → ~2050 big-walk + Pilates day) | `1377 × 1.4 ≈ 1925` |\n| **Cut intake** (reach 125) | **~1550 kcal/day** | −350 deficit → ~0.6 lb/wk → 125 in ~7–8 wks |\n| **Hard floor** | **never below ~1400 kcal** | Energy availability / 23-yo female health. Non-negotiable. |\n| Protein | **~115 g/day** (1.9–2.0 g/kg); ~25–35 g/main + ~15–20 g/snack | The toning lever — hold it high *even on cut days.* |\n| Fiber | **28–32 g/day** (≥14 g per 1000 kcal); ~8–10 g/main, 3–6 g/snack | Ramp **gradually** in wk 1–2 (see §4.4). |\n| Fat | **~47–59 g/day**; floor **~45 g** | Hormonal health floor. Carbs fill the rest. |\n| Carbs | Cut **~120–160 g**; maintenance **~170–210 g** | Light activity → **no carb periodization needed.** |\n\n**The one rule that beats every other rule:** *consistency over the week beats perfection on any day.* A 5-lb cut is won with protein + fiber + a gentle deficit you can actually keep, not with willpower stunts. The scale moves slowly on purpose — that's how the loss comes off as fat, not the muscle that creates the toned look.\n\n> **No periodization dial.** Unlike a heavy-training plan, your carbs **do not** need to swing with activity. Eat roughly the same every day. The *only* optional tweak is a slightly bigger protein+carb portion on your 2 Pilates days — and even that is comfort, not necessity (see §1).\n\n---\n\n## 1. Fueling around light activity (Pilates + walks)\n\nHonest framing first: **a 50-minute Pilates class burns very little** — on the order of ~150–250 kcal for a 59 kg woman, and a brisk walk maybe ~250–350 kcal/hour. You **do not** need to \"fuel\" these the way an athlete fuels a session. The eating below is about *feeling good and recovering well*, not about replacing big glycogen burns (there aren't any).\n\n### 1.1 The whole protocol in one table\n\n| Activity | Before | After | Truth |\n|---|---|---|---|\n| **Pilates** (2×/wk) | *Only if hungry:* a small protein+carb 60–90 min before. If you ate a normal meal in the last ~2–3 h, **eat nothing extra.** | Get **25–35 g protein within ~2 hours** — this is usually just your next normal meal. No special \"recovery\" shake needed. | It's low-intensity. Don't overthink it. |\n| **Walks** (daily NEAT) | **Nothing special.** Walk whenever. | Nothing special. | Walks are NEAT, not a workout. Fueling them would just add calories back. |\n\n### 1.2 Pilates — the optional pre-class bite (only if hungry)\n\nIf you're genuinely hungry walking into class, a *small* protein+carb snack 60–90 min before settles the stomach and keeps energy steady. Keep it light and lowish-fiber so nothing sloshes during planks and roll-ups. Pick **one**, and treat it as part of your day's calories (not on top):\n\n| Lazy pre-Pilates bite | kcal | P | Fib | Why it works |\n|---|---|---|---|---|\n| ½ *Triple-Berry Protein Smoothie Bowl* | ~250 | P25 | 8 | Easy carbs + protein, light on the gut |\n| *Mango-Raspberry Greek Yogurt Bark* (freezer) | 251 | **P30** | 4 | Grab-and-go, low fiber |\n| Banana + ½ scoop whey shaken in water | ~190 | ~P18 | 3 | The classic; near-zero effort |\n| *Banana-Walnut Protein Overnight Oats Jar* (½) | ~185 | ~P16 | 4 | Made the night before = zero AM effort |\n\n> If you trained on a full stomach last time and felt fine, you don't even need this. Hunger is the only trigger.\n\n### 1.3 Pilates — the after (just eat your next meal)\n\nThe \"recovery window\" for light resistance work is **hours wide, not minutes.** You do **not** need to sprint to a shake. Simply make sure your **next normal meal lands within ~2 hours and carries 25–35 g protein** — which every lunch and dinner in your library already does.\n\n| If Pilates is at… | Your \"recovery\" is just… | Library pick (already 30 g+ protein) |\n|---|---|---|\n| Late morning | Lunch | *Cal-Mex Rotisserie Chicken Burrito Bowl* (P46), *Mediterranean Chicken Shawarma Quinoa Bowl* (P48) |\n| Afternoon | An afternoon snack *or* dinner | *Tuna-Avocado Seaweed Crunch Wraps* (P29), *Cottage Cheese Cookie-Dough Fluff* (P40) |\n| Evening | Dinner | *Cashew Chicken Stir-Fry* (P51), *Baked Cod Puttanesca* (P48), *Salsa Verde Chicken Tacos* (P50) |\n\n### 1.4 Morning Pilates vs evening Pilates\n\n| | **Morning Pilates** | **Evening Pilates** |\n|---|---|---|\n| Before | Either eat a light bite (§1.2) **or** go fasted-light — both are fine for low-intensity work. Don't force food at 6 AM if you're not hungry. | You've eaten all day; no special pre-bite needed. If your last meal was >3 h ago and you're hungry, have a small snack ~60 min prior. |\n| After | **Breakfast is your recovery** — make it protein-forward. *Banana Protein Pancakes* (P55), *Mediterranean Muffin-Tin Frittata Cups* (P41), *Savory Miso-Parmesan Protein Oats* (P38). | **Dinner is your recovery.** Keep protein 25–35 g. If you're prone to evening bloat, pick a lower-fiber dinner: *Korean Gochujang Beef & Edamame Bowl* (Fib9), *Cashew Chicken Stir-Fry* (Fib8). |\n| Note | Set up *overnight oats / chia pudding* the night before so breakfast is **zero** morning effort. | A casein-y snack (*Chocolate-Espresso Casein Protein Pudding*, P43) is a nice optional bedtime protein if dinner was early — not required. |\n\n### 1.5 Fasted walks — totally fine\n\n**A morning walk on an empty stomach is completely OK** and changes nothing about fat loss over a week (a deficit is a deficit; *when* you eat doesn't beat *how much*). Walk fasted if you like it; eat first if you prefer. Either way:\n\n- Black coffee + water beforehand is fine.\n- A long, hot walk (>60–75 min) → just bring water; add an electrolyte pinch if you're sweating a lot.\n- **Don't** treat a walk as a reason to eat extra \"recovery\" food — that quietly erases the deficit. Walks are background movement, not a workout to refuel.\n\n> **The only optional \"Pilates-day\" tweak:** if you *like* a little more energy on your 2 class days, nudge that day's carbs + protein up ~100–150 kcal (e.g. full 1.0× dinner instead of a scaled one). Keep it simple — this is preference, not physiology.\n\n---\n\n## 2. Hydration & electrolytes (kept simple)\n\nBaseline need ≈ **2.2 L/day** (≈ 35 mL/kg). You're not a heavy sweater on this program, so this is genuinely easy.\n\n| When | Do this |\n|---|---|\n| On waking | A big glass (400–500 mL). Add a squeeze of citrus — you like it, and it counts toward fluid. |\n| Across the day | Sip to ~2.2 L. A 1 L bottle filled ~2× is the whole game. |\n| Pilates / walk | Water to taste. For anything >60 min or a hot CA day, **one electrolyte tab** in the bottle — that's it. |\n\n**Electrolytes, the lazy version:** your food already covers most of this — miso, furikake, soy in your Japanese meals (sodium); banana, avocado, beans, citrus (potassium); edamame, oats, pumpkin seeds (magnesium); dairy/cottage cheese/tofu (calcium). Add **one electrolyte tab/packet** only on a long hot walk or if you get a calf cramp. Don't overthink it.\n\n**Read-outs (no lab needed):**\n- **Urine:** pale straw = good; apple-juice dark = drink up (first-morning pee is naturally darker — judge mid-day).\n- **Cramps / headache / dizzy on standing** = fluid and/or sodium, not \"push through.\"\n\n---\n\n## 3. Micros & supplements — quick hits\n\n| Item | Dose | Why / note |\n|---|---|---|\n| **Creatine monohydrate** | **3–5 g/day, every day** (timing irrelevant) | Yes, even with *Pilates only.* It supports strength, lean mass, and the toned look you're after — one of the most evidence-backed, safe supplements there is. Take it on non-Pilates days too. |\n| **Vitamin D3** | 1000–2000 IU (test 25-OH-D, target ~40–60 ng/mL) | Bone + immune + muscle. Easy to be low even in California if you're mostly indoors. |\n| **Omega-3 (EPA/DHA)** | ~1–1.5 g/day **if** you're not eating fatty fish ~2–3×/wk | Your salmon/tuna meals (*Miso Salmon*, *Furikake Salmon*, *Poke Bowl*, *Spicy Tuna* snacks) cover a lot — supplement only the gap. |\n| **Iron** | **Test, don't blind-dose.** | Young women are the top risk group, but **too much iron is harmful** — get ferritin + Hb checked first. If labs say low, treat under an MD. **Pair iron-rich meals with vitamin C** (citrus + *Cal-Mex Migas*, *Lentil Tabbouleh*, *Tofu Scramble*) and keep coffee/tea ~1 h away from iron meals. |\n| **Magnesium** (optional) | 200–320 mg/day (food first; glycinate PM if cramping/poor sleep) | Helps sleep + cramps. Edamame, oats, pumpkin seeds, dark chocolate get you most of the way. |\n| **Calcium** | ~1000 mg/day (food first) | Dairy, cottage cheese, yogurt, calcium-set tofu, sardines. Female-health priority. |\n\n> **The only true daily \"must\":** creatine (if you want the tone benefit) + vitamin D. Everything else is *food-first, test-don't-guess.*\n\n---\n\n## 4. Troubleshooting playbook (symptom → cause → fix)\n\n> Read each row as: **see this → most-likely cause → do this first → falsification check.** Change **one variable at a time** and give it ~10–14 days before judging.\n\n### 4.1 Scale stalled before 125 (>2–3 weeks, no downward trend)\n\n| Likely cause | Fix | One-change check |\n|---|---|---|\n| Not actually in a deficit (weekend creep, liquid cals, \"bites,\" generous dressings/nut butters) | Log 4–5 honest days incl. **one weekend**; recount. The leak is usually Sat–Sun (§4.6) or untracked oils/sauces. | Logged avg lands within ±100 of 1550 |\n| Water masking real loss (new fiber, salt, cycle) | Switch to a **10-day rolling average** of morning weight, not daily. Track waist + photos + how clothes fit. | Trend over 2 wks, not 2 days |\n| TDEE drifted as you got lighter | Recompute at current weight; trim ~75–100 kcal **from carbs only**, never protein. Don't go below the ~1400 floor. | New ~−300 deficit confirmed over 2 wks |\n| Under-eating → moving less all day (NEAT quietly dropped) | This is a *fuel* problem, not a diet problem. Eat *back up* to ~1700–1800 for 3–5 days, then resume a gentle cut. | Daily steps/energy recover |\n\n**Hard guardrail:** do **not** answer a stall by dropping below **~1400 kcal**, below **~45 g fat**, or below **~110 g protein.** A 5-lb cut is won by patience, not by starving — and under-eating stalls fat loss anyway via lower NEAT and metabolic adaptation.\n\n### 4.2 Always hungry\n\n| Likely cause | Fix | One-change check |\n|---|---|---|\n| Protein too low or bunched into one meal | Hit **25–35 g at every main**; front-load breakfast (*Banana Protein Pancakes* P55, *Triple-Berry Smoothie Bowl* P49). | ≥110 g/day across ≥4 eating occasions |\n| Fiber/volume too low for the calories | Lean on high-fiber, high-volume picks: *Thai Peanut Chicken Edamame-Pasta* (Fib20), *Falafel & Edamame Pita* (Fib21), *Cal-Mex Black Bean & Corn Quinoa* (Fib16). Bulk meals with *Sheet-Pan Roasted Veg Medley* (Fib7, 120 kcal). | Fiber ~28–32 g; meals feel physically full |\n| Cutting a touch too hard | Eat at maintenance (~1900) for 3–5 days, then resume a *gentler* deficit. The cut isn't a race. | Hunger normalizes |\n| Thirst disguised as hunger | 400 mL water + wait 15 min before snacking. | — |\n| Short sleep (ghrelin up, leptin down) | Fix sleep (§4.5) — one bad night spikes next-day appetite. | — |\n\n**Lazy high-satiety snacks (protein + fiber, low cal):** *Hummus + Crudité w/ Cottage-Cheese Dip Duo* (P24 Fib12, 325), *Edamame-Popcorn Movie Mix* (P18 Fib8, 229), *Chili-Lime Roasted Chickpeas* (P8 Fib6, 156), *Chocolate-Espresso Casein Pudding* (P43, 324).\n\n### 4.3 Low energy / sluggish\n\n| Likely cause | Fix | One-change check |\n|---|---|---|\n| Eating too little overall | The most common cause on a cut. Bump to maintenance for a few days; make sure you're hitting ~1500+ on cut days, never under 1400. | Energy returns within days |\n| Carbs too low | Light activity still needs *some* carbs for brain + mood. Make sure you're at ~120–160 g on cut days; add a carb-y breakfast (*Greek Yogurt Power Bowl* C56). | Afternoon slump lifts |\n| Low ferritin / iron (top suspect for young women) | **Get labs** (ferritin, Hb). If low, treat under MD + vit-C pairing. Don't blind-dose. | Labs + energy |\n| Dehydration / low sodium | §2 — even mild dehydration drags energy. | Urine pale, headaches gone |\n| Poor sleep upstream | §4.5 — fatigue is often a sleep problem wearing a \"food\" mask. | Sleep improves |\n\n### 4.4 GI distress from the fiber ramp\n\nYou're climbing toward 28–32 g fiber. Going there too fast = gas, bloating, cramps.\n\n| Likely cause | Fix | One-change check |\n|---|---|---|\n| Ramped fiber too fast | **+3–5 g/week only.** Don't jump 18 → 32 in one week — let weeks 1–2 climb gradually. | Symptoms settle as the gut adapts |\n| Big bolus of beans/cruciferous at once | Spread fiber across the day (~8–10 g/meal). **Rinse canned beans well.** | Bloat tracks meal size |\n| Lots of fiber right before Pilates | Save the Fib16–21 meals (*Falafel Pita*, *Thai Peanut Edamame-Pasta*, *Cal-Mex Tofu Scramble*) for non-class windows; eat lighter-fiber before class. | No mid-class gut issues |\n| Not enough water with the fiber | Fiber needs fluid or it backs up — match §2 intake. | Comfortable, regular BMs |\n| A specific trigger (sugar alcohols, raw cruciferous) | Suspect protein bars w/ sugar alcohols or big raw-veg loads; isolate and swap one out. | Symptom tracks the trigger |\n\n### 4.5 Poor sleep\n\n| Likely cause | Fix | One-change check |\n|---|---|---|\n| Going to bed under-eaten / hungry | A small protein+carb bedtime snack can *help* (*Casein Pudding* P43, overnight oats). Don't go to bed hungry on a cut. | Fewer wake-ups |\n| Late caffeine | Cut caffeine after ~2 PM (half-life ~5–6 h). | Sleep latency drops |\n| Evening Pilates too close to bed + wired | Wind-down routine; magnesium glycinate ~200 mg PM; cool, dark room. | Easier to fall asleep |\n| Alcohol | Even 1–2 drinks fragment deep sleep. Cluster it socially, not nightly. | Deep sleep returns |\n| Low magnesium | 200–320 mg/day (food + glycinate). | Cramps/sleep improve |\n\n### 4.6 Weekend overeating\n\n| Likely cause | Fix | One-change check |\n|---|---|---|\n| Weekday deficit too aggressive → weekend rebound | Loosen weekdays slightly; a sustainable −350 beats a brutal cut you blow up on Saturday. | Weekend swing shrinks |\n| No plan Fri–Sun | Pre-decide *one* anchor meal/day; keep no-cook restaurant builds ready: *Chipotle Double-Chicken Salad Bowl* (P54), *CAVA Double-Protein* (P45), *Sweetgreen Lean Protein Plate* (P42). | Restaurant meals stay on-macro |\n| Alcohol → disinhibition + empty cals | Set a drink cap *before* going out; eat a protein-forward meal first. | Fewer \"extra\" bites |\n| All-or-nothing mindset | A big weekend day isn't a \"cheat\" — bank it into the **weekly average.** | Weekly avg near target |\n\n**Math that calms the panic:** weekly budget at −350/day = `7 × 1550 ≈ 10,850 kcal`. One generous social day at **+600** still leaves the week averaging ~**−264/day** — you barely feel it, and you still lose. Consistency over the *week* is what moves body comp, not any single meal.\n\n### 4.7 Menstrual-cycle dips\n\nCycle phases shift hunger, water weight, and energy — plan *with* it, not against it.\n\n| Phase | What happens | Adjust |\n|---|---|---|\n| **Menstrual (d1–5)** | Iron loss; possible fatigue/low mood | Emphasize **iron + vit-C** meals (*Cal-Mex Migas*, *Mediterranean Frittata Cups*, *Lentil Tabbouleh*, *Tofu Scramble*) with citrus alongside. If energy's low, **don't force the deficit** — eat at maintenance. |\n| **Follicular (d~6–13)** | Often best energy/mood | Easiest week to hold the cut and feel great. Schedule a tougher Pilates class here if you progress it. |\n| **Ovulation (~d14)** | Peak energy | Roll with it. |\n| **Luteal (d~15–28)** | BMR up ~5–10% (≈ **+80–160 kcal**), more hunger, water retention, sometimes worse GI/sleep | **Eat a bit more** — luteal hunger is physiological, not weakness. Favor easier-digesting meals, more magnesium, and **expect a water-weight bump — do not read it as fat gain.** |\n\n> **Do not interpret luteal water weight or PMS bloat as a stall.** Compare **cycle-phase to cycle-phase** (this month's luteal vs last month's luteal), never week-to-week.\n\n### 4.8 \"Scale's up (or flat) but I look leaner\" — recomposition\n\nThis is **success, not a problem** — read it correctly so you don't panic-cut.\n\n| What's happening | Why | What to do |\n|---|---|---|\n| Weight flat/up but waist down, clothes looser, more defined | You're losing fat **and** holding/slightly building lean tissue from protein + Pilates. Muscle is denser than fat. | **Trust the tape measure and the mirror over the scale.** Keep protein ~115 g; keep Pilates progressing. |\n| Scale jumped 1–2 lb overnight | Water (sodium, carbs, cycle, a hard class) — not fat. Fat gain needs a real surplus over days. | Ignore the spike; watch the **10-day average.** |\n\n> **The metric that actually tracks \"toned\":** waist circumference + progress photos + how clothes fit — **not** bodyweight alone. A flat scale with a shrinking waist is exactly the outcome you want.\n\n---\n\n## 5. Don't-under-eat guardrail (energy availability)\n\nA 5-lb cut is small, so the deficit should be small. The single biggest mistake at your size is **eating too little** — it strips the muscle that creates the toned look, tanks energy and mood, and can disrupt your cycle. Under-eating also *stalls* fat loss (NEAT drops, adaptation kicks in), so it's self-defeating on every axis.\n\n**The floor, restated:** **never below ~1400 kcal/day**, never below **~45 g fat**, and hold **~110 g protein** even on the lowest days.\n\n### 5.1 Warning signs — if you see ≥2, eat more\n\n| System | Red flag |\n|---|---|\n| **Menstrual** | Cycle gets longer, lighter, irregular, or **stops** → *stop cutting now.* This is a hard endpoint, see a clinician. |\n| **Energy/mood** | Persistent fatigue, low mood, irritability, brain fog, no motivation |\n| **Body** | Always cold, getting sick often, hair thinning, low libido |\n| **Sleep/appetite** | Poor sleep + paradoxically *low* appetite, or relentless gnawing hunger |\n| **Performance** | Pilates feels harder than it should; weak, shaky, can't progress |\n\n### 5.2 The rule\n\n> **If energy, mood, sleep, or your cycle slips — you EAT MORE, you do not eat less.**\n> The instinct under a weight-loss goal is to tighten the screws. That instinct is wrong here. Bump to **maintenance (~1900 kcal)**, keep protein ~115 g, and hold there until you feel normal again. **If your cycle is disrupted, that overrides the scale entirely** — refeed to maintenance and see a physician/RD if it doesn't return. You have ~5 lb to lose; it is never worth your hormones, your sleep, or your health. This is a *lifestyle*, and there's no deadline.\n\n**Falsification you can hold yourself to:** *\"A good cut shows the waist shrinking while energy, sleep, and cycle stay normal. If any of those are off, it's not a successful cut — it's under-eating, and the fix is more food.\"*\n\n---\n\n## 6. Travel, social events & restaurants\n\nGoal: **stay roughly on track without being the weird one at dinner.** You have so little to lose that one imperfect day is noise — what matters is not letting a *trip* become a two-week derail.\n\n### 6.1 Restaurants — order on autopilot\n\n**The universal template:** **palm-sized (or double) lean protein + 2 fists of veg + 1 fist of carbs + a thumb of fat.** Sauce/dressing on the side. That single sentence handles almost any menu.\n\n| Cuisine you love | Order this way |\n|---|---|\n| **Cal-Mex** | Bowl, not the burrito tortilla; double protein, beans, fajita veg, salsa/pico, guac as your fat. Skip the chips or share one. |\n| **Mediterranean / Greek** | Grilled chicken/fish or falafel + a big Greek salad + a scoop of hummus; pita on the side, not bottomless. |\n| **Japanese** | Sashimi/poke, edamame, miso soup, a side of rice (not a giant donburi); teriyaki is fine, sauce light. |\n| **Thai** | Larb, grilled satay, papaya salad, a curry shared with extra protein; go easy on fried rice / heavy coconut dishes. |\n\n**Your no-cook restaurant defaults (macros you know cold):** *Chipotle Double-Chicken Salad Bowl* (P54), *CAVA Greens + Grains, Double Protein* (P45), *Sweetgreen Lean Protein Plate* (P42), *Mendocino Farms \"Not-So-Fried Chicken Salad\"* (P41).\n\n### 6.2 Social events / parties\n\n| Situation | Move |\n|---|---|\n| Heavy buffet / dinner party | Eat a protein-forward snack **before** you go (*Tuna-Avocado Seaweed Wraps* P29, *Turkey Jerky + Apple + String-Cheese Board* P26) so you arrive un-ravenous. Then enjoy the meal without going feral. |\n| Drinks | Set a cap *before* you arrive. Alcohol is empty calories **and** lowers your guardrails — both eat into the deficit. Alternate each drink with water. |\n| Dessert / shared apps | Have some. One indulgence inside a controlled week is invisible on the weekly average (§4.6 math). Guilt is the only thing that turns one cookie into a weekend. |\n\n### 6.3 Travel — lazy, no kitchen\n\n**Pack-in-a-bag staples (TSA-friendly, zero prep):** single-serve whey/casein packets, *No-Bake PB Protein Bites* (freezer→bag), jerky, roasted chickpeas, nut/seed packs, tuna/salmon pouches, electrolyte tabs.\n\n**On-the-road builds (from the library):**\n- *Airport / Travel High-Protein Combo* — 520 kcal P42, assembled in ~2 min.\n- *Trader Joe's Smoked Salmon & Egg Protein Plate* (P39, omega-3) when there's a TJ's.\n- *Costco Street-Corn Chicken & Cottage Cheese Plate* (P48) for a fridge-free hotel-room dinner.\n\n**Travel hydration:** flights dehydrate — ~250 mL water/hour in the air + an electrolyte tab; switch to destination meal times right away.\n\n> **Travel hard rule:** a travel day with no good options is a **maintenance day, not a deficit day.** Don't stack under-eating on top of travel stress and bad sleep — just hold steady and resume the cut when you're home. Maintaining through a trip *is* a win.\n\n---\n\n### Quick-reference: the six things you actually have to remember\n\n1. **Consistency over the week beats perfection any day** — a gentle deficit you keep > a harsh one you blow up.\n2. **25–35 g protein at every main + a protein snack** → ~115 g/day, every day, cut or maintenance. Protein is the toning lever.\n3. **Pilates and walks need almost no special fueling** — eat normally; just land 25–35 g protein within ~2 h after a class. Fasted walks are fine.\n4. **Hydrate to ~2.2 L + pale-straw urine; one electrolyte tab only on long/hot days. Creatine 3–5 g daily; vitamin D; test iron, don't guess.**\n5. **Judge progress by the waist + mirror + 10-day average, not the daily scale.** Flat scale + shrinking waist = winning.\n6. **If energy / sleep / mood / cycle slips → EAT MORE.** Never below ~1400 kcal. That rule overrides the scale, always.\n"}},STARTER={"Mon": ["Blueberry-Almond Protein Overnight Oats", "Cal-Mex Rotisserie Chicken Burrito Bowl", "Chocolate-Espresso Casein Protein Pudding", "Instant-Pot Turkey & Three-Bean Chili"], "Tue": ["Greek Yogurt Power Bowl with Granola", "Greek Mason-Jar Chickpea & Feta Salad", "Wild Salmon Everything-Bagel Cucumber Boats", "Sheet-Pan Shrimp Fajitas with Avocado"], "Wed": ["Mango-Coconut Protein Chia Pudding", "3-Minute Rotisserie Chicken Power Bowl", "Edamame-Popcorn Movie Mix", "Baked Cod Puttanesca with White Beans"], "Thu": ["PB-Banana Protein Waffles (Freezer Batch)", "Mediterranean Farro & White Bean Tuna Salad", "Cottage Cheese Cookie-Dough Fluff", "Salsa Verde Chicken Tacos"], "Fri": ["Mediterranean Muffin-Tin Frittata Cups", "Thai Peanut Chicken Edamame-Pasta Cold Bowl", "Chili-Lime Crunchy Roasted Chickpeas", "Pesto Chicken Chickpea-Pasta Skillet"], "Sat": ["Triple-Berry Protein Smoothie Bowl", "Californian Cobb-Style Power Salad", "Mango-Raspberry Greek Yogurt Bark", "Moroccan Chicken & Chickpea Tagine"], "Sun": ["Savory Cottage Cheese Avocado Bowl", "Cal-Mex Black Bean & Corn Quinoa Mason Jar", "Hummus + Crudite with Everything-Spiced Cottage Cheese Dip Duo", "Instant-Pot Red Lentil & Rotisserie Chicken Dal"]},DOCORDER=[["foundation", "Nutrition Foundation"], ["phase-1", "Phase 1 \u00b7 Reset & Gentle Cut"], ["phase-2", "Phase 2 \u00b7 Reach & Reverse"], ["phase-3", "Phase 3 \u00b7 Tone & Maintain"], ["phase-4", "Phase 4 \u00b7 Lifestyle Lock-In"], ["shopping", "Shopping Lists"], ["prep", "Batch-Prep Playbook"], ["tracking", "Tracking & Swaps"], ["fueling", "Fueling & Troubleshooting"]],FOODMAP={"salt": {"ug": {"(whole)": 6}, "pu": {"unit": "container", "label": "26 oz canister", "size_g": 737}}, "vanilla protein powder": {"ug": {"scoop": 32}, "pu": {"unit": "tub", "la
